body:
  text: 唐宋元名表卷下之一明胡松撰宋謝除尚書右丞表蘇子由臣某言昨䝉朝命以臣某為尚書右丞者伏以渙汗之恩已行而不反傴僂之志雖勤而莫伸上愧鴻私下慙公議恭惟皇帝陛下接堯舜之統蹈成康之仁體貌先王耆老之臣揀拔後來翹秀之士俯仰六載前後幾人坦然公明故不私賢否之實穆然淵默故坐照情僞之真臨御久則鑒愈明得失分則下無隱如臣者西南賤士章句小儒早嵗猖狂偶竊多聞之選中年流落既安縣尹之卑遭時乏人致位近侍跌宕文墨之囿囁嚅議論之場舉皆空言安有實效顧惟省轄之重實參國論之餘豈無遺賢遽及微品地寒資淺何以望三事之餘光才短力罷安能越六聮之滯論雖復黽勉就職愧歎何言此蓋伏遇皇帝陛下天地之仁曲成草木之陋父母之愛不録子弟之非將建大厦以覆羣生故收衆材而無弃物然臣負過其力受非所容惟有潔已無私或不辜於托付引類自助幸得免於顛隮不渝始終少答恩造臣不勝瞻天仰聖激切屏營之至謹奉表稱謝以聞謝翰林學士宣召表翰林學士臣某言荷䝉聖㫖宣召者成命莫回驚使華之促召一家竦聽望雲闕以馳情實儒者之至榮豈平生之敢望臣某誠惶誠恐頓首頓首竊以翰墨之任始自有唐供奉至尊講聞前輩北廊奏事有如李絳之忠中禁論兵復數畢諴之智逮我祖宗之盛最優文學之臣時舉舊章多䝉召對頃自恭默之後稍虛顧問之常方今聖德日躋羣臣屬目蓋將虛前席以博問繼夜燭而疇咨宜得雋良密侍燕語如臣草野微陋章句拙踈十載江湖之間自羣魚鳥五遷臺省之要永愧冠裳敢謂乏人遽令至此茲蓋伏遇皇帝陛下天心廣大海德并包物無一介之微意求萬目之舉臨朝訪道有元老之在前燕處清心援衆正而自助從容盛德循致承平塵露至微海嶽奚補修列聖之故事今將其時因聞見以納忠臣亦有志臣無任瞻天仰聖感荷屏營之至謹奉表稱謝以聞謝除中書舍人表越從左史擢領西垣口出命書身參法從言念山林之迹本無富貴之心聞命若驚固辭不獲伏念臣生本西蜀家世寒儒學以父兄為師貧無公卿之助私有求于祿養輒自立於文辭慨然東遊無以上達際㑹仁祖訪求直言䇿語猖狂恃聖神之不諱考官怪怒惡悻直之非宜孰知牾俗之言特被愛君之詔感激恩遇遂忘死生莫酬國士之知適有私門之禍未填溝壑重迫饑寒時於道路望見神考一封朝奏夕聞召對之音衆口交攻終致南遷之患生雖不遇嘗辱顧於二宗時不見容勢殆濵於九死厄窮自致黽勉何言敢云衰病之餘復被寵光之幸此蓋伏遇太皇太后陛下母慈均覆坤德無私欲以任姒之明躬行堯舜之道肆求多士以遺成王耆老畢㑹於朝廷耕築不遺於林莽遂令拔擢猥及空踈馮唐已衰猶願雲中之往貢禹雖老未忘封事之勤譬如木之在山生則荷恩而死無所怨水之於地行則潤下而止不敢辭臣之事君義亦如此欲報之意非言所殫謝澶州簽判表程明道論議無補職業不修國有典刑罪在誅戮曲䝉寬貸仰荷洪私期於糜捐莫可報謝臣性質朴魯學術空虛志意粗修智識無取陛下講圖大政博謀羣材過聽侍臣之言猥加風憲之任臣既遭遇明聖亦思誓竭疲駑惟知直道以事君豈忍曲學而阿世屢進濶踈之論愧非擊摶之才徒嘗刳瀝肺肝曽無裨補毫髮既不能繩愆紏繆固不願沽直買名豈敢冒寵以居惟是奉身而退自劾之章繼上闔門之請彌堅天意未回憲章尚屈更奉發中之詔俾分提憲之權不惟沮諍論之風亦懼廢勸賞之實力形奏述恭俟誅夷此蓋伏過皇帝陛下極天清明普日臨照洞正邪之心迹辨真僞於幽微察臣忠誠恕臣狂直不忍置諸重辟投之逺荒解其察視之官處以便安之地生成之賜義固等於乾坤涵容之恩重益逾於山嶽臣敢不日新素學力蹈所知秉心不回信道愈篤願狥小夫之志不為儒者之羞或能自進於尋常庶可仰酬於萬一淮南轉運使謝上表蘇子容贊畫甘泉久玷三臺之末觀風淮甸驟升數使之榮朝寄匪輕地望兼重愧非才選靡定厥官姑謹詔期趣行所部寵靈所被畏惕非常竊以州郡備官所以分釐於民務朝廷遣使所以布宣於主恩付一道之事權用六條而舉察賦輿出納俾以均輸吏治否臧責之薦黜自匪綿更於事任詎能振肅於治綱若臣者才不足以適時慮不足以經逺偶緣資級之例得從選用之階始自書坊出分使竹俄從寰服入佐計籌粗收嵗月之勞蔑著毫分之效豈謂伏遇皇帝陛下察庶工之任使矜奉職之良勤拔於省僚授以利柄矧惟淮海之郡實當東南之衝昔號奧區今逢樂嵗五種盈疇而遂茂四民勤力以厚生料乎漕運之程無煩趣辦之急惟當敷宣惠澤通究物情編齊之利病可更立求其本刑政之重輕或失當適其中止期靖嘉少稱掄擇若乃事體貌以為風采盡銖兩以斂民財顧在懦愚誠多闕略重念上慈天覆聖治日新官無內外之殊事悉憂勤之繫昨臣受任之始獲靣於清光陛下臨遣之言曲加於勉諭自省最為於踈逺何圖亦記於淵衷豈非以委任之優故特示拊循之厚雖乾坤厚施非報謝之可言而犬馬微生第勤勞而思奮倘驅馳之有用期終始以無渝尚書省謝車駕臨幸表林子中某月日車駕臨幸尚書省臣某等惶懼惶懼頓首頓首伏以天臺肇建具崇喉舌之司帝車下臨增重陛簾之寄非常之舉視古無倫恭惟皇帝陛下天縱多能日新盛德剗除衆弊裁制萬幾考先王之董治官立尚書以為政夲紀綱條理見微㫖於新書創作規模别攸司於著位蓋慮之積年而成於兹日聞諸前世而驗於方今忽紆清蹕之傳深聳鴻都之觀且北辰居極外環象斗之宫而黃道所經旁及積星之位瞻威顔於咫尺被法語之丁寧敕以在公退而交警分曹帥屬燦然周典之文望輦拜恩陋彼漢郎之嘆矧復宗藩遞進禁從相趨凡獲侍於宸遊皆預窺於聖作歡聲載溢慶榮遇於一時信史備書流美談於萬世臣某等叨膺重任久負明恩顧懷備位之慙第劇逢辰之幸敢忘䇿勵期稱寵臨臣等無任瞻天仰聖激切屏營之至謹奉表稱謝以聞代范忠宣公遺表李端叔臣聞生則有涯難逃定數死之將至願畢餘忠輒留垂盡之期仰瀆蓋高之聽中謝伏念臣賦性拙直稟生艱危忠義雖得之家傳利害率同於人欲未始茍作以干譽不敢患失以營私蓋常先天下而憂期不負聖人之學此先臣所以教子而微臣資以事君粵自治平擢為御史繼逢神考進列諫垣荏苒五十二年首尾四十六任分符擁節持槖守邊晚叨宥密之求再席鈞衡之寄遇事輒發曽不顧身因時有為止欲及物固知盈滿之當戒弗思禍釁之隂乘萬里風濤僅脫江魚之葬四年瘴癘幾從山鬼之遊忽遭睿聖之臨朝首圗纎介之舊物復官易地遣使宣恩而臣目已不明無復仰瞻於舜日身猶可免或能親奉於堯言豈事理之能諧果神明之見嗇未獲九重之入覲卒然四體之不隨空慙田畝之還上負乾坤之造猶且強親藥石貪戀嵗時儻粗釋於沉迷或稍紓於報效今則膏育已逼氣息僅存泉路非遙聖時永隔恐叩閽之靡及雖結草以何為是以假漏偷生刳心瀝懇庶皇慈之俯鑒亮愚意之無他臣若不言死有餘恨伏望皇帝陛下清心寡欲約已便民達孝道於精微擴仁心於廣逺深絶朋黨之論詳察邪正之歸搜抉幽隱以盡人材屏斥竒巧以厚風俗愛惜生靈而無輕議邊事包容狂直而無易逐言官若宣仁之誣謗未明致保佑之憂勤不顯本權臣務快其私忿非泰陵實謂之當然以至未究流人之往愆悉以聖恩而特叙尚使存殁猶汚瑕疵又兼以未解疆場之嚴禁空帑藏之積有城必守得地難耕凡此數端願留聖念無令後患常軫淵衷臣所重者陛下上聖之資臣所愛者宗社無疆之業茍斯言之可采則雖死而猶生淚盡詞窮形留神逝謝吏部侍郎表鄒志寬代言西掖已冒至榮列職中臺更塵高選拜恩優渥撫已競慚中謝竊以六典治邦周重天官之任三銓綜吏唐推文部之權洪惟神考之正名肇復先王之成憲迄至今日益昭聖功宜得真材以二選事而臣猥從廢斥特荷哀憐俄擢置於近班獲預聞於機要事陛下如有上帝敢萌一念之欺仰陛下何啻高山終乏纎埃之補未正素飱之責遽叨越次之升靜言思之可謂幸矣此蓋伏遇皇帝陛下孝隆繼志道廣用中欲多士之無朋故孤立者與進欲四方之不擾故愚守者并容爰舉斯心俾祗厥序臣敢不激昻遭遇飭勵猷為念此餘生實神聖之再造誓殫綿力稱寵祿之殊私謝復官表萬里投荒豈生還之敢望九重獨斷俄意外以䝉恩感激哀憐縱橫涕淚伏念臣最為固陋全昧幾微有言輒至於妄陳雖死不足以塞責上賴聖人之救物特寬司寇之嚴刑但復竄於遐方姑使省其往咎惟昭潭之可畏與新州而不殊形影自隨朝夕難保昏昏瘴霧信為提耳之師兀兀愁居因得致身之道惟忠惟孝無古無今命雖甚於垂絲心已期於結草不謂僅存之瘦骨忽還將絶之驚魂既獲免於拘攣遂亟諧於定省名蠲罪籍品復文階在抆拭之非常皆覬覦之莫及此蓋伏遇皇帝陛下道彌天覆德盛春生七齡光御於丕圖萬物率由於和氣紹隆先烈坐撫太平曲回進日之明旁燭戴盆之下謂裕陵長育賜之第而除教官謂哲宗保全矜其愚而屈常法召從五嶺之表端遇六龍之飛擢于不次之中曽是惟新之數肆令甄叙俯及孤危臣敢不因險阻艱難之備嘗念身體髮膚之再造益堅夙志遙瞻北極之尊長與老親共祝南山之夀精誠所貫高厚必知通州自便謝表陳瑩中恩由獨斷澤被孤忠刑部之執守雖堅天子之福威無壅乃公朝之盛事豈小己之私榮恭叙感悰仰黷高聽中謝伏念臣昨䝉善貸賜以生還萍跡孤睽久寄食於異縣篳門幹蠱常委事於長男所營不足以藩身其出每緣於糊口去庭闈者纍月聞道路之一言耳受而輒行親危而不顧緣帥司深疾其生事故傳者多指為病狂萬口嗷嗷兩路訩訩狐突教子素存不二之風曽參殺人寧免至三之惑事既匿而難曉時浸久而益疑制勑深嚴就逮於重江之外獄辭平允閲實於片言之中矜其無罪之可書許以還家而自便出圜扉而涕感瞻魏闕而神留尋沐寬恩移置近地海島萬里不如無子之無憂淮壖一身彌覺有生之有患擢髮不足以數臣之罪瀝血不足以寫臣之心羔羊之性至公犬馬之情愛主忘身狥國初無係吝之私抱疾呼天惟恃精誠之格忽因詔諭時免拘維此蓋伏遇皇帝陛下堯大并容舜明同照人人皆使之得所事事唯恐其有偏繼志用神考之心應天以格王之實舊弊若冰之將釋新慶如川之方流家國平康內外交泰遂使赦令昔阻隔而今行士有宿愆始棄置而終宥全家荷德無路酬恩螻蟻之力至微但知恭順蒲栁之身已老尚可糜捐望雖隔於戴盆志敢忘於葵藿台州羈管謝表奉聖㫖陳瓘自撰遵堯集語言無緒盡係詆誣不行毁弃送台州羈管令本州常職官常切覺察不得放出州城月具存在申尚書省臣即時望闕謝恩發離本家水陸兼行不敢住滯今於十月初十日已到台州城內者畎畝之志一書可通芻蕘之言萬里不隔集羣辭而上達遭一覽以為榮竄路雖遙陳情已畢中謝伏念臣材如糞土身若梗蓬非敢以著書為能所陳者戴君之義知詆誣之不可志在尊堯豈行用之敢私心唯助舜語言無緒議論甚迂獨歸美於先猷遂大違於國是不行毁弃有誤咨詢虛消十載之光隂靡恤一門之溝壑果煩揆路特建刑章若非恃庇於九重安得延齡於再造由淮入浙自通至台怒濤雖阻於重江毒瘴幸殊於五嶺尚留頂踵獨賴君親此蓋伏遇皇帝陛下天大并容日明洞照以至慈而善貸推觀過之深仁憫此顛隮欲其存在以身償怨螻蟻之命至微狥國捐生犬馬之心未替夢馳丹闕目想清光重干擢髮之誅徒鬱戴盆之望餘生易捨大德難酬代賀皇太后生辰表考厯占星氣應元英之候稱觴獻夀禮行長樂之宫凡在照臨所同欣抃中賀恭以皇太后德符坤載位正母儀淵冲自乎生知慈惠本乎天縱弼成文考既隆逮下之風共養太姜益著思齊之美內宣隂化日嗣徽音矧當孝治之朝尤崇聖誕之節鼓鐘具舉環珮畢臻歡聲動於宫闈佳氣蟠於觀闕某謬通屬籍叨守近藩匪惟宗族之同榮實與吏民而共慶代賀明堂禮畢表有司備物親嚴三嵗之祠率土均恩實賴一人之慶照臨所逮歡抃攸同中賀伏惟皇帝陛下道貫神明功參覆載昭哉嗣服纘六聖之洪休大矣孝熙備三官之至養擢英髦而共政革苛弊以齊時庶事用康善祥斯應物無疵癘民不怨咨天地得以清寧草木遂其零茂九功之德既皆可歌四海之臣亦各來祭乃遵彛典爰盡孝思時以季秋之良日用上辛之吉始告䖍於原廟遂嚴配於合宫精意感通景貺昭答大賚而兆人富肆眚而衆心新實萬世無疆之休蓋千載不逢之㑹臣乍辭帷幄方守藩垣徒欣右饗之成莫預駿奔之列瞻望闕庭云云代倉部知池州謝表淮壖乘障初無固圉之功江表干城復玷承流之寄甫祗職業參布詔條中謝伏念臣繆膺世賞之延濫綴官聮之末投身冗散降命竒窮曩隨牒以戌邊適傳烽而警備當戎馬之侵軼屢瀕至危賴王師之奮張卒獲自保偶逃龜櫝之毁復玷魚符之分矧池陽之奧區乃江表之重地干戈載戢則必佩服苞桑之戒兵農雜居則必洽比細栁之屯匪時閎材疇荷隆委此蓋伏遇皇帝陛下剛健中正齊聖廣淵賜十行之書留神萬國考三載之績久任百官自驚流落之蹤亦預使令之列臣敢不悉循侯度祗若政經輯寧凋瘵之餘咨度弛張之道奉上德意如瞻咫尺之光同衆戚休敢顧升斗之祿代倉部知吉州謝表俟罪倉曹無禆邦計分憂江國尚玷藩條丁寧臨遣之榮怵惕拊摩之責服官甫始拊已載兢中謝維是廬陵介於楚甸土膏而人瘠物夥而俗貧萬室連甍剽奪時鳴於桴鼓千艘銜尾轉輸日困於舳艫匪時通材疇荷隆委如臣者賦資謭薄涉世闊踈兩郡編民蔑矣慰安之效二年省掾居然尸素之慚亟求襆被之行復與剖符之寄力綿識眊責重事叢惟仰恃於乾坤或俯資於塵露茲蓋伏遇皇帝陛下配天立極繼聖御圖恢舉閎摹網在綱而不紊操持大柄臂使指而必從雖逺在於江湖猶近臨於軒陛臣敢不宣布詔令懷輯里閭急效近功忍自謀於寵利深根固本誓勉盡於拙誠代叔父知南安軍謝表職方之籍甫列附庸公車之章乃容專達恩既均於錫土誠復敢於籲天中謝惟嶺下之小邦實江西之窮處廄傳据南北之㑹廪稍積前後之增民力凋殘無以追隨他郡地望卑薄不足搖動有司既匪克勝復難自訴職居人後憂在衆先如臣者聲迹至微技能甚短折肱州縣雖險阻之少嘗屈首簿書顧神明之已耗晚推遷於官牒誤畀付於守符苦為撫摩以稱臨遣此蓋伏遇皇帝陛下敷施𢎞化丕冒上仁視邦選侯方旁求於召杜考圖數貢亦罔間於鄒滕曽謂瑣微驟䝉開可此蓋伏遇皇帝陛下監觀邦本恢養治原制賦欲均期復大禹九州之正施仁有漸姑從文王四者之先雨露旁流槁乾胥浹臣敬覃厚澤下逮窮民觀其拜賜之時猶有乞憐之意既勤深恤得少竭於今年終覬大恩俾盡夷於旁郡代舅曹史君知筠州謝表九畿星拱並受詔條萬乘天臨誕敷宸指雖陋邦之代匱亦德意之親承具以聖謨告于裔土中謝竊以舜門穆穆輯瑞以朝諸侯湯網恢恢受球而綴下國思皇盛旦率履舊章肆勤前席之咨溥及左符之寄腹心屏翰臂指豪英凡拜賜於朱幡咸觀光於丹扆如臣者至謭而拙甚愚以踈弓箕久負於家傳簮笏偶逃於官謗長江右壤筠水附城盼竹使以承流已過斗升之量欵楓宸而錫對幸瞻咫尺之顔此蓋伏遇皇帝陛下濬哲文明剛健中正下天上地酌民瘼以廣求小紀大綱收主威而總攬邈在河山之外皆如廉陛之前臣敢不遵奉章程慰安黎庶惇行教化漸移珥筆之風恪守部封少效挈瓶之智代程給事乞致仕表秦少游臣某言臣聞未老遽歸非臣子報君之義既衰猶仕豈儒生處已之方惟去就適合其時乃進退不愆於禮輒陳悃愊仰瀆髙明臣誠惶誠恐頓首頓首伏念臣家本單微材尤綿薄早緣章句聲律之末技偶中上科繼以簿書訟獄之微勞誤更劇任三持使節八領郡麾以至承乏小行人之官位備大司農之屬山川跋涉幾遍於五方日月推移殆踰於四紀遂叨蘭省之秩仍忝祕殿之名每撫心而自循縱沒齒而焉報昨以䝉恩罷守被㫖歸班身雖寄於海隅夢已升於帝所非不知懷金結綬侍清光而足榮佩玉鳴騶聮法從之為幸但以風霜漸迫蒲栁遽衰爰及上印之期當批乞骸之懇日暮途逺顧已分之非安漏盡鐘鳴亦人言之可畏伏惟皇帝陛下恢覆載之量廓照臨之明憐其實知止而請身察其非偷安而避事避還官政獲反里閭况臣北陌東阡雅多遊舊左飱右粥良給嵗時是以誦歌真主之稀逢盛述聖朝之難遇馬方羸老徒結戀於軒墀木已朽枯或能蒸於芝菌臣不任祈天俟命激切屏營之至鄂州謝上表張天覺宣布溫詔開諭逺民雖湖山千里之間如酺醵一堂之上聽歡聲之相告慙共理之非良伏以旁接九江前臨七澤地遐而陋俗魯以愚雖有沉寃莫能往訴至於極病祗自悲吟䝉被皇明申頒德意所謂律科嚴重鈎考碎煩方田擾安業之農圜土聚徙鄉之惡私租迫脅公帑貪求學校驅迫者或違其孝養之心保伍追呼者或失於耕桑之候寺觀掊繕營之費東南配漕挽之舟抑賣茶鹽强招卒伍文移速於星火追捕遍於里閭百端紛更一切蠲罷可謂崇寧之孝治真為紹述之聖功而臣初效外官恭承嘉命唯憂疲懦未克推行豈有設施可圖報稱有君如此碎首以之此蓋伏遇皇帝陛下誠實應天典常師古王路以平其好惡道樞以㑹其是非察臣於元祐之間未闕謝改州表臣某伏覩朝命以某地改為某州者帝天廣覆舊邦驗民數之登侯社旁開新命首官僚之建山川頓為之改觀人事歡謂其更生臣誠歡誠抃頓首頓首竊以喻在偏方世稱樂土孫吳之時始創為新喻縣李唐之初嘗析置南吳州蓋歷朝之沿革不常而百里之廣輪如昨其民畏刑而訟簡其士樂道而俗淳中更蕩析以離居未幾還定而安宅側聼南人之相語深惟先帝之至仁版圖既入於職方戶口倍增於井牧若稽古典宜列中州兹蓋伏遇皇帝陛下乾坤包涵父母愛育家四海而無外利萬物而不遺謂四萬五千戶之區惟天與祖之付我而三百六十官之屬曰吏以治而得民遂令外服之賤微獲備中朝之遴選某等遭逢聖代鼓舞皇恩既登進於吏民爰奉宣於德化服休服采願聞乃屬而一心于蕃于宣敢祝吾君之萬夀臣無任瞻天仰聖歡抃踴躍之至謹奉表稱謝以聞謝上表洪景盧禁門直北久違龍尾之趨藩郡落南忽玷虎頭之寄即祇官次恭布詔條中謝伏念臣濩落而無所容愚憧而不逮事遭逢嘉㑹自辜天地之恩留滯窮塗已隔江湖之夢不謂左符之寵恆勤前席之思今所領州故為劇鎮地方千里接甌閩百越之區縣列十城介溪谷萬山之阻人虛憍而尚氣俗啙窳以難馴平時䝉珥筆之聲曩嵗蹈弄兵之釁皇風下暢既洗滌於三薰習氣相延殆漸摩而一變得居長吏真可備員兹蓋伏遇皇帝陛下德如仁宗武類藝祖及國家之閒暇先務養民知稼穡之艱難益嚴宅牧過令臣輩亦預遣中重念臣頃侍清光最紆殊眷雖兩言溢惡欲興投杼之疑而一意在公獨賴垂旒之監致兹抆拭盡出生成比膺便坐之從容曲軫溫顔而慰藉感聖度不忘於微賤顧孤蹤寧慮於棄捐臣敢不鞭䇿疲駑奉行寬大即墨受封於萬室豈曰能賢㑹稽上最於三年其惟共理饒州謝上表禁林挾日未遑坐席之溫鄉郡一麾偶遂分符之便雖始願不敢及此豈罪人乃能得之爰奉庭闈即趨官守中謝伏念臣生而性介天與數竒應真主之誤知建單車而出使茹毛北海已驚半世之遷除館西河幾絶一生之望敢期天幸獲以身還方深故土之懷猥辱髙門之召果聞取戾旋致疾顛上印綬以歸田固為輕典佩銀黃而夸里更沐殊恩捧檄入門過家上冡桑梓遂晨昏之養松楸寬夢寐之思行道觀瞻合宗感涕兹伏遇皇帝陛下合德天地玩心神明常思四表之歡不録萬里之過而臣空行空反曽蔑效於秋毫乍佞乍賢尚叨榮於書繡內而自訟其又奚言敢不上體至仁仰圖共理奉三年之計自惟無補於朝廷推一日之長庶或兼容於獄市建康謝上表香火奉祠久卧漳濵之病絲綸借寵忽開江表之藩方俯僂以固辭辱丁寧而趨上荷恩滋甚揣分難勝中謝伏念臣孤起諸生親逢上聖頻年近侍空餐積懼於人言纍月中樞伴食敢安於天職退從散位伏俟嚴誅當王度之清夷列公材於中外臣之無似上所誤知奉留都管鑰之嚴况顓帥閫受連府節符之寄仍護鄉州三組以誇一朝而獲兹蓋伏遇皇帝陛下如天至健若日大明處法宫之中五帝其名莫及行聖人之政三王之盛易為赫然夬決於小人卓爾晉昭於君子一新美化可謂昌辰豈伊朽鈍之餘首玷蕃宣之重臣未知為吏何以治民安田里而無歎愁雖謹思於體國以簿書而報期㑹諒不免於瘝官唯有愚忠仰酬大造代福淮東舉茶事謝上表後兼常平總浪舶於三吳訖微善狀按雲艘於百越復冒除書揆日問塗浹辰指部中謝切以漢規先具開邊糴以均輸唐務富藏藉關征而贍本雖有便民之志頗乖實禀之宜紛更旋奪於廷臣捐瘠或隨於軍用逮中世徙埸而𣙜茗致諸蕃塌地以名錢大抵虛文蔑聞見效偉聖明之立制張職守以建官吏偶失於三思事寖成於一切維時改作盡復舊章自非通敏之流曷副班宣之責如臣者猥䝉世賞辱在周行無材能閥閲之勞固宜反退習功利分銖之事豈有寸長曽是使華荐沾恩紀兹蓋蓋伏遇皇帝陛下體天剛健措國清寧總六服以收賢明德逺矣訪萬幾而詢政使人器之遂令朝著之微亦玷輶軒之寄臣敢不裒多益寡散滯取贏一身而二任之加勉祇承於上意三登遺九年之食庶還定於王民國史院進三朝正史帝紀表三后在天誕著丕謨之懿百年積德惟憑信史之傳方論次之開先仰威靈之如在載㳙昧旦輒冒宸嚴臣等惶懼惶懼頓首頓首竊以詒厥孫謀實為大訓必有不刋之典用扶可久之基赫赫裕陵制作擅百王之冠巍巍哲廟規模宏七世之觀逮昭考之勃興備盛朝之盡美治安之極剖判所無禹繼舜舜繼堯顧三聖而守一道事繫時時繫月宜有經以垂無窮慨多歷於嵗華訖未施於功緒蓋士起異同之論而時更板蕩之餘視熙豐符祐之成舉是非而雜揉考崇觀政宣之志頗放失於舊聞賴故家遺俗之猶存致偉蹟宏休之可紀參稽定貫允屬昌辰恭惟皇帝陛下宗祏宅心羮墻係念明列祖之成德以庶邦惟正之供覲文王之耿光善孝子述人之事欲壯西廂之御趣裒東觀之書臣等自愧庸虛敢知筆削書大事而垂則簡牘已殫緗素之勤藏名山而副在京師終冀汗青之望臣無任瞻天仰聖惶懼屏營之至謹以三朝正史帝紀隨表上進以聞謝除禮部尚書表王謙中臣某言昨䝉聖恩召臣歸朝除為禮部尚書者外閫暫分遽遄歸於驛召昕朝甫對即擢長於春官席寵逾涯撫躬憎懼臣誠惶誠恐頓首頓首伏念臣某奮身孤逺逢世休明仕不因人終始皆䝉於睿簡才非適用險夷但竭於愚忠去國倚廬起家臨鎮豹尾隔四年之從麟符專一道之權聞田里之歎愁具知疾苦頒條詔之寬大方究撫綏敢圖宣室之具恩誤玷中堂之率屬跡陪鴛鷺恍疑夢寐之回履上星辰頓覺依乘之近被服章之安吉引車轡之間馳榮渥併加微軀難稱兹蓋伏遇皇帝陛下亶聰建極知哲能官聚英雋以尊朝蓋為本根之慮咨直清而典禮不徒玉帛之云退省迂儒曷膺妙選臣敢不益堅素節仰報隆知顧北斗喉舌之司當謹出納如稽古禮文之事敢廢討論臣無任瞻天荷聖感佩屏營之至謹奉表稱謝以聞謝除吏部尚書兼翰林承㫖表周必大頻年入侍遍塵清近之班兩職並升復冒殊尤之寵貫服章於朽質被韀䇿於名駒異渥鼎來危衷震惕臣誠惶誠懼頓首頓首伏聞漢以尚書為喉舌唐以翰苑為腹心明光畫省之嚴夔龍接武玉殿金鸞之邃頗牧在中凡遇遷掄已為要劇矧疉膺於組綬足增耀於簮紳如臣者天分弗髙人才甚下自惟始願不踰州縣之間誰意晚塗浸躐賢豪之上揆分數祈於罷免疏榮更誤於褒遷冠秩序於南宫進班聮於東閣胡瞻鶉特久慙受祿之無功兼得熊魚彌愧舍生而取義二儀施大一介命輕此蓋伏遇皇帝陛下文武生知聖神廣運使人也器隨良窳以無遺與物為春舉根荄而畢遂是容賤士仍玷髙門惟聖朝法令之具存初不勞於裁覽而明主德功之俱懋亦何待於論思第當守三尺以不欺且復盡一心而無隱庶持孤節仰報鴻私臣無任瞻天仰聖感激屏營之至謹奉表稱謝以聞謝除禮部尚書兼翰林學士表宗伯綴文昌之坐已高曳履之班翰林依華蓋之星尚玷絲綸之直當聖主謹持於公器獨愚臣常愧於私人中謝瞻城南尺五之天致身無路想玉階方寸之地通籍幾年况乎出入禁嚴周旋侍從論思獻納日邇清光衣被服成嵗叨徽數向匪負一時之望安能符衆論之公如臣者學不足以知方才不足以應務家壁四立甘為窮陋之民君門九重敢起躋攀之念忽拜便蕃之命疊加優異之恩帥屬春官光二卿之舊次摛文禁苑忝四命之新榮煥寶帶以章身飾繡韀而騖駿正使實兼數器尚虞稱塞之難矧伊初乏寸長何意超踰之甚周章就列俯仰懷慙此蓋伏遇皇帝陛下道叶舜華志恢禹迹明明在下雖洞照於羣情浩浩其天每包涵於萬類寧稍捐於爵秩恐或弃於菲葑遂致凡才亦塵顯仕臣敢不悉其思慮稱是寵褒號令文章期助漢家之制討論潤色勉希鄭國之賢茍逭素飱豈酬洪造臣無任愧感之至謹奉表稱謝以聞中書舍人謝除翰林學士表鳯掖演綸久俟黜幽之典鑾坡裁詔誤叨儤直之榮拜命周章捫心愧汗臣誠惶誠恐頓首頓首伏以禹謨舜典周誥商盤德意具孚雖本帝王之惻怛訓詞播告亦須臣下之討論惟坦然明白於一心故粲若傳流于萬世矧惟聖代丕振文明承明著作之庭畢來俊彥金馬玉堂之士尤慎選掄宜得名儒專承內命如臣者斷無他技纍有至愚粗知前事之可師每嘆小才之難強螢窗夜學燭莫望於金蓮蓬户久居班豈知於玉筍奮身一第糊口四方叨逢盛世之旁求獲與羣賢而並騖驟離粵泄服在髙華潤色非長悵已窮於薄技論思莫效居有負於厚恩切幸保全敢希進擢豈謂忽從西户躐置北門以荒蕪之學而備顧問於禁林以骩骳之文而助發揮於睿藻寵雖至矣懼亦隨之此蓋伏遇皇帝陛下聖以日躋智由天錫垂拱視民之阜始終典學之修孔子多能集大成而自得髙皇善任屈羣䇿以無遺遂致採葑俯令視草臣敢不告謀猷于后以聖王為師聽漢詔於山東少補中興之治布堯言於天下庶無內相之慙臣無任云云謝除太府少卿表具官臣某言某月日奉聖㫖除臣為太府少卿者將命江淮久塵星省疏榮魏闕驟亞月卿念委寄之不移知皇恩之愈厚臣誠惶誠恐頓首頓首伏念寒鄉晚出薄宦卑飛叨逢籲俊之秋濫綴登畿之數粵負乘於外府旋列屬於中臺所懼汰歸乃膺臨遣給餉坐兼於兩路空餐行及於再朞自量心計之非長常恐使華之不稱竊稽往籍具有前模流馬木牛葛亮創蜀中之運輦車驪駕寇恂資河內之軍彼皆值於行師尚不聞於乏事矧脫劍槖弓之後無飛芻挽粟之勤第鈎考於簿書粗斡旋於金穀論功何有竊位則多已慚假寵於諸郎更許參華於七寺中負梁鵜之刺徒驚晉馬之蕃此蓋伏遇皇帝陛下大智博臨深仁遍覆灼知能否故雖逺而不遺力勸事功凡有長而必録爰茂出綸之渥悉褒總賦之臣遂致下愚亦升少列臣敢不仰承睿眷俯竭駑才無廢前勞少助足食足兵之政更圖後效永堅惟忠惟孝之心臣無任仰天荷聖感激屏營之至謹奉表稱謝以聞謝吏部侍郎表嚴近叨居夙負瘝官之責武文迭試更膺換部之榮襲衣頒在笥之珍寶帶錫章身之寵仰慙主眷俯愧輿言中謝臣聞古之銓綜存乎人今之銓綜一於法存乎人固可以得士然其敝也嘗由豫奪之不公一於法固可以滅私然其敝也或致賢愚之同滯而况簿書紛若胥史雜然茍稽察之弗精將混淆而莫辨欲酌古今之中制當令人法之並行庶稍戢於吏姦亦少伸於士氣豈容虛受以纍明揚伏念臣性鄙習迂志卑才下早親翰墨第為書生陳腐之談久侍軒墀初乏禁從論思之語引去則殊私之未報欲留則髙位之難安方進退之靡寧忽選除之下逮肺腑抱履氷之懼面顔形撻市之羞被此光靈若為稱塞兹蓋伏遇皇帝陛下乾行不息日照無私知人非堯帝之難巧壬奚患選衆有臯陶之舉枉直自分夫何一介之臣乃冠二卿之列臣敢不遵承法令振拔滯淹雖微氷鑑之明上禆睿哲誓守權衡之信仰助公平茍不辱知斯為報國謝除禮部侍郎表掌祕府之圗書久玷英遊之列奉甘泉之筆槖驟汙法從之班恩厚踰涯感深洽骨中謝臣聞知人繇乎堯哲分職著於周官明三德以有家所以撫五辰而凝庶績佐六卿而率屬所以倡九牧而阜兆民何畏巧言其惟吉士如臣者以一介甚踈之跡荷兩朝特達之知槐市蓬山早塵華選烏臺鸞掖浸陟要班洎中返於江湖亦旋歸於魏闕踰年于此片善莫聞心踧踖以不安顔忸怩而罔措所期顯黜乃誤殊遷惟宗伯古之清曹惟二卿今之膴仕禮樂自天子出雖上禀於聖謨籩豆則有司存當俯求於故實夫何鄙朴而許攝承夙夜直哉惟清莫遂夔龍之選文章煥馬可述更慙乘馬之工兹蓋伏遇皇帝陛下冠古聰明御圗勤儉辨臣鄰之邪正昭示抑揚閔風俗之墮偷力加勸沮知臣雖無可用之實察臣粗有不欺之愚特假寵榮俾陪亞旅臣敢不益堅素守更厲丹心效守職之小忠詎塞論思之責竭事君之大節或酬覆幬之仁太上皇帝上仙慰皇帝表天心難測邦禍荐臻甫涉夏秋而喪考妣中慰臣竊以慈懿寢園之奉翣馭將歸聖安丹鼎之成龍胡以斷黎庶攀號而不釋聖神悲痛以何堪恭惟陛下孝通神明躬侍寢膳大舜終身之慕每竭誠心有唐二聖之歡方隆榮養驟罹變故諒極哀恫願寬銜恤之情毋爽宅憂之禮臣退休田里阻詣宫庭臣無任云云孝宗登遐慰皇帝表聖君侍膳方伸永命之新天父登遐忽下遏音之詔痛結嚴宸之邃衰纏率土之濵中慰恭以尊號德洽民心仁根天性陟帝位二十八載髙蹈倦勤至寢門一日三朝久膺隆養福共期於夀考疾俄殆於寤興設黼扆於牖間惟聞末命乘白雲於帝所恍隔真遊撫弓劔以空存視羮墻而猶見恭惟陛下睿思罔極孝慕素深問安節以色憂不能正履宅亮隂而思道兹故弗言願懷繼志之圗少抑終身之戚臣忝紱郡綬邈在海壖驚奉諱音徒結攀號之戀坐縻官爵莫伸奔問之誠皇太后升遐慰皇帝表慈帷晝掩哀訃夕聞凡思持載之功舉抱催傷之痛中慰恭惟陛下事親盡禮侍膳殫誠久承文母之歡徽音遽隔逺邁顯宗之孝追慕何窮願寬陟岵之悲少副普天之望皇太后升遐慰皇帝表釁結東朝悲纏中夏遙知晬穆正劇哀恫中慰共惟陛下性本自天行皆髙世漢文至孝晨昏無解帶之安虞舜好生逺邇有畫冠之禁既勤施德可謂寧親倐聞厚地之傾莫曉彼蒼之意須思適變毋致過哀上以符慈寧治命之言下以副黎庶誠心之懇皇后上仙慰皇帝表桂輪隱耀椒掖廞儀厚載既傾淵衷斯惻中慰伏以大行皇后天姿恭儉地望髙華久殫婦順之勞正倚坤寧之助奄從先后莫返中闈恭惟陛下孝切亮隂思隆儷極雖聖情之易感故天數之難移願寬當寧之思垂副含生之望臣退居田里阻造宫庭臣無任云云孝宗梓宫啓欑慰皇帝表舜三年之喪倐臨襄葬商兩楹之殯初啓菆塗痛結重宸悲纏率土中慰恭惟太上皇帝陛下孝思罔極宸禮無違雖恭默弗言若已忘於天下然齊疏躬服自不廢於宫中願紓追慕之懷益盡送終之典臣效官疏逺奉報驚摧莫伸同軌之駿奔徒隕交頥之涕泗顯仁太后發引慰皇帝表陟彼屺兮爰卜青烏之吉維其時矣遽瞻畫霎之行祖道逶迤聖情惻楚中慰恭惟陛下德鍾天性道冠人倫粵符素奈之謡深切蓼莪之感親喪故所自盡也內不廢於三年聖德何加於孝乎外已刑於四海逮兹遣奠尤極哀悰顧淑靈已隔於東朝惟追慕少寬於南面寧宗發引慰皇帝表龜筮協從既先於逺日龍輴就祖已次於近郊罄海宇以悲摧極乾坤之悽愴中慰恭惟陛下作民明辟執古通喪致堯之思於羮墻而如見盡舜之孝豈富貴之解憂屇七月之有期增九重之永慕臣輸將無補扈從有行臨表涕零實難忘於忠戀承祧體重願少抑於聖懷太皇太后掩殯慰皇帝表騩馭上賔武帳久虛於長樂龜猶未諗容衣遂閟於稽山一人嗟慈範之違萬國嘆坤儀之逺中慰恭惟陛下純誠冠古至行積中慕親之心未嘗息焉執喪之禮可謂盡矣神靈為之顯相天日至於晏溫用葛無麻蓋異魯君之母因山配地實同唐室之規仙寢既成真游莫返追懷聖善固益動於孝心俯為邦家當勉裁於哀慕同前日月有期爰畢因山之制寢園在望共勤陟岵之瞻追懷太姒之徽音益惻武王之達孝恭惟陛下德隆天性念極母儀既哀戚之內深亦禮文之外盡為之宅兆奉長樂之褘衣見于蓍龜配裕陵之吉壤逮兹甫竁孰不纏悲雖上聖㷀㷀痛長違於慈矩然下民悃悃願勉抑於至情寧宗掩殯慰皇帝表禹穴因山今圖改卜漢陵復土大事既襄凡戴照臨舉深摧咽中慰恭以諡號皇帝休功邁世至仁如天方垂衣以致太平乃脫屣而超萬乘六飛八駿尚仙馭之來歸萬嵗千秋竟神遊之永閟恭惟陛下義隆送往孝極奉先慨日月之有期倐寢園之告備臣將指扈送引睇闕庭鍾慶發祥已兆龍岡之吉節哀順變願寬駟隙之悲太上皇帝掩殯慰皇后箋虞帝陟方守已迷於梧野太公卜葬役始就於櫟陽復土言遄望雲靡及中慰切以尊號儲精物表玩化天倪太山其頽驗孔聖兩楹之奠祈招不作信穆王八駿之遊兹永閟於慈顔宜有傷於冲抱恭惟陛下順承靡倦定省弗違婦子熙熙尚憶椒盤之奉山川鬱鬱空聞檿主之歸永懷如在之靈豈曰無從之涕伏望茂加節抑勿過憂傷惟孝道之大端初不專於哭踊况王心之巨創尤所賴於慰寬太皇太后掩殯慰皇帝表兵衛載廞風靜胥江之浪輇車已窆雲深禹㑹之山甫周復土之儀益重居廬之感中慰伏以諡號蚤推食淡晚樂含飴厭代賔仙棄四海九州之養因山定制妥千秋萬嵗之靈仙馭莫追淵衷永惻共惟陛下仁心內恕德教旁加稱孝孫稱哀孫不忘繼志讀喪禮讀祭禮尤謹送終既永傷而永懷且如疑而如慕伏願為宗祊而自重順時變以安行謂葬曰藏既克襄於大事至禮而止更節抑於餘哀太皇太后祔廟慰皇帝表檿主來歸既講九虞之祭椒塗永閟遂參諸后之游悲動紫宸禮嚴清廟中慰恭惟陛下誠通幽顯道述祖宗問寢承顔事母昔同於事地謹終追逺寧親今至於寧神雖云彛訓之遵時乃明王之孝閟宫有侐已聞升祔於姜嫄南面何為願節哀恫於虞舜慈烈皇后祔廟慰夀成太后箋事嚴葬聖甫畢於山陵禮重祔姑益尊於宗廟聿隆安奉深示顯承中慰切以尊號位歷四朝謀詒萬世寶慈建極尚垂坤厚之光精爽在天宜正渙亨之假恭惟殿下巍巍冲德翼翼孝誠如慕如疑獨厚送終之意以享以祀式嚴升配之儀諒因制寢之成益重視奩之感願稽國典少釋聖懷雨露既濡雖未忘於悽愴春秋而祭尚少慰於哀思寧宗祔廟慰皇帝表廞衛反虞九筵載秩宗祊升祔萬世不祧中慰共以諡號靈德在天睿謨垂世鼎湖弓劍已迄大事之襄髙廟衣冠再侈崇儀之奉昭穆以序妥侑惟時恭惟陛下若稽大猷答揚先訓主鬯以承祭祀於昭震洊之符假廟以致精神深明萃聚之義既右烈考載陟新宫寧親大於寧神既率先於孝治盡倫從而盡制願俯就於禮經少抑哀思以祚羣品同前慰皇帝表龍湖莫返一以逺於仙游駒隙易馳十遂周於旬晷感時增疚率土同情中慰恭惟陛下嗣服無疆繼聖有作本生知於愛敬爰躬履於艱難率天下以為堯喪舉行三年之制慕終身而見舜孝度越五帝之隆驚晦朔之屢更軫哀恫之一念願副有生之望少寬罔極之悲慰皇帝表仙游莫返倐驚流景之遷禮典有常奄及終喪之制感時增慕易月從權中慰恭惟陛下授神器之公承宗祧之重雖嬛嬛在疚難忘人子之至情然業業萬幾當為天下之大計願少寬於宸慮以永御於丕圖元正慰表行夏時而正厯荐易嵗華履春露以念親益昭聖德凡預載持之數共懷怵惕之思中慰恭惟陛下以大孝而顯揚任姒之徽音以至尊而度越參騫之髙行當萬國貢珍之在列嘆東朝靈几之方新佩響唐宫莫展夀觴之禮鐘鳴漢殿暫停元㑹之儀願寬追逺之心茂對履端之序臣猥將隆指不獲躬詣東上閣門臣無任云云冬至慰表化國日舒徐行北陸聖人孝至永念東朝凡在輿情同深孺慕中慰恭惟陛下德隆天性報厚母慈當宫線之初添悵褘衣之漫逺率百官而為夀忍虛興慶之彛儀幸舊宅而㑹冬益愴永平之故事願抑對時之感俯安率土之心冬至慰表望雲氣於觀臺甫驗新陽之至斷鐘聲於長樂莫陳亞嵗之儀上切哀恫下均感慕中慰恭惟陛下行髙文帝孝邁有虞誦凱風聖善之詩悵六騩之永隔當化日舒長之候視一線以增悲仰祈宸抱之少寬式副天心之來復同前亞嵗甫臨方講漢儀之舊徽音寖逺共深文母之思遙知晬穆之光正切哀恫之慕中慰恭惟陛下道同堯舜行過淵騫罷長樂之夀觴深悲節物望慈寧之繐帳益動孝思願寬追逺之懷庶對履長之序代文潞公謝太皇太后表張文潛稽留君命政求免於刑誅惠養老臣不使勞其筋力仰睿私之從欲撫衰志以知榮伏惟太皇太后陛下厚德無疆至仁在上神孫臨祭知保乂之聖功多士充庭見肅雍之盛德恩及草木喜同天人臣幸以餘齡獲逢盛旦雖籩豆駿奔之事徒有心哉而禮樂大備之時為後死者豈不偶爾尚足矜榮謝除權吏部尚書表充員瑣闥自顧罔功擢長銓曹忽䝉誤寵仰皇慈之至渥揣微分以何堪中謝竊以選部持衡夙號六卿之長文昌聽履實為八座之聮非素推公方不足以柅吏奸非妙有德望不足以厭輿論雖黃繖之下無參異同而縉紳之流鮮不關係宜求精敏之彥以當要劇之司伏念臣才不逮人學徒泥古一為支郡三入修門久侍上皇愧愚衷之無補親逄嗣聖荷褒擢之有加代言非陸贄之工批敕謝李藩之器俯狥芻蕘之論屢寬斧鉞之誅去省中者五年遂躐登於冡宰離班行者一載遽首列於從臣禁林兼內制之文史館涉信書之筆滿盈已甚控避莫回頒御府之製衣益之鞶帶駕天間之良馬覆以雕鞍但喜悅親之私敢云稽古之效兹蓋伏遇皇帝陛下多能天縱盛德日新搜舉異才踵登持槖之選優容棄物獨負改竽之慙宜黜而遷以榮為懼臣敢不深思僥冒勉竭疲庸為山公啓事之書知非所及守崔亮停年之格何足言勞尚幾典選之平少助官人之道代謝吏部侍郎表代言西掖方拜誤恩攝二東銓復叨改命循墻莫避臨谷增危中謝伏念濩落無堪迂愚自信正以經營於菽水故嘗希望於斗升昨自外官恭趨嚴召猥厠內朝之鵷列親覩上聖之龍飛五歷粉闈一參月寺籌邉戎幕無婉畫之可稱將命北庭幸歡盟之復締冒柱史詞臣之選兼宫端寶牒之司初無左右之先容盡出聖神之親擢忽承帝制俾倅天官一新龜紫之榮仍假銓衡之長莫回成渙徒激懦衷兹蓋伏遇皇帝陛下虛以受人明於分職憐臣孤立於官路借以末光謂臣曽歷劇於部曹付之重委臣敢不寅遵邦憲嚴制吏姦朝夕論思雖素乏嚴吾之譽簿書期㑹庶勉追裴馬之名謝除參知政事表臣某誤䝉聖恩除為參知政事者充二樞庭方慚玩愒晉陪宰路遽被推遷倍深臨谷之危莫遂循墻之請臣誠惶誠恐頓首頓首竊以朝廷建輔號天子之四鄰政事參聞下丞相之一等定名稱於乾德復官制於建炎必求異能乃副隆委伏念臣頽齡景迫壯志日凋再掌吏銓但守停年之格濫居宥府未寬思職之憂雖粗竭於謭材終莫禆於末議負二宜去有七弗堪宿恙漸侵將籲天而致禱誤恩狎至真蹐地以靡遑况秉鈞當軸之虛員而知印押班之分日兼與漢章之約仍從商皓之遊命服匪頒復賜天間之駿爰田增衍更開公社之封昔在本兵尚為僥冒兹叨助理尤懼曠瘝兹蓋伏遇皇帝陛下盛德又新至誠樂與折衝禦侮坐底於外寧聚精㑹神力先於內治簡求俊乂置在弼諧肆令衰退之蹤亦忝延登之數臣敢不益殫愚慮仰贊宏規曰都曰俞願竊慕𢋫歌之善知足知止庶幾從告老之私臣無任瞻天仰聖感切屏營之至謹奉表稱謝以聞謝簽書樞密院事表銓部為真猶未經於滿嵗機廷簉二乃遽辱於頒恩遜避靡遑周章增惕中謝竊以官莫崇於執政職無重於本兵必求文武之全才以任國家之重事邉隅甫定尚勤宵旰之憂邦域以寧允藉弼諧之助豈應疲瘁可與幾微如臣者資實腐儒仕叨法從由久司於封駁故多積於怨仇十載歸閒仰戴乾坤之施一朝收召復觀日月之明不堪聽履之華復上垂車之請敢期誤渥俾贊洪樞血氣既衰止合奉身而去軍旅未學孰知師命之嚴玷書殿之清班忝儲扄之下客被繡韉於上駟束鏐帶以襲衣采食有加寵榮已甚兹蓋伏遇皇帝陛下人惟求舊政務圗新謂代言於受禪之初未忘孤迹逮趣還於更化之始深憫凋年豈云術業之可稱蓋自眷私之過厚遂容僥幸倍切凌兢臣敢不深感隆恩愈堅晚節老當益壯固欲殫報主之忠耄矣無能終恐負知人之鑒臣無任云云進三朝國史表吕伯恭三后在天軼洪猷於今古百王冠德紀茂實於典謨爰勒信書上干乙覽臣切以炎宋開萬年之祚裕陵發六葉之祥丕顯哲宗於皇徽祖淵神心之相授煒聖列之增光載纘武功疊西羌湟鄯之績稱秩元祀踵原廟丘澤之規紛綸圗諜之符璀璨梯航之貢輯衆髦而建學嗣養化源憲六典以建官世嚴朝著前揖商王之躅俯卑唐帝之勳運啓中興統承丕緒南陽基命建武之元號重開東觀細書太初之後闕不録博延新學論次舊聞大繼照以龍飛甫終萹於麟獲視諸故府配三聖金匱之藏副在有司為千載石渠之鎮於斯為盛莫之與京恭惟皇帝陛下孝通神明誠贊化育有典有則仰思祖武之繩紀動紀言下叶孫謀之燕播諸琬琰炳若丹青臣職總編摩功慙潤色莫測乾坤之藴第輸鉛槧之勤述羲農黃帝之書既垂成式由堯舜文王之道願軫宸衷臣無任瞻望闕庭竦懼屏營之至謹以三朝國史隨表上進以聞宰臣以下賀車駕幸祕書省表東觀書林久徯漢儀之覩西崑䇿府載瞻周馭之臨嗣三紀之閟謨軼百王之盛節臣等歡抃歡抃頓首頓首切以斯文崇替與世降升自我祖宗嚴載籍萃藏之地于時典冊踵乘輿游幸之書從容藏誨之求廣大畯良之聚炎圖再造華省一新爰親御於右文用仰繩於前武重明善繼太極丕承乙夜牘陳念初載綱羅之不易昕朝班入思中興儲養之有原乃臨三館髦彥之躔乃展列聖圗書之奧帝暉下矚光榮河溫洛之藏天藻昭垂跨過沛橫汾之詠湛露示醇釀之惠承雲宣純繹之音一日萬機曽靡齊居之暇九流七略獨煩清蹕之留蓋以恢稽古尚德之風夫豈為飾治樂成之舉聲明布濩慶澤汪洋恭惟皇帝陛下秩叙大經裁成王度多聞將求建事既惠顧於簡編大烹所以養賢復均頒於肴醳士心興起雅道流行臣等服在具僚身逄昌㑹第從臣之頌敢揚厲於鴻休近天子之光請具宣於德意臣無任云云知黃州謝表具官臣某言臣䝉聖㫖命臣解倉部之職出知黃州者臣惟提邉符而乘障愧非禦侮之才佩郡紱以長民莫稱承流之寄撫躬局蹐蒞事凌兢中謝竊以羣萬國之輿圗大一王之統御地分逺邇之别政有後先之差繄牧守必得夫循良則黔黎庶底乎康乂眷惟小壘介於長淮雖事簡而俗醇實望輕而責重登覽故迹多名勝嘯咏之餘參考前聞亦豪傑馳驅之舊肆求共理必簡異能如臣者朴拙孤蹤凋殘遺族冥心造化已絶意於紫青屈首簿書第研精於朱墨偶濫塵於論薦遂誤畀於蕃宣自揣庸虛若為稱塞兹蓋伏遇皇帝陛下錫天勇智受命溥將日月光華悉在照臨之下乾坤髙厚咸歸覆幬之中凡兹銅虎之頒尤謹玉關之戍曽何踈賤亦預選掄臣敢不宣布詔條輯寧閭里挈瓶守器誓力保於封陲毁瓦畫墁敢坐糜於廪祿臣無任云云謝史成受朝奉郎表曽子開裁成二帝之書仰資聖訓褒録諸儒之效俯逮孤生謬進官榮併叨恩賚省循非稱冒昧為慙竊以簡䇿之傳固多帝王之書為重文章之用非一述作之體為難在昔有邦若時稽古自周而上具載百篇之言由漢以還各成一代之史典謨之辭略而雅春秋之法謹而嚴子長雖謬於是非見稱事核孟堅頗推於詳贍或患文繁降及後人益艱是任或紀事支離而失實或設辭骩骳而不工或踈略抵牾之相形或取舍抑揚之未當歷觀前載兹謂材難矧兩朝功德之崇髙而五世聲明之富有以至俊傑瑰竒之士檮杌嵬瑣之姦載在信書傳之後裔宜得貫穿馳騁之學溫純深潤之辭追二典之光華垂百王之軌範如臣之鄙揣分無堪幼聞道於父兄粗知好古長論文于師友切慕著書然而植性昏冥受材濩落有淺見寡聞之纍無屬辭比事之長遭世盛明脫身冗散天祿石渠之奧蚤預校讐金匱玉板之文得參論次兹儒林之盛選實仕路之殊榮特達甄收莫非帝力周旋長育咸出上恩自視庸虛固難報稱雖勤劬於夙夜漫淹歷於嵗時闡發大猷豈敢希於作者整齊故事或可繼於前人甫臨汗簡之終適遘負薪之疾奏書天陛阻親望於清光拜賜宸庭莫與聞於褒詔豈期推賞并及罔功養拙藏愚久已逃於常憲因人成事兹復玷於異恩遜辭弗容驚惶失措此蓋伏遇皇帝陛下務尊先烈祗紹永圗謂祖考之功非形容之可既而子孫之孝在潤色之為能深詔有司共成大典蓋兼資於衆智不求備於一人每矜載筆之勤靡間吹竽之濫致兹瑣質均被鴻私螻蟻雖微素積愛君之念涓塵有補敢忘許國之忠陳州謝上表初緣細故輒丐徙州繼露危誠復求易地圗報未伸於萬一冒煩已至於再三自非仁恕之朝當在譴訶之域聖恩甚厚私願弗違視太守之章孱愚知幸望長安之日感涕難勝伏念臣託勢至孤叨榮過重謀身寡術易致於人非竊祿無功難逃於鬼瞰材微命舛禍薄災深方祗歷下之行忽遘漳濵之疾顧筋骸之素憊困藥石之交攻氣屬如絲識幾去幹已分身歸於厚夜不圗天假於餘生恍如夢寐之初回憯若醒醲之未解神明凋耗形體支離念官守之尚遙迫王程之有限內省尫羸之質豈堪撼頓之勞非敢自愛於疲癃實懼仰慙於任使幸修門之在望恃延閣之見收呌閽自言伏鑕俟罪蓋疾痛之加者呼父母而是訴精誠之至者動金石而非難果上惻於淵衷俾曲從於私便維兹藩輔密邇京師事簡民淳首被朝廷之化里安户佚稀聞枹鼓之音顧臣何人獲此善地可覩康寧之福皆緣覆護之恩矧嘗守於是邦有相望之仲氏流風未逺故事可詢重念臣昨守汝隂亦𨽻畿右始引小嫌而求避出於慮患之太周終明大體而復還良以至公之在上銘心敢怠粉骨難酬此蓋伏遇皇帝陛下聰明燭於四維而隆寬盡下威德加於九有而內恕及人篤遺簮墜屨之仁推藏疾納汚之誼太皇太后陛下處奧室之中而周知萬事據崇髙之勢而洞照羣情常懷大德之好生不忍匹夫之失所憫臣忝陪侍從之末察臣實嬰沈瘵之餘假借寵靈安全孤朽臣敢不體上之慈而哀矜于下念已之病而綏養斯民庶收塵露之微少答乾坤之施賀元祐四年明堂禮成肆赦表侑帝饗親既金聲而玉振赦過宥罪遂雷動以風行歡聲達於幅員協氣冲乎上下竊以躬事天之禮莫如王者之堂極嚴父之心是謂聖人之孝講兹巨典屬在熙朝即路寢以親祠兆于仁祖黜五精之並祭斷自神宗光照前聞啓迪後嗣恭惟皇帝陛下紹膺寶命祗遹先猷平成百度而不有其功覆載羣生而不尸其德謂時和嵗豐之效乃髙穹顧諟而然謂刑清武偃之祥乃七廟威神之致矧屬承祧之始永懷濡露之恩將伸報本之誠且展事生之道以祭恐數而瀆故遵三嵗之期以郊則逺而疏故度九筵之位季秋令月吉日上辛備法駕之儀協雅聲之奏牲牷博碩籩豆靖嘉元龜大輅之旅陳篆轂錯衡之輻凑并柯共邸按圗諜而充庭髽首貫胸袵衣冠而就列以引以翼有壬有林奠圭幣以告䖍舞羽旄而象德靈心合答精意戚通嘉得四海之歡增夀萬年之䇿尚念有司之庶獄豈無弗獲之一夫乃御端闈亟敷大號滌瑕蕩穢已責逮鰥空狴犴而縱縲囚開府庫以賜軍士布慶施德昭天漏泉彼泣辜弛網之仁推食解衣之惠方之于此不其狹歟臣忝綴從班適分州寄莫與奉璋之列徒懷拱極之心南京謝上表得郡便私未報期年之政因人易地更分京邑之權朝始去於故棲夕已臨於新郡伏念臣材不堪於巨用行有愧於古人蚤塵侍從之華寖冒藩垣之寵未踰再嵗更守二州既不能興教化於民使之遷善而逺罪又不能作聰明于外因以譁世而取名惟殫夙夜之勤期副焦勞之念矧彼淮陽之地舊為楚國之郊屬頻年昏墊之餘加比屋凶饑之後浚溝湟以疏積潦發廪庾以賑流民方竭力于經營遽䝉恩而罷徙國家别建都邑內壯皇居維王迹之所基視他邦而尤重掌離宫之管籥奉原廟之衣冠以屬微臣彌慚非據此蓋伏遇皇帝陛下矜憐舊物優假近班尚容環走于王畿因使周知于土俗奉承清問敢希宣室之歸攀仰末光未覺長安之逺誓當盡瘁少冀分憂至于事鞭朴以立威飾厨傳以干譽非明時之所尚亦私義之不為徐州謝上表懷章去國不啻三年荷槖入朝未淹百日復棲遲於民社驟違逺於闕庭迫義理之當然豈人情之所願竊念臣禀性固陋承學迂踈懷泥古之至愚抱守官之獨見豈特難堪於世用固已不善於身謀昨者召自留都處之宗伯屬郊丘之肇祀議天地之經祠執禮雖明趨時則戾已行之令豈孤論之能回不韙之誅敢偷安而茍免旋抗章而請罪䝉易地以示恩繼露微衷復頒溫詔終賴乾坤之造曲成犬馬之私假以使符置之善地循行閭里固多魚稻之饒周覽山川頗有江湖之趣夫何孤蹇獲此便安此蓋伏遇皇帝陛下寬裕有容包函遍覆將以招致芻蕘之論是用特寬斧鉞之威伏惟恩慈豈易報稱臣身雖在外義不忘君况仰賴於皇明忍自愆於官守深念長人之寄知無不為益堅許國之誠死而後已賀冊皇后表中闈肇建盛禮興行人神協謀夷夏胥慶竊以國家為天下之本后妃實王化之基致治所繇求端非逺恭惟皇帝陛下紹天駿命垂世永圗承七廟之吉蠲奉三宫之供養而長秋虛位六職曠官咨求淑人來相宗事上遵太母之訓下採有司之言鼓鐘在庭典冊備物坤元博厚已正於隆名婦順章明可風於率土臣身雖在外義不忘君誦造舟之詩想見光輝之盛申彤管之戒庶幾補報之忠賀上傳國寶表受命之符為時而出自天之祐維聖是承方拜貺於大庭遽均恩於率土官師動色海宇䝉休臣聞夫國璽之有去來猶周鼎之有輕重好治而惡亂舍昏而即明頃自有唐之衰荐更五代之季伏而不發殆且百年忽爾自歸將傳萬世所以表祖宗積善之慶告社稷靈長之休在聖與仁宜昌而夀恭惟皇帝陛下沉迪哲剛健好生參天地以成能垂子孫而作則果有神物是貽皇家固將配甘露以紀元豈止擬芝房而度曲臣職專守土志切慕君講稱夀之儀阻陪下列奏升中之頌敬俟方來唐宋元名表卷下之一欽定四庫全書唐宋元名表卷下之二明胡松撰宋生日謝禮物表史真翁具官臣某上表臣言伏䝉聖慈以臣年八十特遣使賜臣御筆溫言褒諭俾臣眉夀又賜臣金器香茶以光慶席臣巳即時望闕謝恩祇受訖者一人盛治正欣仁壽之同躋八􅐆衰踪亦荷康寧之敷錫敢期睿藻逺賚慶儀奉內府之珍竒激中扄之感佩臣頓首頓首誠歡誠抃伏念臣起身寒素遭世聖明依乘偶㑹於風雲遇合適符於魚水力未施於橫草位遽底於靣槐雖逼桑榆獲遂掛冠之請而眷深簪履每興當寧之恩時䝉親札之丁寧歲有生朝之賜豫矧今厚意復示殊恩貂璫飛鞚於川塗翰墨騰光於龍鳯謂臣浮生之稀有又過十春祝臣暮齒之再延俾逢千歲杯盤羅列盆盎錯陳率皆粟縷於兼金况乃環裝於百寶分上方之清馥掇正焙之龍芽顧惟窮陋之居曷稱便蕃之寵兹蓋伏遇皇帝陛下乾坤長養父母愛憐自執卷於潛藩暨秉鈞於初政撫存特異終始弗渝稽古無功巳愧於輜車乘馬偷閒絶望載新於龍勺彛尊臣敢不銘刻肺膚精䖍香火誓殫微悃祈歸美於非常尚覬餘生觀大勳於萬一臣感荷天恩不勝激切之至謹奉表稱謝以聞狀元謝及第表臣某言某月日誤䝉聖恩濫叨狀元及第者黃屋臨軒肆頒清問丹墀唱第咸錫殊科兹為士子之榮益顯文風之振臣某誠惶誠恐頓首頓首切以真人御極聖學造微屈至尊而延四方之豪謀正道而發千載之祕略去細故招徠讜言方驚大對之難酬敢意殊恩之普及伏念臣等久䝉樂育濫與觀光昧通經明道之方乏為史綴文之識况禮樂之制作何足以知賴皇帝之憲章乃所願學謹誦語言於紙上誤占英俊之選中俾釋布韋悉加紳笏兹蓋伏遇皇帝陛下聖由天縱善與人同明詔賔興豈漫修於故事昕庭親䇿冀有得於竒才上勤旒扆之觀下采芻蕘之賤愧無剴切例辱甄收臣等敢不思勵赤心愈堅素履淵源所自幸親見聖人之為師夙夜靡忘誓必以忠義而相勉臣等無任云云侍講說書官為經筵進講孟子終篇謝賜金帶牙簡同侍讀修史官謝賜御筵及鞍馬香茶進詩表臣某等言伏䝉聖恩以經筵進講孟子終篇賜臣等金帶牙簡并祕書省御筵及鞍馬香茶者華光講藝備觀亞聖之書蓬省賜筵并錫多儀之寵感洪恩而播詠瞻丹扆以揚言臣某等惶懼惶懼頓首頓首竊以漢帝論經虎觀侈賜衣之渥唐宗嚮學瀛洲疏給膳之榮意皆寓於隆儒禮特豐於接下矧軻書之妙㫖傳孔道之正宗由義居仁七篇之言靡不載垂憲貽後百世之王莫能違於穆熙朝若稽丕訓祖禹發明於元祐表臣敷繹於紹興逮聖神尊德以有為於問學逢原而自得細旃晝訪聆責難陳善之規峩辨星環探知性盡心之蘊華編甫徹謏聞奚禆疇侍言講說之勞暨著記纂修之職鏐鞶絢采復頒象齒之珍玉斚示慈咸綴麟臺之席上駟式調於沃轡團龍交粲於竒芬稽古所無省躬莫稱歸美以報拜手載朝贊至聖之大成述君臣之相說辭陳約禮逺希積翠之篇句寫賜箋俯效集仙之飲退慙斐墨曷對閎休兹蓋伏遇皇帝陛下居安資深守約施博覽大賢之論集興盛治之雍熙德醉從容秩太清之華燕幣將舄奕邁崇政之彛文臣等職愧寤疑恩沾同樂讀古書而尚友諒懷望道之思頌清廟以致平期盡事君之義臣等無任感天荷聖激切屏營之至謹各齊沭撰成謝恩詩隨表上進以聞知隆興府到任謝表吳永叔起廢寓里疏榮價藩臣罪積如丘山聖恩深於雨露恭惟皇帝陛下法度堯禹典則舜文數引公卿欲聞四方有水旱盜賊之奏親問守相要使庶民無歎息愁恨之聲豈應一介臣之微輒冒二千石之寄伏念臣學迂而僻志廣而踈居官無以踰人任郡率多廢事雖衆女望娥眉而交嫉實小人負乘器以招尤特荷陛下知非臣辜復以郡起式欽乃命爰疾其驅臣所領州云云臣常閲漢輿圖數唐職貢或治南昌賜侯王之印或分西道專採訪之權雖曰地雄亦因人重陳仲舉設孺子一榻清譽高於岱嵩王𢎞仲得文正片碑靈光射於牛斗逮我聖宋懿我孝宗升潛藩為統府之華表賜額用紀元之號首振吏治以開中興今天子聖明朝廷寬大乃眷玉龍之散吏就交銅虎之左符臣已於某月日到府上訖謹宣鴻化式慰黔黎紫馬朱衣雖動千里湖山之色玉珂金鑰尚思五更京闕之朝臣無任云云寧宗升遐慰皇帝表趙履常皇穹弗弔降此鞠凶黎民何辜罹此荼毒中慰伏以大行皇帝撫億兆衆踰三十年仁恕結乎人心恭儉根於天性清淨無作神明為徒故能消巨患若渙氷除宿奸如棄唾宗社祇叶朝野宴寧陟方奄聞率土震動恭惟陛下越自藩邸入承宗祧亭育之恩深付託之器重孝思方切悲慕奚任然而綴衣於庭羣公既皆聽命即位而哭百官莫敢不哀少抑至情永綏大業寧宗升遐慰皇太后表昊蒼降割宸極登遐羣方震驚萬衆號絶中慰恭惟太皇太后陛下隂陽合德夙夜同心勵相歷年順成多慶驟罹禍棘諒劇悲摧願裁弓劒之思勉副簾帷之託皇太子薨慰寧宗表皇支殞秀國嗣告凶地驚少海之翻天慘前星之掩矧凡黔首能不悼心中慰恭惟陛下道冒羣倫仁懷庶類哀元良之不淑惻慈念以何堪雖寢門常時遂缺三朝之禮然宗廟重事當圖萬世之基願釋聖心以安㝢內謝復官表真景元瞽言觸憲宜坐錮於終身慶澤詠徽乃悉還於舊物幸逾始望恩出更生臣感激感激頓首頓首伏念臣昔綴周行嘗誇內直花甎畫日久承寧考之恩蒼梧暮雲忽灑茂陵之血屬際飛龍之運首叨馳馹之招念非忘身何以報國勉圖初政之助庶弗辱先皇之知而臣學泥古陳識乖時變無袁盎之慷慨有汲黯之戇愚聖君非不受言自臣踈於開導國人皆稱有罪上獨示於矜容弗貶潮陽之八千僅奪駢邑之三百出晝如孟子豈懷悻悻之私在畝若劉生徒抱拳拳之意雖欲摩鉛而自效終虞復玷於孔艱遽頒紫詔之新盡削丹書之舊秩仍元士班視邇臣閒館珍臺愧茍偷於廩祿鈞天廣樂恍如侍於威顔人皆謂榮臣獨知懼此蓋伏遇皇帝陛下聰明天縱聖敬日躋方東朝丕衍於修齡而南靣躬臨於曠典導民以孝既洽四海之歡與物為春忍視一隅之泣釋羈魂於幽穸反逐客於囚山爰及顓䝉亦皆牽復臣敢不淬磨宿志湔滌曩愆犬馬之養無他惟篤愛君之義江湖之身雖逺敢忘在國之心臣無任云云進大學衍義表臣德秀言伏惟九月十五日中書省劄子為臣具奏乞投進所撰大學衍義奉聖㫖令疾速投進者伏以汙竹雖勤何補聖經之奧食芹欲獻誤䝉天語之溫以十年纂緝之餘欣一旦遭逢之幸臣德秀惶懼惶懼頓首頓首惟大學設八條之教為人君立萬世之程首之以格物致知示窮理乃正心之本推之以齊家治國見修己為及物之原曾子之傳獨得其宗程朱以來大明厥㫖逮師儒之繼出有章句之昭垂且少所服膺晚而知趣謂淵源逺矣實東魯教人之微言而綱目粲然乃南靣臨民之要道曩叨侍從論思之列適當姦諛䝉蔽之時念將開廣於聰明惟有發揮於經術使吾君之心炳如白日於天下之理洞若秋毫雖共兜雜進於堯朝豈魑魅能逃於禹鼎不量菲薄欲效編摩遽罹三至之讒徒結九重之戀既投閒而置散因極意以研精畎畝不忘君每惓惓於報上藩牆皆置筆幾矻矻以窮年首剟聖賢性命道德之言旁採古今治亂安危之迹必提其要皆聚此書凡諸老先生之講明粗加該括於君子小人之情狀尤極形容載瞻海嶽之崇深期效㳙埃之禆補兹蓋伏遇皇帝陛下乾旋坤運日就月將於緝熙單厥心基命遹隆於成后念終始典於學遜志克邁於高宗方將切磋琢磨而篤於自修定靜安慮而進於能得事欲明於本末理期貫於精粗適萃成編冒塵清燕止其所止願益加止善之功新以又新更推作新民之化臣干冒天威無任激切屏營之至臣所撰到大學衍義四十三卷并目録共成二十三帙用黃羅夾復封全謹隨表上進以聞謝宣召入院表伏以來從南服未宣民版之勞召置北扉猥被宸綸之寵光生里巷榮動簪紳竊觀列聖之用人惟待詞臣而加禮蓋於言語文章之外責其論思獻納之忠或雖忤㫖而暫閒終必弃瑕而復用修除翰苑在環滁出守之餘軾侍禁庭亦赤璧歸來之後豈非加嵗月則其文老涉憂患則其慮長乃登邃嚴以備顧問如臣者才華弗競戇拙自將掌先皇內制者六年每慙越爼逮陛下初元之再命竟許循墻以馳驅州縣之頻且廢弃山林之久見聞寖少藝業益荒結茅屋於雲邉已甘終老瞻玉堂於天上若隔前生敢云白首之重來誤辱清衷之妙簡獲玷久虛之選幾成三入之榮兹蓋伏遇皇帝陛下肆筆成文解絃更化志孚羣聼欲下山東之書念在邉陲或訪河西之事必有端良之彥以充供奉之班奚取臣愚俾承人乏臣敢不益堅晚節思答隆知賜宫錦而嘉草詔之能雖非敢望録金鏡而任進賢之要實所自期臣無任進仙源類譜表天發慶源衍皇攴於有永國嚴大典章烈祖於無疆令日載蠲上儀交舉竊以建邦啓土胄本出於神明扶世導民德巳參於化育厚裔苖之憑藉培厯運之靈長炎宗肇興上通元造昭陵在御專以至仁垂光覃被於雲來流澤涵濡於億兆厥開真主並緝曠文譜增屬籍之華牒冠史臣之録發揮昌緒見小宗大宗之藩中載宏綱示特書屢書之重源流綜貫典冊崇成繇宣祖以來盛星羅於霄極若明道而後實日靖於洪圖振振信厚之風皥皥泰和之治銀潢滉漾玉版閟嚴千八百國之封先乎異姓五三六君之籍允也同符懿鑠龎洪函生闓懌恭惟皇帝陛下隆恩睦族駿惠紹基帝系綿延鑒支葉本根之輔皇猷渾灝思規摹矩矱之尊式是丕彛對於華旦臣等參聮庭宷親覩邦祺垂統聿傳陋枊芳永泰之譜休聲逺繼賡石介慶厯之詩臣仰瞻天顔喜躍屏營之至謹以仙源類譜隨表上進以聞知泉州謝表具官臣某言某月日䝉聖㫖命臣知泉州者伏以簜節九州觀風何有桐城千里假寵過優俶見吏民敬宣詔㫖中謝伏念臣性資戇拙學術迂踈入侍禁林僅守勿欺之節出乘使傳曾微可録之勞每慙虛負於明恩敢謂更叨於劇寄泉雖閩鎮古號樂郊其奈近嵗以來浸非昔日之觀征𣙜太苛而蠻琛罕至潦傷相繼而農畝寡收宗枝之廩倍增郡帑之儲赤立銀溢於山者亡有嵗為旁郡而代輸粟生於地者幾何日伺鄰邦之轉餉嗸嗸乎鞭撲之苦盻盻焉帆檣之來凡兹數端尤為深病顧雖一旦不可寧居竊自揣於庸虛凛莫知其稱塞此蓋伏遇皇帝陛下燭臨萬國器使百工念臣篤於事親期欲便甘㫖之奉知臣嚴於律己或能銷貪鄙之風進邃職以奬行錫溫綸而加勉敢不欽承異渥誓答隆知廉平而吏民敬焉雖莫望漢人之政忠信則蠻貊行矣願恪遵孔聖之言臣無任云云謝除禮部侍郎兼直院侍讀表龍飛九五幸逢真主之興驛召再三俾造邇臣之列職親地邃恩巨人微中謝臣竊惟國勢之重輕率視人材之聚散王多吉士殆猶鳴鳯之集梧桐朝有直臣則若猛獸之衛藜藿伏念臣學雖志道材匪踰人忝乙第於慶元臨軒之初綴三館於嘉定改絃之始鼇扉久直曾微華國之文螭陛屢前徒抱愛君之志越從豫節洊易守藩尚期宣室之席前忽痛鼎湖之弓墮羲輪東出方薄海之仰瞻漢札西來先時髦而取召身未登於詞掖班巳躐於儀曹金馬玉堂假儒臣之榮寵蘭臺石室窺史氏之祕藏自惟何人叨此殊奬兹蓋伏遇皇帝陛下德全純懿學務緝熙念皇天后土之照臨居懷兢畏察君子小人之消長實兆興衰謂臣雖無適用之材知臣粗有不欺之節擢躋邇服許貢微忠臣敢不戒在茍容期於美報惟禮可以為國願廣晏嬰之言非道不敢前陳竊效孟軻之敬臣無任云云謝除户部表十連竊寵愧藩閫之罔功一札遄歸叨地官之進長班躐陪於踐斗懼深重於履氷中謝伏念臣素守朴忠濫膺迪簡曩被初元之召首躋邇服之榮自退屏於山林寖逖違於軒陛憂時之髮益白悵去國之十年戀闕之心為丹敢忘君於一飯屬䝉起廢再玷承流皂蓋分符氈復既還於舊物青冥授鉞繡行仍忝於故鄉曽坐席之未溫忽賜環之巳及方躬攬宏開於公道而彚征必萃於羣賢敢圖孤踪之漂流亦辱清朝之記録且民部周司徒之任豈惟稽户口於版圖顧尚書古納言之官蓋實專喉舌之樞要誤拜演綸之渥冒升曵履之華退省駑疲曷勝蚊負兹蓋恭遇皇帝陛下乾剛天健蓄懿日新親庶政以厲精大明黜陟臨百官而昭德洞察忠邪念臣嘗參紫槖之聮知臣粗厲素絲之節輒還近綴俾侍清光臣敢不期稱隆私勉堅初志生財有道雖慚源流本末之知事君勿欺願竭獻納論思之報江東漕謝到任表兩螭夾侍久㸃近班四牡載馳叨分劇部假中祕隆儒之寵為外臺將指之光望過所期感深以惕臣某中謝伏念某材非適用幸有逢辰屬漢廷更化之初首唐室登􅌡之選金鑾夜直承密命者六朞玉陛晨趨對清光於再稔凡吮墨濡毫之任皆振纓峩辨其間吏責既稀所願優游於邇列主恩未報寧忘眷戀於本朝其如親闈喜懼之年當謹人子清溫之職輒援公輔辭翰林之請庶幾潘嶽奉版輿之權分太守之符日須成命出少府之節遽冒殊恩懷章而過里門閲宿而臨封部敬卜中和之節重宣寬大之書輅傳初馳旄倪爭覩謂朝廷所以輟柱下之史蓋聖主所以惠江左之民因博采於風謡頗究知其疾苦以垂罄之家而困追胥之目以屢豐之嵗而多流徙之人官無足證之簿書里有難平之徭役文移星火不勝胥吏之誅求牒訴丘山半為賦租之煩重興言及此勿救可呼輒殫朝夕之咨諏兼體公私之緩急賦難遽省盍漸捐賦外之征民未易蘇當先去民間之蠧竊自量其綿薄恐終負於選掄兹蓋伏遇皇帝陛下洪造曲成大明博照念臣志存將母俾獲便於㫖甘知臣學本愛人欲稍觀其政事肆加邃職仍畀重權臣敢不以阜俗為阜財之方以恱民為恱親之本灌輸所仰愧初無鞭算之能撙節是先惟敬佩玉音之訓再知泉州謝表奉祠居里每勤北極之瞻進職守藩復忝南州之寄甫臨舊服恪布寬條臣某中謝臣聞天道至仁風霆無競日之怒聖君大度山林鮮終棄之才韓安國起於徒中栁宗元用於貶所皆為長吏蓋值明時微臣乏漢唐二子之能陛下守祖宗萬年之法昨者金華之入侍溫然玉色之下詢曷嘗因諌以罪人自愧格君之無術方抨彈交上獨亮秋山之愚逮霈宥一頒盡洗元城之玷何嗇於議罰而樂於用恩庸見九重之本心不忍一眚而弃物既班次對又秩殊庭沒齒飯蔬夫亦奚憾建牙作屏則匪所期敢圖皂蓋朱轓之華仍涖紫帽清源之境念昔先帝付臣此州玩愒三年不聞善最侵尋半世復見遺民屬當公私凋敝之餘不勝上下煎熬之急七邑而二為煨燼十室而九乏蓋藏禁旅雲屯軍餉每難於宿飽宗藩日茂俸緍半出於鑿空自省迂踈若為經理兹蓋伏遇皇帝陛下道心淵靜德性昭融不以諛恱為愛君故略臣疇昔嬰鱗之譴不以聚斂為體國故取臣平時求牧之長畀以舊封責其來效臣昔猶將母今獨携孥祿弗逮於養親志維遄於報上拊摩瘡痏冀邦人生意之復還培溉本根為聖朝元氣之一助代謝除工部侍郎表秦少游具官臣某言某月日誤䝉聖恩除臣為工部侍郎者入司太僕已慚稱述之虛進二冬官尤愧選掄之誤顧叨塵之巳甚念辭避之弗容承命惟驚撫躬以懼臣誠惶誠恐頓首頓首伏念臣身承家訓世受國恩荷先朝特達之知䝉二聖生成之賜左選都司之要既獲備員內閣祕殿之嚴更容通籍以至外專兩郡內閲三卿徒為歲月之淹莫克事功之效方虞罷黜退伏於田廬敢意推遷遽陪於法從材微任過恩重報難此蓋伏遇皇帝陛下盛德海涵至仁天覆以臣父某歷四朝而被遇登三事以退居知父子至情欲慰桑榆之景念君臣難遇遂收菅蒯之才豈惟一敝族之榮時乃百執事之勸臣敢不鞭策駑蹇淬厲鈍頑以捐軀報國之誠為竭力事親之義臣無任云云謝除翰林學士表汪彥章非才冒寵久誇文石之班優詔傳恩趣上玉堂之直既假朝章之煥仍分御府之珍遜避莫從叨塵為懼臣惶愧惶愧頓首頓首伏以文章雖本一技命令實行四方故自古禁林之除極當時儒者之選矧今多士尤重他官內敷帝制之坦明外應軍書之警急學非閎博難酬跋燭之咨思或淹遲將誤掣鈴之召當待瓌傑來承燕閒如臣者猥以諸生起於遐裔首尾䇿名之二紀中間不調者十年㑹真人光復之初陪列辟駿奔之後驟膺簡拔遍歷高華既時巡清蹕之屢移方驛召羣英之未至執羈在道視草無人姑從東省之聫兼候北門之對嘗因多病不勝狗馬之心願賜寬恩任逐桑榆之暖卒云代匱遂使為真兹蓋伏遇皇帝陛下志靖華夷憂深宵旰勵精於學每求稽古之臣罪巳以言欲致銷兵之福治雖得要人豈當材臣敢不仰佩眷知力思補報絲綸行逺顧奚俟於丹青海嶽居微或有資於塵露臣無任云云辛亥年正旦遙拜道君皇帝表伏以接千嵗之統推神策以膺期上萬年之觴御端朝而受祉若稽故實遙企清光恭惟太上皇帝陛下體道粹精怡神冲漠方席宗祧之慶遽成國步之艱帝堯游汾水之陽久忘天下文王遇明夷之卦益見聖人臣自逺威顔荐更時序當璣衡之載復悵旒扆之猶賒鴻鴈雖賔莫致帛書於沙漠風濤中阻徒瞻雲氣於蓬萊賀赤烏白鵲表治格時雍祥昭羽屬生皆異禀凝丹素以成形出若相符信圖書之上瑞必有召此來非偶然中賀伏以烏本陽精鵲知嵗事方聖祚紹隆於大德適天時應在於金行宜爾珍禽呈兹瑞質孝能致哺煌煌儀則之新喜必傳音翯翯羽毛之潔用明諸福之畢至孰謂二蟲之無知恭惟皇帝陛下保合太和緝熙純嘏跂行喙息皆安性命之情嶽貢川珍盡發乾坤之蘊是生神物來相昌期將合采以成章乃同時而薦祉徊翔有煒協周家王屋之符粹美而真異莊子雕陵之見既九重之有託寧三匝以求安臣等幸列近司喜逢休應有生咸遂宜多可俯之巢同類相求將致來儀之鳯羣臣上皇帝勸進第一表天命有歸將嗣興於景運人心胥恱咸昵就於至仁雖晬表之非遙猶鴻稱之未正辱居近列殊震危衷中謝伏念臣叨受國恩早居法從方百六朝廷之厄㑹偶二三輔弼之無人猥以庸虛參其謀議旋屬敵情之變遽成天步之艱二帝出郊既䝉塵而不返九祧乏祀將攝祼以為名所宜引死以力爭顧獨包羞而茍活生雖可耻志則甚明蓋天下屯危方苦存仁之未定而古人事業唯觀濟否之何如使生靈相顧以無歸雖溝瀆自經而奚益輒慕周勃安劉之計庶伸程嬰存趙之忠儻奉真人光膺神器嗣一祖八君之傳序慰四方萬里之謳吟誓伏歐刀敢煩司敗幸率土相從而歸啓且諸侯不輟以事周雖國鴻休實臣素志願假須臾之死前瞻咫尺之威伏惟皇帝陛下中奮英明外符信順受圖高邑之壝趣駕未央之宫盛九賔之禮以見羣臣輯六獻之儀而朝清廟時方多故幸少留黃屋之心臣既無功願自謹青宫之職謝除兼侍講表臣某言伏奉制命除臣兼侍講者視草禁嚴談經閒燕叨近侍進言之責極儒臣稽古之榮拜命以還撫躬而懼臣中謝嘗謂天縱將聖奚須博學以成名王求多聞蓋欲取人而為善故自古右文之世必留心講藝之官如臣至愚何以仰稱兹蓋伏遇皇帝陛下卓然上知濟以克勤同漢祖之英論道不忘於息馬笑齊侯之陋讀書見議於斫輪而臣猥以非才膺兹遴選第竭簡編之習仰承帷幄之光雖海嶽深崇顧何取涓埃之細然聖賢聞見或不如農馬之專謝進書特授左中大夫表臣某言伏奉誥命以臣再修到元符庚辰所編詔㫖等特授臣左中大夫者國史補亡雖日勤於采獲君恩馭幸乃嵗冒於遷除矧方抱於遺弓忍獨榮於載筆上還不獲退省為憂中謝恭以太上皇帝聖學高明天資仁厚承熙洽百年之後享安榮兩紀之餘凡今言動之所傳視古詩書而無愧祇緣誤國之相繼循致陟方而不還既海隅皆服於堯喪宜柱下一新於漢注夙䝉垂付適幸纂成豈謂皇帝陛下明發有懷兼收罔棄嗟夏時之既失於杞莫稽幸商頌之復全以那為首特懋存書之賞猥霑承學之臣敢不仰奉殊私俯殫綿力裒中朝副墨之要俟良史殺青之求穆王御駿以來歸巳辜此望孔子感麟而有作尚見其人謝授新安郡侯表臣某言准告命伏䝉聖恩以宗祀赦文授臣新安郡開國侯加食邑三百户者禮洽中天慶覃外服猥奉十行之詔就加五等之封臣中謝伏念臣積冒恩私浸踰分願作偷閒於異縣䝉起廢於偏城久客還家方憩南飛之鵲通侯授印忽成左顧之龜雖滲漉以惟均何遭逢之獨異兹蓋伏遇皇帝陛下陶鎔萬類藩飾羣工屬宣宗之受釐罄寰區而䝉福臣適臨本郡仍胙鄉州宋人洴澼以得封望胡及此漢將銀黃而誇里榮乃過之寵既逮於子孫忠敢移於生死臣無任云云謝泉州到任表恭承休命就易名藩去父母之邦接淅敢同於他國問蠻夷之俗褰帷如在於中州責重捫心恩深隕涕中謝伏念臣昨從祠館叨領守符素號迂踈無問馬及羊之智乃䝉安便得維桑與梓之州二年而勞力勞心一身而畏首畏尾力祈罷免反冒遷除雖賣劒買牛老猶堪於渤海然舉頭見日身益逺於長安茲蓋伏遇皇帝陛下總核百王照臨萬國眷方隅之瀕海須師帥之得人故遣近臣往綏遐俗况今閩徼莫盛泉山既旁接書文之同當尤懲獄市之擾臣敢不仰遵寬大俯厲衰殘講求百粵之宜參諸禹貢奉上三年之計對以春秋皇太后還闕賀表伏審太皇后旋輿朔漠正位東朝唯一人修不已之誠故四海睹非常之慶恭惟皇帝陛下德配高厚孝通神明躬行曽閔於九重力奉姜任於萬里雖天人之交相實古今之未聞十載中天瞻鬱鬱葱葱之氣一朝廣內賦融融泄泄之詩於昭夢日之祥永享含飴之樂臣屬嬰官守阻造闕庭方歎唐朝屢下建中之詔忽聞漢殿一新長樂之儀遙知坤極之尊莫望天顔之喜謝謫永州居住表孱愚冒寵久依日月之光盈滿延烖自處雷霆之下䝉聖恩之寬大與善地以生全罪大心寒威深涕落中謝伏念臣初無稱道積有悔尤所當退養於罷癃乃復浸成於老悖忽聞威命適在窮途冒風雪以疾馳越江湖而跧伏非恃冕旒之察難逃鈇鉞之誅兹蓋伏遇皇帝陛下剛健法天聰明稽古干戈不用再臻全盛之時刑賞何心一付至公之論而臣靡思兢慎仰負函容瓶居井湄雖有措身之地狐正丘首未知歸骨之期賀皇太子正位表伏審顯膺寶册升位春宫臨軒行曠古之儀見廟示承祧之重恭惟皇太子殿下分輝寶緒育粹璿源挺天人岐㠜之資禀神聖狥齊之教當周室本支之盛獨冠百男宜漢家羽翼之成無煩四皓前星外炳洊震中潜某幸列宗枝喜隆邦本河潤九里方率族以依仁月有重輪願登歌而薦祉謝除樞密使表臣某伏䝉聖慈授以樞密之職牢辭弗獲者執柄於中久汚樞密之地進班其首更叨綸綍之恩䝉眷奬之非常私瑣材而不巳安危所係榮懼交深臣惶恐惶恐頓首頓首伏念臣生江湖之鄉非廊廟之器偶扞防於牧圉䝉記録於冕旒當中興無文武之才有慙吉甫乃一見受腹心之寄自比留侯荐膺推擇之榮遂處弼諧之任謀參帷幄職總韜鈐永言國步之屯方賴廟謀之勝外有交侵之強敵內多竊發之姦民兩河未復於輿圖二聖尚勞於嶽狩非兵莫濟得士斯昌豈伊章句之腐儒堪此朝廷之大任兹蓋伏遇皇帝陛下治先稽古志在宅中躬堯舜之仁雖欲躋民於富夀攄高文之憤不忘克已於憂勤詳延左右之臣猥及中下之品臣敢不兼收羣䇿務究逺猷念國家嘗膽之憂適當今日豈臣子捐軀之報或後古人臣無任云云代辭節度使表誤恩隆洽久䝉曠職之譏小巳兢慚敢緩辭榮之請具輸愚懇仰冒隆威中謝伏念臣早濫褒揚浸階華近雖孤忠圖報誓糜殞以為期然晚節知非悟滿盈之可戒昨侍言於帷幄祈休迹於田廬甫解煩機遽頒異數以章句小儒而切授方之寵以斗升素志而叨制祿之優方渙號之巳行固牢辭而莫獲坐貪名器荐歷嵗時若猶冒昧以自如將至顛隮而靡悔伏望皇帝陛下特垂公聼俯諒忱辭鐫築壇節制之名守弼亮允釐之任豈獨少安於分願固將無纍於恩私既聖度曲全諒保益謙之終吉况天威未逺敢忘歸美之餘忠代汪樞密辭免表入參廟算方俟黜幽進長樞庭更叨圖舊仰荷褒揚之過實深盈滿之憂敢布腹心仰干旒扆中謝臣竊以聖主之用人也必量其材之所至忠臣之事主也先度其力之所堪故為之上者靡傷知人之明為之下者得逃曠職之纍一失此道兩乖厥宜如臣者初乏經綸特緣遭遇二紀服周行之末一朝居多士之先昨叨近弼之除已過平生之望豈有方更於晦朔居然躐次於鈞衡雖至無知敢忘自揆伏望皇帝陛下以隆寬盡物以獨斷馭臣知愚誠蓋出於由衷於成命何嫌於反汗别求賢佐共圖宏濟之功無使孤蹤益重疾顛之禍代汪副樞辭免表聖神有作方收海內之人豪綿薄何功遽執朝廷之兵柄顧超踰之已甚雖庸懵以知辭中謝竊惟樞管之司實次鈞衡之任唯時初載順信獲助於天人宜帝逺圖安危注意於將相倘以小人而大受孰宣元老之壯猷如某者生本寒鄉出陪多士早從外補甘心簿領之勞沒齒周行敢意功名之㑹昨屬裔夷之謀夏猥承明詔以臨州內撫三軍本無竒䇿外乘一障僅守故封㑹帥幕之肇開總兵符而入侍扞防牧圉跋履山川逮九五御圖之初預三千同德之列負羈絏而巡天下自知罪戾之多聽鼓鼙而思將臣敢幸搜揚之及既委腹心之寄仍加體貌之優非不願榮懼終速謗伏望皇帝陛下特垂淵聼俯諒危衷收渙汗之誤恩責捐軀之後效義非所處雖匹夫不可以利回情有可矜在明主固容於理奪建寧軍節度使謝表呂吉甫備嚴近之選而抵非常之愆當清明之朝而罹甚重之譴孽乃自作咎將誰歸伏念臣起自諸生暗於大道持窽啓之聞而欲經於事變信呻吟之得而希掛於功名分既過逾理宜顛越矧先帝有為之始乃羣材願效之時輒先要津以閡疑路雖預討論者三四事而參幾務者一二年凡是蠧國害民之由實臣懵學誤朝之致豈亦下流之所處更令衆惡以皆歸偶失當時士師之刑難逃今日司直之論尚䝉善貸未置嚴誅特從四裔之遷以正三凶之化衰疲逺謫人皆知其難堪親愛生離聞者為之太息伏惟皇帝陛下天仁自得聖孝先充撫弓劔之遺藏每加悽愴顧廟堂之舊物寧不䀌傷特非毁之至深猶典刑之為屈龍鱗鳯翼已絶望於攀援蟲臂鼠肝一冥心於造化涕逐言出莫知所從浙東提舉到任謝表朱文公擢於偏壘付以外臺便道造廟單車詣部延見父老問其疾苦之由宣布詔書諭以丁寧之意榮逾望表懼溢情涯中謝伏念臣生長田間棲遲林壑居然朴拙見謂迂踈潛心切慕於師承行已敢干於義命㑹逢聖旦參預時流驟自草萊起分符竹乾坤大德施且不資螻蟻私情報於何有屬歉嵗民無艱食謂愚臣職有微勞寵之冊府之華畀以近畿之節雖駑馬之十駕後者鞭之然鼯鼠之五窮技止此耳毋乃纍公朝之選重以為多士之羞兹蓋伏遇皇帝陛下闢舜四門馭周八柄欲尺寸之長並用致孱弱之末亦收比奉對揚親叨臨遣大明委照不棄負薪之言零露疏恩更下賜緡之令顧憂所在稱塞為難臣惟當恪意講求因時施舍不能則止戒小人之貪榮當官而行慕古人之報國庶殫毫末上答丘山臣無任云云南康軍到任謝表迂愚無用久陪香火之班臨照不遺驟假兵民之寄懇辭弗獲宣布云初感激涕零愧深汗浹中謝伏念臣受材凡近賦性顓䝉徒能讀古人之書夫豈識當世之務頃䝉登進獲奉清閒繼逺迹於丘樊遂閲嵗華之久顧馳心於魏闕敢忘葵藿之誠中兩奉於除書亦屢祗於名節銜哀抱病既莫效於驅馳假寵疏榮反謬膺於眷奬方誓堅於素守庶少答於殊知豈意因仍復階任使論資校考既已極於超踰揣分量能懼愈難於稱塞矧自乖於夙志又仰負於前恩雖嘗控瀝而莫回終坐懦庸之無守遂扶衰朽暫别故山巳見吏民具宣德意豈曰昨非而今是實繇義重而身輕此蓋伏遇皇帝陛下性得堯仁道高舜哲念安民之不易故慮尤軫於逺方謂知人為甚難故用或收於棄物致兹孱瑣亦備使令臣敢不仰奉詔條俯詢民瘼倘粗聞於疾疢詎辭撫字之勞冀少假於旬時卒上退藏之請尚全末路克對寵光臣無任云云潭州到任謝表衰病卧家不堪驅使誤恩分閫重玷選掄雖屢控於懇辭顧曲勤於褒諭寵榮實異感懼難勝亟扶曳以就途已支持而視事中謝伏念臣迂踈末學灾患餘生得陪香火之班豈復冠紳之念海瀕牧養尚愧強顔嶺表蕃宣幸䝉反汗豈期巨屏洊拜明綸昔獨避禮樂之華今專展詩書之試况學兼嶽麓修明逺自於前賢而壤帶洞庭鎮拊近煩於元老俾承二任孰稱萬分豈惟冒辭逺就近之嫌抑恐為知人安民之纍雖欲量能而易地自知無力以回天勉見吏民具宣威德茲蓋伏遇皇帝陛下文明出治仁孝保邦四方無虞尤軫一夫之不獲九德咸事尚憂片善之或遺謂臣有討古之勤以臣懷澤物之志假之師帥之職責以治教之功臣敢不仰佩訓辭俯殫學力雖馳驅靡及唯知趨事之誠或黽勉不前願遂歸田之請臣無任云云致仕謝表臣熹言四月二十三日凖尚書省遞到勑牒一道伏奉聖㫖宜守本官致仕臣巳於當日望闕謝恩訖者投閒置散方疑宿負之未償引户校年忽慶湛恩之純被適符忱請遂沐殊私揖杖知榮戀軒增慨中謝伏念臣聖朝賤士幽谷鄙生自審凡才每抱遺經而永嘆人嗤僻學雖逢盛世以何施乃誤選掄過叨任使然計出蕃而入侍善無毫髮之稱獨聞倡僞以黨姦罪有丘山之積果煩清議卒抵大呵幸夙簡於皇明得下從於輕典迹巳安於氓里祿猶寄於朝班出入三年未能寡過周旋再赦亦既䝉恩迄臻告老之期亟决歸田之計尚意拘縻於謫籍豈容遂休佚之懷暨聞播告於臺評方喜有允俞之望本原所自㑹幸何多此蓋伏遇皇帝陛下神聖自天文明周物當彼忠佞交拏之際既皆判别而不疑逮其精華欲竭之時一與休息而無間智仁兼盡威德並流豈但一夫獨為私幸臣敢不仰陶至化俯遂餘年廣厦細旃雖已絶雲天之望東阡西陌尚難忘畎畝之忠生復何為死而後已一云仰潛至教益厲初心凛嵗月之無多雖已不堪於把玩悵淵氷之未免獨何敢怠於戰兢誓畢餘生仰酬大化落祕閣修撰依前官謝表臣熹言臣昨於慶元三年正月二十七日凖尚書省劄子節文臣寮奏臣罪惡乞與褫職罷祠奉聖㫖依劄臣照㑹臣即於當日望闕謝恩解罷職名仍奉表稱謝去訖今於月日復准都進奏院遞到月日告命一道付臣落祕閣修撰依前官者彈文上徹已幸免於嚴誅詔墨下頒復寵加於明訓閲時既久祗命更新感極涕零懼深首隕中謝伏念臣草茅賤士章句腐儒惟知僞學之傳豈適明時之用頃叨任使已屢奏於罔功旋即便安復未能於寡過致煩重劾盡出宿愆謂其習魔外之妖言履市㕓之汙行有母而嘗小人之食可驗恩衰為臣而高不事之心足明禮闕以致私故人之財而納其尼女規學官之地而改為僧坊諒皆考實以非誣政使竄投而奚憾不虞恩貸乃誤保全第令少避於清班尚許仍居於散秩當璽書之來下恍嵗律之還周視要囚詎止於旬時蓋存遷就逮數惡難從於末减猶聽省循口誦以還心銘敢墜此蓋伏遇皇帝陛下仁兼覆載明極照臨作福作威總大權而在已曰賢曰佞付公論於得人謂罰刑固足以懲姦而播告豈容於匿指式敷顯號遍警具寮臣敢不深省昨非細尋今是年齡晼晚雖悲後效之無期肝膽輪囷尚喜孤忠之有在誓堅死守覬答生成落職罷宫祠謝表臣熹言臣前任祕閣修撰提舉南京鴻慶宫某年五月十三日已該滿罷至二十七日伏准尚書省慶元二年十二月劄子節文臣寮論臣罪惡乞賜睿斷褫職罷祠奉聖㫖依臣已於當日謝恩祇受訖者罪多擢髮分甘兩觀之誅量極包荒姑示片言之貶逮復尋於白簡始知麗於丹書鐫延閣論撰之名輟真祠香火之奉兹為輕典允賴洪私捧戴奚勝感藏曷喻中謝伏念臣草茅賤品江海孤生蚤值明時巳誤三朝之眷奬晚逢興運復叨上聖之深知召自藩維擢參帷幄略無可紀足稱所䝉暨逺去於朝行即永歸於農畝然猶賦之佚祿使庇身於工祝之間置在清流容厠迹於圖書之府所宜恭恪或逭悔尤乃弗謹於彛章致自投於寬網果煩臺劾盡發隂私上瀆宸嚴交駭聞聽凡厥大譴大訶之目已皆不忠不孝之科至於衆惡之交歸亦乃羣情之共棄而臣憒毦初罔聞知及此省循甫深疑懼豈謂乾坤之造獨回日月之光略首從之常規既俾但書於薄罰稽眚終之明訓儻許卒遂其餘生是宜衰涕之易零已覺大恩之難報此蓋伏遇皇帝陛下堯仁廣覆舜哲周知謂表正於萬邦已極忠邪之判則曲全於一物未傷黜陟之公遂使冥頑獲逃竄殛臣敢不涵濡聖澤刻厲愚衷雖補過以修身無及桑榆之暮景然在家而憂國未忘葵藿之初心瞻望闕庭臣無任云云辭免待制仍舊充祕閣修撰提舉南京鴻慶宫謝表臣熹言伏䝉聖恩以臣纍奏辭免煥章閣待制特降睿㫖依臣所乞仍舊充祕閣修撰提舉南京鴻慶宫者假寵過優居速冒榮之愧封章屢卻退深留令之虞敢謂天慈訖從人欲恩深莫報感極何言中謝伏念臣早以迂儒濫塵官簿晚逢興運誤簡淵衷首頒召節之光華促侍經帷之清燕趨箱待對復過借於寵光挾䇿陳詞竟何裨於帝學旋奉閣勞之詔適諧退處之私雖竊便安甫深依戀第顧山林之逺迹難通禁闥之近班亟冒威顔荐輸卑悃幸所陳之大義已孚於未拜之前故引避之微誠得遂於終辭之後然匪聖神之洞照敢期耉陋之曲全而况內閣簡編未替兩朝之深眷舊邦香火有嚴四聖之真游足安垂盡之期允謂非常之遇此蓋伏遇皇帝陛下仁涵萬有德奉三無謂臣於勸講之功雖無所就察臣所懇辭之意悉出於誠特畀俞音使償本願臣敢不益堅素守仰稱鴻施景雖迫於桑榆力難報國身未填於溝壑詎敢忘君臣無任云云謝除待制侍講修撰實録表臣熹言伏奉告命授臣煥章閣待制侍講又准勑差兼實録院同修撰者分閫南州愧蔑一毫之補論經內閣恍驚二命之頒畀史職以仍兼戴上身而愈重藏逃莫避局蹐靡容中謝竊以王求多聞是惟建事帝入西學于以上賢當始初清明之朝資朝夕論思之助作於心而關政事必求其原修其身以及國家要知所本非精誠之有恪何論說之足云視孟軻之敬王始不負聖人之學為張禹之持祿殆將貽天下之憂况薦紳之所難又載筆之為重顧頭白汗青之可誚豈槁項黃馘之能為念昔先臣嘗掌兹事正熙寧元豐之殽舛嚴於朱墨之分辨元祐紹聖之譏誣炳若丹青之著茍無家業曷踐世官懵而居之吁可危矣伏念臣見聞甚狹才識非長開七袠之殘年荷三朝之異眷頃叨崇正之選嘗獲遂於終辭兹玷邇英之聮靦莫從於素守此蓋伏遇皇帝陛下言稽往訓動法成謨以緝熙光明之美而佛時仔肩以剛健篤實之資而日新其德念遺大投艱之托推好善忘勢之勤借是孤蹤聿求多士講魯論一簟之義敢竊企於師傳誦楚史八索之文庶無忘於規益臣無任云云除祕閣修撰謝表朝散郎新授祕閣修撰主管南京鴻慶宫臣朱熹上表言准告授前件職事臣再具辭免奉聖㫖論撰之職以寵名儒依降指揮不許辭免臣已於八月二十三日望闕謝恩祇受訖者愚誠屢黷初必冀於矜從成命莫回反重勤於褒借叨踰已甚俯僂何容中謝伏念臣賦質甚迂遭時獨異頃罷外臺之使洊升內閣之華至於論撰之除尤荷聖神之眷顧無名而有愧遂瀝悃以祈哀本謂夀皇知遇之深當卒全其素守敢意睿主清明之始即洞鑒其丹衷逮兹因事以求閒重以牧民之無狀乃逭黜幽之典復加申命之恩危悃再殫俞音終閟更諭崇儒之意俾知假寵之由仰隆指之若斯豈固辭之敢必措躬無所引分弗遑此蓋伏遇皇帝陛下盛德日新至仁天覆欲風厲於四方之士誤用奬於一介之臣臣敢不祇服訓詞恪思職業對揚休命惟慚薄技之無堪敷暢遺經尚冀方來之有補以茲塵瀆少答生成瞻望闕庭臣無任云云漳州到任謝表朝散郎直寶文閣權發遣漳州軍州事朱熹上表臣熹言准勑差前件差遣已於四月二十四日到任訖抱病支離莫副光華之遣封章懇切更叨選用之良引避弗回兢惶失次即強扶於枯朽已親見於耄倪仰戴恩威俯深感懼伏念臣蚤由場屋獲厠縉紳惟自信其迂愚故絶希於榮進中荷夀皇之深眷屢嘗收用而終許退藏晚逢嗣聖之誤知亦既閔勞而復加任使凡此兩朝之殊遇豈伊一介之能堪矧漳浦之名邦實甌閩之絶徼青衫捧檄昔嘗粗習其土風白首分符今庶少安於氓俗靜揣不才之分極知為幸之多此蓋伏遇皇帝陛下近法舜功逺循堯道九德咸事尚憂片善之或遺四方無虞猶軫一夫之不獲肆曲收於棄物俾加惠於逺黎臣敢不深體皇仁廣詢民瘼筋骸可勉豈忘盡瘁之勤疾疢或加未免告歸之瀆尚繄覆燾卒遂生成臣無任云云謝依所乞仍舊直寶文閣及賜詔書奬諭表臣熹言臣昨具狀辭免新除祕閣修撰恩命近准尚書省劄子奉聖㫖依所乞仍舊直寶文閣仍賜臣詔書一道特加奬諭者白記上聞幸曲全於愚守璽封下逮庸特示於異恩祇服以還戰兢無已中謝伏念臣學雖違俗意敢近名徒以迂踈蚤絶榮途之望乃遭神聖晚深國士之知中少效於驅馳竟靡聞於報稱及奉金華之召寧忘丹扆之忠顧惟塵腐之淺聞莫副緝熙之隆指逮復退閒之秩乃降論撰之華寵雖荷於殊常義終慚於非據故上聖方臨於宸極而微臣屢觸於天威自度孤危豈勝糜滅敢意出綸之渥有嘉陳義之名幸引分之少安愧叨榮之愈甚兹蓋伏遇皇帝陛下重明必照大度并容謂臣粗業詩書諒亦有聞於古義憐臣稍知亷耻欲其無負於初心特屈憲章過形褒勸臣敢不服膺至教邁迹前修不忮不求何止終身之誦是彛是訓庶幾有極之歸臣無任云云代宰臣以下賀太上皇太上皇后尊號禮成表堯仁舜孝際授受之昌期地察天明極形容於大冊四方來賀萬福攸同中賀竊稽上聖傳序之符實貫千載休嘉之運纂圖儲禁日重光而月重輪養志宸闈乾稱父而坤稱母大矣承顔之慶溫然歸美之誠雖蕩蕩無能名豈容擬議而業業致其孝當盡顯揚頒中禁之絲綸集曲臺之辨冕金聲玉振繼以淵衷璧合珠連煥為麗藻赫奕禮文之備昭華容物之陳歷吉日而協靈辰肅將縟典蜚英聲而騰茂實並受鴻名有識有知以呼以舞攬明皇之至道如彼其卑考順宗之應乾莫能相尚有開盛典盡掩前聞恭惟尊號繼御丕圖奉承慈極於帝其訓輯三統之睿謨自天降康增兩宫之神策肆上儀之具舉紛協氣以橫流臣等幸列邇僚欣逢昌㑹旅虞階之獸舞合漢殿之嵩呼資始資生既懋顯揚之報得名得夀永儲錫羡之祥代提舉國史進神宗哲宗徽宗皇帝國史表三后在天軼鴻猷於今古百王冠德紀茂實於典謨爰勒信書上干乙覽中謝竊以炎宋開萬年之祚裕陵發六葉之祥丕顯哲宗於皇徽祖淵神心之相授煒聖烈之增光載纘武功疉西羌湟鄯之績稱秩元祀踵原廟丘澤之規紛綸圖諜之符璀璨梯航之貢輯衆髦而建學嗣養化源憲六典以訓官世嚴朝著前揖商王之躅俯卑唐帝之蹤運啓中興統承丕緒南陽基命建武之元號重開東觀紬書太初之后闕不録博延碩學論次舊聞逮繼照以龍飛甫終編於麟獲視諸故府配五聖金匱之藏副在有司為千載石渠之鎮於斯為盛莫之與京恭惟尊號孝通神明誠贊化育有典有則仰思祖武之繩記動記言下協孫謀之燕播諸琬琰炳若丹青臣職總編摩功慙潤色莫測乾坤之蘊第輸鉛槧之勤述羲農黃帝之書既垂成式由堯舜文王之道願軫宸衷代中書舍人謝表秦少游臣某言伏奉制命除臣中書舍人仍改賜章服者䝉恩承乏方懷曠職之憂拜命為真更竊非才之愧寵榮遽逮驚懼交增伏以三省之興實先朝之盛典西禁之任尤當代之要津上潤色於訓詞下稽參於政理自非文章絶妙可先諸子之鳴吏術精通能最羣工之課則何以當文臣之極仕備宰相之屬官如臣者地胄素寒資才尤戇以童子雕蟲之技偶得科名用司空城旦之書常更州縣比從柱後擢立螭頭閲嵗月之推移乏毫分之稱效惟虞罷斥歸耕寂寞之濵豈謂遭逢入直禁嚴之地光增末路望過初心此蓋伏遇皇帝陛下在宥中區統和元氣上則承周太姒求賢之意下則納召康公用士之言耆老畢歸俊英咸事鏌鎁滿庫未忘一割之鉛刀驊騄成羣不棄十駕之駑馬遂令拔擢爰及鈍頑臣敢不敬佩德音恪居官守竭心思之逮及效耳目之聞知經宿進碑敢效矜誇於近世纍年無草願希慎密於前人臣無任云云代中書舍人謝上表左螭清近顔無咫尺之違右掖峻嚴言有絲綸之出皆一時之妙選為四海之聳觀承命震驚撫躬愧懼伏念臣縉紳末胄淮海孤生弓必為箕嘗奉父兄之教柄不量鑿莫為姻黨之容自亦笑其闊迂人或憐其狂直分甘常調望絶顯途屬二聖之載營收羣英而自助巍然大老皆歸圖任之中蕞爾小才亦備兼收之數越從戎幕擢預憲臺猥陳狂瞽之言屢瀆高明之聽間嘗罷去旋復召還惟是七年之間遂叨兩制之列而況訓詞之任政教所原除授不當者得以論而封還指麾或慝者得以白而改正號為要地當慎選掄豈伊鄙人所能堪克兹蓋伏遇太皇太后德配任姒道稽唐虞用楫以濟大川斷鼇而立四極雖節儉正直在位若羔羊之時而思念憂勤進賢如卷耳之際致令頑鈍誤辱寵靈臣敢不慎出王言審求國體非特修異日祖宗之事亦以信平生師友之謀報德未期悵念嵗時之晚捐軀有處敢懷家室之私代賀元㑹表十三月為正前既稽於夏道二千石上夀仍參用於漢儀盛旦載逢彛章具舉中賀伏惟皇帝陛下財成天地參並神明命羲和之二官謹春秋之五始調和元氣撫御中區肆屬春王之朝肇修元㑹之禮雞人呼旦庭燎有光外則虎賁羽林嚴宿衛之列內則謁者御史肅班行之容漏未盡而車輅陳蹕既鳴而鼓鐘作應龍高舉雲氣畢從北極上臨星宿咸拱受四海之圖籍拜萬國之衣冠嵗月日時於焉先正聲名文物粲爾可觀邁康王鄷宫之朝掩高帝長樂之事藹頌聲而並作鬱協氣以橫流臣比逺天光遽更年籥職拘藩國莫瞻龍衮之升心折宸居但想獸樽之列瞻望闕庭曷勝欣抃代宰臣以下賀日有五色雲表秦㑹之聖主當陽庶宷際千齡之運卿雲抱日清臺占五色之祥景曜觀瞻歡均率溥竊以仰模乾象懋建國經君德無私明有同於日照臣職匪懈勢有類於雲從惟心合而益章則效隆而靡忒乃如今日允謂昌期如蓋如盤方顯照臨之用非煙非霧共呈承戴之華諒非此道之默通孰致彼蒼之昭假稽諸往牒實未前聞厯候躔離但書於合璧慶符震育徒擬於圓車當知上瑞之難全必待盛時而畢見是為常道匪曰私親伏惟皇帝陛下揆道統天膺時御極體離明日而燭物霈需雲澤以懷人輝光發衷德又新而無蔽臣鄰效力職布列而咸宜休矣祥開厚哉貺施臣等假寵惟舊常依日月之光委質何功偶際風雲之㑹誓勤綿薄永介昭明帝表常瞻固已傾心於就望官名久正毋庸紀號於青黃廣東提舉到任謝表劉潜夫臣某言伏䝉聖恩除臣為廣東提舉於某月日到任者起廢察州從天而下便私易部遵海而南具布漢條初行粵俗中謝臣切稽使指備載聖經君之遣臣也有光華臣之報君也以忠信今百端之供億殆遍國中餘一髮之本根獨推嶺外方且糴舟之發銜尾鹺政之取及膚空熙豐以來之儲增紹淳未有之額使賈生之及見哀痛謂何雖劉晏之復生變通安出乃如臣者豈其任哉嘗試絃歌本宓賤言游之緒論逮分符竹慕陽城元結之遺風久閒退而里居尤闊踈於時務疚心徒切著手應難惟有清修革彼篚苞之類詎宜謬巧取諸荷箬之間民生或不自聊臣死奚足塞責矧都邑之三風尤熾與閭閻之五瘴未蘇曽是人微欲其身率兹蓋伏遇陛下記功忘過舍短録長謂一男子妄上書本緣愛主屬見大夫無可使遂取充員庶令荒逺之情悉逹靖淵之聽臣敢不褰帷而訪草奏以聞惟無瑕者裁人必先己責以不貪而為寶少戢吏叨臣無任云云知袁州到任謝表具官臣某言臣於某月日至袁州到任者臣以遭嘖言而去國自屏空山奉明詔以典州且叨善地巳臨封域共布詔條中謝臣本起鯫生最為拙宦偶逢總攬遂忝旁招猥塵公府之僚嘗奉便朝之對莫施螢爝禆日月之清明雖批龍鱗覺雷霆之開霽惟小臣之孤立恃明主以少安及速抨彈尚䝉涵貸支離賦粟方此養疴象罔得珠俄而起廢惟袁為郡舊名安靜之區與盜比鄰今亦孤危之地城空無備兵少且孱以妄庸繆分千里之憂恐倉卒難待一朝之變而况别慈顔於膝下魂夢屢驚旅隻影於天涯宦遊奚樂徒有君親之一念若為忠孝之兩全伏遇陛下奮發王威作新吏治調多壘艱虞之際務使民安凡録屏臨遣之人率由聖擇乃如臣等亦在數中臣敢不厚培本根申畫封守長江之險與我其願為強敵之防四境不治如之何此則微臣之罪臣無任云云宰臣以下賀奉安光宗皇帝寧宗皇帝寶訓寧宗皇帝經武要略今上皇帝玉牒日厯㑹要禮成表臣某等言恭覩奉安光宗皇帝云云㑹要禮成者文謨武烈並揚二后之休漢典唐經參著一王之法森寶儲而日揭燦縟禮以星敷臣某等歡抃歡抃頓首頓首竊以監先憲求多聞商書垂訓有常德立武事周雅紀功逮開成標帝籍之名暨魯史謹策書之體至若觀㑹通而行禮尤先撮機要以舉綱兹萃進於一時宜輯成於五典允哲光宗之揖遜於昭寧考之儉勤燕翼貽謨焜耀億萬年之訓攘夷復古堅凝三十載之規有嚴諭述於史筵申命纂修於宥省天啓離明之治日新賁象之文洽媺化於登三煥鴻猷於襲六瑶編溫潤金匱閟嚴繫日繫時裒嘉熙淳祐之記注有倫有要萃寶紹端平之憲章討裁分飾於羣儒尊閣載差於穀旦韶鈞燁煜羽衛葳蕤絢繅采以展儀瞻冕旒而執讀事該經緯備清覽於邇英瑞集圗書肅祕藏於廣內恭惟皇帝陛下心傳精一學懋緝熙道德風烈之庶幾遹追來孝制度紀綱之能永勿替歷年功光祖宗政舉方策率彛章而由舊據行事以監新文武大略舉焉聖而繼聖禮樂庶事備矣書匪一書臣等欽覩升明欣逢熙洽始於勤而浹內外大施設於宏摹撰厥文而作春秋嗣鋪張於偉蹟臣等無任云云代謝勑書奬諭表臣某言今月日進奏院遞到勑書一道伏䝉聖恩以臣云云特賜奬諭者捕剪凶徒蓋守臣之常職降頒溫詔實聖世之異恩祇服寵靈重增愧懼中謝伏念臣禀材綿薄受性顓愚因緣肺腑之親昧冒藩宣之寄浩穰十邑每懷曠敗之虞黽勉再期敢起覬覦之望憶昨凶年乏食狂盜干誅初鼠竊於村墟俄鴟張於道路殺傷吏卒攘奪印章居民以此震驚列郡為之騷動至煩廟論申命使車輟悍將於山東募驍兵於隴右尚且遊魂疆埸假息朝昏臣志欲掃除日思方略忽知囊槖之處近在掌股之間竊以為稽討蕩則荏苒而蜂屯待㑹合則張皇而烏散遂令募吏潜引將兵從間道以兼行指孤巢而突擊渠魁格鬪既就殱夷餘黨散亡尋皆殄滅臣既不能如子賤任德使民不忍欺又不能如龔遂却兵致盜亦皆罷仰慙睿化方虞黜責之嚴豈謂宸音遽有旌嘉之寵此蓋伏遇皇帝陛下仁聖天覆盛德海涵欲庶職之咸修雖微勞其必録是致鉛刀之割亦膺衮字之褒臣敢不效螢爝之光竭犬馬之力誓糜捐於軀命期補報於恩私臣無任云云廣東提舉到任謝表楊廷秀守延陵季子之墟愧無治行使南粵尉陀之境復拜恩言戴仁如天反已維谷中謝伏念臣學非世用才不人先幼而讀書亦切探壁中之科斗長而試吏夫安知柱後之惠文三年朝班再歲補郡進亦思磨礪於名誼退則欲布宣於詔條訖無㳙埃小補河嶽九天曉日念孤臣將逺於長安四野秋風忽寵命載驅於原隰至於南海保彼東方惟所部十有四州去修門幾四千里物衆地大壤沃泉甘臣始入疆告厥父老上不忘逺翕然歡呼海若祝融彈壓波瀾之險朔雲邉雪驅除江嶺之氛暨於幽遐罔弗嘉靖臣以使事官於海邦煥乎榮光展也徼福兹蓋伏遇皇帝陛下丕光駿命怙冒函生日月宣精照朔南而不隔乾坤有造均雨露而無偏曽是薄材俾將隆指臣敢不輯寧凋瘵拔去姦貪出納有司豈但欲委積茗鹺之滋殖澄清當路庶幾使豺狼狐狸之一空臣無任云云知福州謝表公道天開適際攬權之始全閩地重首叨分閫之除顯服龍光私憂蚊負中謝伏念臣孤忠自信獨立無朋先帝輟諸玉堂之班俾司漕計陛下滌其丹書之籍旋付藩條兩朝二紀之遭逢一節四麾之赫奕重臨郡寄僅閲歲期米蘖自將粗謹酌泉之誓繭絲是戒少寬竭澤之嗟方生意之浸還視初心而尤慊幸值隂霾之披豁恍瞻麗景之昭融獲於兹辰與在親擢西廂職峻南服任隆侯度未修豈堪牧伯之命里門在望實均父母之邦當上下泰通之期布朝廷寬大之詔慨南部瘡痍之未復考比年俶擾之所由政茍安恬寧有駭輿之馬吏無侵枉誰為遊釡之魚雖幸勝之所傷多矣尤宿疢甫瘳之後正貞元當養之時躬為列郡之凖程大作斯民之保障乃臣所職祇愧非材恭遇皇帝陛下健配乾行明符晉出培千萬年立國之本一用寬仁掃數十載征利之風大興亷恥臣欽承詔㫖思體聖情志或得行詎有禁闥淮陽之間職當自效願追潁川渤海之風臣無任云云唐宋元名表卷下之二欽定四庫全書唐宋元名表卷下之三明胡松撰元車駕班師賀表李仁卿臣某等言伏為逆黨悉平車駕回鑾者黃鉞耀威果凶徒之一掃翠華旋軫遽明詔之載頒率土皆臣普天同慶伏以周之熙朝而造管叔武庚之役漢之盛世而行淮南濟北之誅事豈樂為兵非得已屬者逆屬相煽狂童恣行潜包禍心構成內難惟聖人必欲去害肆天子所以有征爰興問罪之師庸示安民之勇靈旗順指醜類畢熸衣暫試於一戎月連飛於三捷春生秋殺𤣥化何私天動星回鴻鈞自斡宗祧鞏固永孚無疆之休日月貞明定為羣生之福此蓋皇帝陛下運膺千載道貫九皇雄斷電馳廟謨洞徹既多算以勝少算况至仁而伐不仁是宜氛祲廓清車書混一大統㑹歸於中統太平今睹於開平凡在陶甄疇非鼓舞臣某等忝以守官於藩翰不獲稱慶於闕庭想迎六尺之輿遙祝萬年之壽東昌路賀平宋表徐世隆聖人之兵仁而威無逺不服天下之勢離必合有險即平方期四海之㑹同豈許一江之限隔捷書屢至慶頌交馳欽惟皇帝陛下至德體元中華開統美化既東西之被兼愛豈南北之分初遣文臣播告方國昭示包荒之量絶無陵弱之心弗圖島夷輒拘使節誘納我叛將盜據我歷城雖就鯨鯢之誅尚遺蜂蠆之毒蠢爾三苗之弗率命豫羣后之徂征一鼓而定荆襄再駕而降鄂嶽蘄黃靣縛江沔心歸鐵瓮之堅城已摧金陵之王氣何在楚地六千里不勞秦將之增兵錢塘十萬家坐見吳王之納土僞將悉朝於闕下幼君遐竄於海中方知恃險而亡應悔求和之晚兹雖天意實出聖籌歷觀往古混一之難未有今日飛渡之易臣某等叨居牧寄喜聼凱音矧曽充載筆之臣尤當述集勳之事駿奔效命正海內一家之時虎拜揚休上天子萬年之夀賀平宋表孟德卿臣巴延等言國家之業大一統海嶽必明主之歸帝王之兵出萬全蠻夷敢天威之抗始干戈之爰及迄文軌之㑹同區宇一清普天均慶欽惟皇帝陛下道光五葉統接千齡梯航日出之邦冠帶月支之國際丹崖而述職奄瀚海以為家獨此宋邦弗遵聲教謂江湖可以保逆命舟楫可以敵王師連兵負固踰四十年背德食言難一二計當聖主飛渡江南之日遣行人乞為城下之盟逮凱奏之言還輒姦謀之復肆拘囚我信使忘乾坤再造之恩招納我叛臣盜連海二城之地我是以有六載襄陽之討彼居然無一介行李之來禍既出於自求怒致聞於斯赫臣肅將禁旅恭行天誅爰從襄漢之上流復出武昌之故渡藩屏一空於江表烽煙直接於錢塘尚無度德量力之心乃有殺使毁書之事屬廟謨之親禀謂根本之宜先乃命阿喇哈取道於獨松董文炳進師於海渚臣與阿珠安達哈等忝司中閫直指僞都掎角之勢既成水陸之師並進常州一破列郡傳檄而悉平臨安為期諸將連營而畢㑹彼極窮蹙迭出哀鳴始則為稱姪納幣之祈次則有稱藩奉璽之請顧甘言何益於實事率鋭旅直抵其近郊招徠用事之大臣放散思歸之衛士崛强心在四郊之橫草都無飛走計窮一片之降幡始豎其宋國主率諸大臣已於二月初六日望闕拜伏歸附訖所有倉廩府庫封籍待命外臣奉揚寬大撫戢吏民九衢之市肆不移一代之繁華如故兹惟睿算卓冠前王視萬里為目前運天下於掌上致令臣等獲對明時歌七德以告成深切龍庭之想上萬年而為夀更陳虎拜之詞進授時厯經議表楊武子協時正日國政之大端章往考來厯書之明驗一或失應衆所共瞻豈天運之靡常殆人為之未密昔稱作者初匪一家其始也莫不精微未幾則旋聞踈闊蓋由年拘積算日括周分不知窺測以考真率多傅㑹以求合必欲行於永久詎容失之毫釐幸當纍洽之辰共仰同文之治事加詳核法貴變通欽惟憲天述道仁文義武大光孝皇帝陛下政順隂陽德齊穹壤燭消息盈虛之理得裁成輔相之宜爰命文臣若稽乾象晝則考求實晷夜則揆度中星察氣朔之後先定躔離之朓朒精思密索討窮源流革前人茍簡之規成盛代不刋之典其為要㫖具載成書所有授時厯經三卷立成三卷轉神注式一十三卷厯議三卷已繕寫成二十一册隨表上進干冒天威不勝惶懼震越之至謹録奏聞伏候敕音進實録表王仲謀典謨述堯舜之功令名顯著方册布文武之政義問宣昭粵自漢隋及夫唐宋咸有信史以貽後來况大業豐功震今耀古惟深善述首議丕揚洪惟世祖皇帝仁孝英明睿謀果斷爰從潜邸有志斯民植根幹而佐理皇綱聘耆德而講明治道始平大理再駕長江過化存神有征無戰逮其龍飛灤水鼎定上都革弊政以惟新擴同仁而一視規模宏逺朝野清明內則肇建宗祧創設臺省修舉政令登崇俊良外則整治師徒申嚴邊將布揚威德柔服蠻羌加以聖無不通明靡不燭守之以勤儉朴素養之以慈惠雍和收攬權綱綜核名實賞罰公而不濫號令出以惟行萬彚連茹羣雄入彀削平下土統正中邦慕義嚮風聲教實朔南之暨梯山航海職貢無遐邇之殊方且開學校而勸農桑考制度而興禮樂國號體乾坤之統書畫煥奎壁之文罄所有而酬戰功不待計而救民乏聼言擇善明德緩刑斂福錫民遇灾知懼得洪範惟皇之理過周宣修政之勤以致時和嵗豐民安吏職蓋帝德克周於廣運故至公均被以無方可謂文致太平武定亂略繼一祖四宗之志兼三皇五帝之功開天立極者三十五年立經陳紀者二萬餘事以謙讓弗遑於備紀故纂修未至於成書欽遇皇帝陛下寅紹詒謀厲精圖治亟鑒觀於成憲思遹駿於先聲深詔下臣俾為實録宅心宗祏凝孝羮墻開館局而增置官僚敕羣司而大紬圖籍編摩既富搜訪加詳采托於時政之編參取於起居之注張皇初藁增未見於罕聞承奉綸音俾蠲繁而就簡俯殫管見仰體宸衷盡略虛文一存實事其饗㑹征伐文物典章粲然列三代之英蔚爾開萬世之業與夫才德孝廉之士忠良姦佞之臣版圖生齒之繁財賦畜牧之盛謹依條據粗致無遺今具所修成世祖皇帝實録二百一十卷事目五十四卷聖訓六卷凡二百七十卷謹繕寫為二百七十帙用黃綾夾復封全隨表上進臣等忝備台司幸膺盛典顧惟載筆才何有於三長勉進蕪辭慮庶幾於一得冒瀆聖聼不勝驚惶賀聖節表李伯宗寶厯建元協重華之嘉運瑶光貫月開上聖之真符盛德在秋昊天有命中賀聰明稽古孝友根心丕顯文謨端拱巖廊之上逹觀新邑式均道里之中揆震夙之星辰卜豐穰於今嵗璿璣肇紀玉斗儲祥臣等肅謹班聨遙瞻粹穆宣昭鴻業載賡七月之詩考定武功願繼萬年之雅謝賜禮物表吳幼清接地風雲際㑹親逢於明主麗天日月照臨逺及於老臣賜之以府庫之財衣之以筐篚之幣承恩過厚揆分何堪俯瀝愚衷仰塵睿聼伏念臣荆陽賤士樵牧孤蹤幼誦孔氏之遺書無繇見道長值朝家之興運有幸為民愧碌碌之謭才乏卓卓之竒節以言其文章則體格卑陋以言其學行則器識凡庸自甘晦迹於深山豈覬發身於昭代大鈞靡不覆燾小物亦預陶鎔惟成宗法至元首賁丘園之隱歷武宗逮延祐洊升館閣之華先帝擢之禁林今皇處以經幄講讀古訓對揚耿光誤蒙上聖之簡知得厠羣賢而布列然犬馬餘齒巳非少壯之年而螻蟻微誠莫展驅馳之志外之弗能效勤勞於郡縣內之弗能禆謨議於廟堂糜廪粟費俸錢素餐甚矣辱髙位速官謗清論凛然因負採薪之憂遂辭視草之職雖心同葵藿常戀闕庭奈景迫桑榆宜歸田里未嘗毫釐有補於國况又耄耋無用於時淵度涵容寵錫優渥兹蓋欽遇皇帝陛下乾坤博施海宇皆春忍令散材汨沒於泥塗欲俾寸草沾濡於雨露憫憐周恤固君父惻隱之仁悃欵控陳乃臣子辭讓之禮倘冒昧而拜貺實踧踖以懷慙敢致懇祈乞垂矜允收此九重之大惠全其一介之小廉一是歡榮等如祗受臣栖遲畎畝既難强筋力以輸忠教誨子孫誓當竭精神而報上所賜鈔錠段匹除已嚮闕謝恩外未敢欽受謹奉表辭謝以聞賀聖節表鄧善之天開景運篤有道之曽孫電繞神樞受介福於王母觚稜瑞靄閶闔臚傳中賀誕紹鴻圖丕承駿命至仁育物得秋而萬寶成盛德在躬居所而衆星拱當立經陳紀之始為施仁發政之規郊廟肇禋朝野胥樂臣等名叨玉署目極璇霄廣文王有聲之詩載歌律吕衍殷宗無逸之壽䖍祝華嵩賀正旦箋瓜爾佳士常位拱少陽仗簇黃麾之曉氣暄太簇祥開青禁之春邦本益隆輿情胥慶中賀仰遵聖訓參贊政機執中傳精一之心作二敏元良之望重明繼照隂邪常遏於未形九四在淵陽德克潜於巳著兹履端之云始宜介福之孔多某等素乏長材叨居端尹星輝海潤莫酬沾被之恩月恆日升第祝綿延之算賀登極表虞伯生鴻業啓圖世守肇基之迹龍庭受賀躬膺大厯之歸欣戴云初謳歌為盛欽以世祖紹統乾之運裕皇隆出震之名推一本之均齊纍四朝之繼及於惟景命監至德之無私粵在太宗御禎符而有慶天心攸屬國勢以安欽惟陛下道合彌綸功存綏撫立長式遵於家法計宜允協於輿情車服旌旗皆我祖宗之舊星辰河嶽赫乎宇宙之新時開泰平人用寧一臣等叨承重任適際昌期建皇極以敷言親揚彛訓坐明堂而布政永贊成能經筵官進職謝恩表聖作稽古知崇效天開筵肆講於前經當寧屢煩於明詔垂憲萬世一新經緯之文有臣十人並拜便蕃之賜獨興睿斷創始明時伏惟昔者明王不以天縱而自聖本之先哲式資道揆以開人故伏羲則畫於河圖神禹錫疇於洪範凡將圖治慎在求聞蓋帝王傳授之精布乎方册而古今治亂之迹可以鑑觀爰咨博洽之材用廣聰明之識然守職業者特見諸政事之著惟事啓沃者先端其心術之微故兹曠典之行實重真儒之寄必經業可以發聖賢之藴必器能可以相禮樂之成必養德之全素䝉孚信必至誠之積可致感通茍非其人不稱兹選而臣等性本固陋學尤迂踈守其師說之遺僅不忘其章句及傳國人之譯粗可達其性情所謂材有限而道無窮心欲言而口不逮猶重昔人之嘆况乎臣等之愚是故設醴上尊敷氊廣厦既極詢咨於纍嵗蔑聞補報之微功敢謂能自得師坐而進道更錫官聨之重俾專誦說之司雖竊恩榮愈增憂責兹蓋伏遇皇帝陛下以乾坤之德為德以堯舜之心為心無一念不在於民生無一事不遵於祖憲遐方畢服猶虞水旱之為灾羣賢在朝尚恐俊良之攸伏必合二帝三王之至盛以登四方萬國之太平下收瑣末於芻蕘俾益㳙埃於山海臣等敢不力循古訓各盡微衷非先王之法不敢言冀必由於正路雖末世之事亦不避庶有戒於前車尚勸九歌用稱萬夀賀正旦箋玉燭調元播陽春於萬物褘衣乘翟奉景福於一人歡溢宫闈慶延宗社中賀柔嘉維則博厚無疆帝業中興五色錬補天之石女功內治七襄成報日之章膺瓊冊之穠華衍金支之奕業茂迎蒼厯益介洪禧某等備位外廷稱觴前殿二南風化歌關雎正始之音萬年室家樂既醉太平之運賀聖節表春回正月律和舞羽之庭日浹芳旬瑞紀流虹之渚縟儀洊舉治象更新中賀盛德在躬至仁育物紫微華蓋煥乎經緯之為章朱草醴泉妙與生成而合化天開壽域人樂熙辰臣等弱翰無功清光有赫對揚休命絲綸緝黼黻之文歌頌永年簡冊載衣裳之治進經世大典表歐陽原功堯舜之道載諸典謨文武之政布在方冊道雖行於上下政無間於精粗特於紀録之間足見彌綸之具是以秦漢有掌故之職唐宋有㑹要之書於以著當代之設施於以備將來之考索我國家受命龍朔纘休鴻基發政施仁行葦之忠厚世積制禮作樂關雎之風化日興紀綱具舉於朝廷統㑹未歸於簡牘欽惟欽天統聖至德誠功大文孝皇帝陛下總攬羣䇿躬親萬幾思祖宗創業之艱難與天地同功於經緯必有鋪張以揭皎日必有述作以藏名山爰命文臣體㑹要之遺意遍勑官寺發掌故之舊章倣周禮之六官作皇朝之大典臣某叨承㫖喻俾綜纂修物有象而事有原質為本而文為輔百數十年之治蹟固大略之僅存千萬億世之宏規在鴻儒之繼作謹繕寫皇朝經世大典八百八十卷目録十二卷公牘一卷纂修通議一卷裝演成帙隨表以聞伏取進止賀正旦表宋誠夫泰元神策天開六甲之端北斗帝車星直三朝之旦立政伊始與時皆新中賀睿知有臨明哲作則萬機初振熙鴻號於紀年九廟載安被龍光於宗黨誕啓用材之路式推澤物之仁臣等身際昌辰首班著位風行雷動賡歌殊愧於古初日升月恆善頌惟先於壽考賀親祀南郊表謝敬德四方于理事天致恭已之誠三年而郊卜日叶用辛之吉功成治定禮備樂和中賀端拱無為純一不二肇舉明禋之典載嚴升配之文大吕黃鍾音協雲門之奏鎮圭繅籍輝聨蒼壁之華祥風和氣之與游景星慶雲之疉見穹祗集貺宗社䝉休臣等叨佐清朝欣觀熙事列圜壇之八陛幸陪漢畤以侍祠陳泰階之六符願舉兕觴而上壽謝除憲職表邢公濟支郡分符巳慚善政明時持節濫撫祥刑被寵以驚省躬知愧中謝伏念臣資惟極陋數則多竒在昔先臣再被裹輪之召至於晚進亦叨勸駕之行國史載隱逸之名鄉書上經行之選實惟一門之盛事蓋出三朝之異恩獨不免於窮途悵虛逢於昭代欲遂掛冠之願未酬結綬之心豈期流落之餘偶被使令之末惟西蜀忠厚之俗有東魯絃誦之風顧此齊民之浩穰皆自纍聖之涵養山川秀麗初無犬吠之虞囹圄空虛不待雞鳴之教欲持平於邦憲宜精擇於司存豈容下材輒膺重任兹蓋伏遇皇帝陛下體天地之覆載並日月之照臨刑無用於三千囚自歸於四百欲兼容於羣聼致誤采於虛名蓋本慮軫逺方豈獨矜誇於已推仁心以及物尚憐觳觫之牛將德意以遣臣敢憚虺隤之馬當佩服溫厚之典奉行寬大之書聞禮傳家粗有志於他日引經斷獄更盡力於此時臣無任云云賀冊后表楊文郁聖德日新端齊家以身之本坤元位正備臨軒發冊之儀慶溢九重歡騰四表中賀受天成命遵祖詒謀謂王教攸基莫若人倫之重然治道之至庶資內治之勤昭法象於軒星崇聲明於椒掖以贊嚴宸之孝理以協太母之徽音臣等服在近司顒觀盛際道符羲易占順承載物之亨願擬堯封申富壽多男之祝賀千秋箋陽常居於大夏方收養育之功震一索為長男載啓亨嘉之㑹慶鍾甲觀歡溢寰區中賀克哲克明允文允武春坊翊善茂隆邦本之貞曉寢問安長奉天顔之喜兹臨彌月之節宜膺百順之祥臣等竊備詞官進趨庭賀幸聞樂府奉重暉重潤之章請合輿情上俾熾俾昌之壽謝昭雪表劉跂投畀讒人巳悟告言之妄蠲除詔令更申坐論之寃沒而有知死且不朽竊以前世論事下敢告之章法家原情著反坐之律未聞私書謬悠之謗可致公朝夷滅之刑繄彼無良遘為不令因黨友之尺牘形閭巷之有辭引鷹揚尚父之言誦髙貴鄉公之語靡慚嗤鄙惟幸詆誣既內嫌於不根又隂虞於後患書其付火固絶意於上聞託以屏人復何施於參驗不攻自破欲蓋而彰巧誰謂其如簧市共知於無虎雖毁者挾怨必以惡聲而小人乘危遂為竒貨密謄舊札歷遺衆仇險不啻於山川食無餘於犬彘逮從吏訊幾誤國章意所株連人以股栗浩有漂山之勢岌如纍卵之危賴先帝照曯之明察權臣吞噬之患特紆清問少緩嚴科然而先臣諸孤終以屏廢闔門百口益復幽囚禦瘴厲者十喪𨽻臣妾者三嵗無罪且至於如此大戮亦何以復加㑹上聖之龍飛破羣疑而氷釋譴纍所逮訴告必申悼前日之禍機嗟何可及掛有司之罪籍名或未除用再瀝於肺肝敢上塵於旒扆理無難者宜靡悼於改為事巳灼然遂悉從於釐正此蓋皇帝陛下乾行以健離麗而明體大舜堲讒之方廣有唐辨謗之略孤忠素節事巳白於九原弱子幼孫誓各堅於一死微生何算洪造難酬賀正旦表姚登孫寶厯晨開恩誕敷於朔紀瑶池春滿慶先輯於東朝日月清華神民闓懌中賀道符範統躬啓皇圖懿範難名備聖人之全德仁規妙運濟天下於太寧壽並兩儀福延萬世臣等班聨文石職忝膠庠仰測卦爻喜三陽之通泰俯陳歌頌奉億載之怡愈代謝進和御詩奬諭表强至參羣篇而奏御賡載非工被優詔之發中褒嘉甚渥惕然拜君父之賜藏以為子孫之榮伏以書曰帝庸作歌所以極道明良之意雅云臣能歸美所以上酬福祿之辭惟千載一時之逢踰三王二帝之際乘太平之多暇講稀闊之盛游歷寶宇以披祖宗相受之文御飛翬以縱神聖有餘之學以至置酒别殿賦詩中宸于時從聨咸續睿唱如臣者有朴愚而植性無文采以表身自部風憲之要司都廢惟言之舊學妄抽鄙思綴成斐章大樂在前發哇聲而接響太陽臨下衒爝火以交光既續邃旒若臨深谷敢謂兼容之度例形過奬之辭游聖門者謂之難言矧繼堯文之後踰華衮者重夫褒字矧䝉漢訓之加夫何孤臣叨此厚幸此蓋伏遇尊號皇帝陛下齊德乾覆育士坤涵善雖小而弗遺力或矜其不逮誓竭講劘之效庶酬奬勵之仁唐宋元名表卷下之三
