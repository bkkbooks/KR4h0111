body:
  text: 唐宋元名表卷上之一明胡松撰唐為宰相賀雪表韓退之臣某言臣伏以去嵗冬間雨雪頗少今年春首宿麥未滋陛下深念黎甿屢形詞㫖神監昭達皇情感通春雲始繁時雪遂降實豐穰之嘉瑞銷癘疫於新年東作可期南畆有望此皆陛下與天合德視人如傷每發聖言則獲靈貺見天人之相應知朝野之同歡臣等職在燮和慙無效用覩斯慶澤實荷鴻休為裴相公讓官表臣某言伏奉今日制書以臣為朝議大夫守中書侍郎同中書門下平章事承命驚惶魂爽飛越俯仰天地若無所容臣某誠惶誠恐頓首頓首臣少渉經史粗知古今天與朴忠性惟愚直知事君以道無憚殺身慕當官而行不求利巳人以為拙臣行不疑元和之初始拜御史旋以論事過切為宰臣所非移官府廷因佐戎幕陛下恕臣之罪憐臣之心㧞居侍從之中遂掌絲綸之重受恩益大顧巳益輕茍耳目所聞知心力所迨及少闗政理輙以陳聞於裨補無㳙涘之㣲而讒謗有丘山之積陛下知其孤立賞其㣲誠獨斷不謀奬待踰量臣誠見陛下具文武之德有神聖之姿起中興之宏圖當太平之昌厯勤身以儉與物無私威怒如雷霆容覆如天地實羣臣盡節之日才智效能之時聖君難逢重德宜報苦心焦思以日繼夜茍利於國知無不為徒欲竭愚未免妄作陛下不加罪責更極寵光既領臺綱又毗邦憲聖恩所厚兇逆所讎闕於防虞幾至斃踣恩私曲被性命獲全忝累祖先玷塵班列未知所措秪自内慙豈意陛下擢臣於傷殘之餘委臣以燮和之任忘其陋汙使佐聖明此雖成湯舉伊尹於庖厨高宗登傅說於版築周文用吕望於屠釣齊桓起甯戚於飯牛雪恥䝉光去辱居貴以今凖古擬議非倫陛下有四君之明行四君之事㣲臣無四子之美獲四子之榮豈可叨居以彰非據方今干戈未盡戢夷狄未盡賔麟鳯龜龍未盡游郊藪草木魚鼈未盡被雍熈當大有為之時得非常人之佐然後能上宣聖德以代天工如臣等類實不克堪伏願博選周行旁及巖穴天生聖主必有賢臣得而授之方可致理乞廻所授以叶羣情無任懇欵之至賀甘雨表陛下慮深稼穡憂切烝黎未成旱魃之虞已積憂勤之意宻雲與綸言繼發時雨將天澤盈流瑞鳥迎舟式掩商羊之舞蛇醫納甕果符垤鸛之鳴初泛洒於上宫遂滂霈於率土自中徂外皆荷生成雨公及私靡不碩茂野夫鼔舞知帝力之𤣥通官吏懽呼見天心之黙喻殷后徒勤於自剪周公空媿於舞雩化超前聖道貫重𤣥臣某才術無聞謬司邦甸生成必資於帝力進退何補於天工沐浴太和慙荷無極臣之欣躍倍萬恒情賀甘露表𤣥化升聞靈貺昭答必呈尤異之應以告天地之和臣誠惶誠恐頓首頓首伏惟皇帝陛下均煦育之功敷滲漉之澤太和潛逹閟瑞克彰發於天霄特降宫樹朝光初燭方湛湛而未晞晨景轉炎更瀼瀼而未巳綴葉而珠璣積耀盈噐而氷玉呈姿芳襲椒蘭味兼飴醴然則零於庭而著異紀於年以標竒徒誇往辰孰並茲日況樹有丁香之珍殿即延和之號所以著芳風之逺播期聖夀於無疆事絶古今慶傳遐邇臣謬承渥澤獲覩殊祥抃躍之誠倍萬恒品賀嘉禾表陛下睿謀廣運神化旁行植物知仁祥圖應聖靈嶽不愆於贊祐燕谷遂用於生成豐稔既均知朔南之被澤休嘉允叶見天地之同和六穗慚稱於漢臣異畝恥書於周典自中形外均慶同懽臣無任抃躍之至賀雨表臣某言臣聞聖人之德與天地通誠發於中事應於外始聞其語今見其真臣誠懽誠喜頓首頓首伏以季夏以來雨澤不降臣職司京邑祈禱實頻青天湛然旱氣轉甚陛下憫茲黎庻有事山川中使纔出於九門隂雲已垂於四野龍神效職雷雨應期雷或作雲嘉穀奮興根葉肥潤抽莖展穗不失時宜人和年豐莫大之慶㣲臣幸䝉寵任獲覩殊祥慶抃懽呼倍於常品無任踴躍之至謹奉表稱賀以聞禮部為百官上尊號表栁宗元臣某言伏以聖王之纂承天位也臣子必竭懇誠獻尊號安敢為佞禮在其中一則以告天地神祇二則以奉宗廟社稷三則以安華夏蠻貊巍巍大稱其可廢乎臣等誠懽誠望頓首頓首伏惟皇帝陛下叶周文之孝德齊夏禹之約身𢎞帝堯之法天過殷湯之解網未逾周月四海將致於時雍甫及元正率土更欣於再造然神人之願億兆之情有所不安率謂未盡善者以為帝德廣運而尊號猶闕郊廟備禮而祝嘏無辭凡百兢懷華夷屬望臣謹按昔臯陶之頌舜伊尹之頌湯皆臣子至公面揚君父以敷於當代以播於無窮夫豈飾哉率由事實帝王尊號皆漸於此皇家光被四表祖宗烈文時當太和尊號表德耳目所接簡牘斯存稽之於前典則如彼考之於聖朝又如此今龜筮習吉元正戒期當品物惟新之時乃皇王大禮之日陛下郊天地享宗祧隂陽協和動植交暢不建至尊之稱恐違列聖之心所以臣等冒死陳聞請上徽號伏惟陛下小謙讓之節安延企之情特詔名儒禮官百寮庻尹詳明故實議崇聖德則人望允厭神心獲安山川效靈光贊無疆之夀祝史陳言永彰不朽之功臣等䝉國寵榮備位班列無任懇望之至禮部賀册尊號表臣某伏奉月日制陛下膺受尊號率土臣子慶抃無窮臣聞立極之大四海無以報神功配天之尊萬物不能崇聖德唯有徽號是彰中興所以上探天心下極人欲中謝伏惟元和聖文神武法天應道皇帝陛下統承千載光被六幽蟊賊盡除福應皆集有首有趾咸識太平勲臣增爵禄之榮戎士加賞延之寵片善必録㣲功盡昇獨惟聖謩事絶酬答萬國觖望百工怨思是以啓元和之盛典延昊穹之景祚理厯凝命實曰聖文和衆定功時惟神武運行有法天之用變化乃應道之方鬼神協謀華夏同志大禮既建鴻恩遂行歡呼逺布於九圍滲漉普周於八裔慶超邃古美冠將來臣獲守蠻荒逺承大典潢汙比陋河清幸遂於千年塵壤均㣲山呼願同於萬嵗無任慶賀屏營之至為京兆府請復尊號第三表臣某言臣伏以耆老等並發丹誠將貫白日請復徽號以光聖謩臣以其懇欵自中不可禁止遂抗表陳情備述㣲誠伏奉墨詔批答未䝉允許者衆心尚阻天意未從懇廹愈深兢惶無措臣某伏帷皇帝陛下道大益謙化成彌損雖江海善下每應朝宗之心而日月居高久稱照臨之位况復上承天命下覩人誠若然辭之理有不可伏以陛下功參造化政體乾坤萬邦宅心百靈效職此聖之至也明並兩曜信如四時先天不違窮神知化此神之極也道德純備禮樂興行宸翰動於三光睿藻窮於六義此文之備也五兵不試七德咸宜殊方者知歸負固者率服此武之成也黄龍皓兎甘露慶雲神禾嘉𤓰祥蓮瑞木萬物暢遂百穀茂滋此天之至靈也黎老斑白伏守闕庭鰥嫠童㓜歌謡道路此人之至誠也有其德而無其號拒乎天而違乎人雖陛下謙讓之至美抑非臣心之所安也伏以賤志難明㣲誠莫逹戴天彌懼履地益慚無任懇廹屏營之至伏願早建大號以稱天人之心謹再奉表昧死陳請以聞為耆老等請復尊號第二表京兆府長安縣耆老臣石靈等言伏奉墨詔批臣所請復尊號未䝉允許者捧對惶懼不知所裁天實命之於臣何有臣等誠懇誠懼頓首頓首臣聞聖君以奉天為心不以執謙為徳以順人為大不以崇讓為優陛下深拒天人之誠猶懐謙讓之道臣等愚惑不知所歸且百祥洊臻特表昊穹之眷五穀蕃熟用彰后土之勤億兆嗷嗷籲天請命上下交應幽明同心舉而違之臣所不識况臣等共被仁育同臻太和陛下德逹上𤣥以豐人之衣食道躋夀域以延臣之嵗年沐浴皇風二十餘載兒童感化鰥寡知恩故臣等出鄉之時閭里勉臣以不進不止妻孥誓臣以不復不歸唯竭血誠退無面目便當隕首闕下終不徒還伏惟陛下照臣懇廹之情哀臣羸老之命臣等不勝嗚咽慙恨之至謹奉表陳謝以聞禮部為文武百寮請聽政第二表伏奉大行皇帝知陛下至性自天恐陛下執哀過毁上惟九廟之重下念萬務之殷故遺詔丁寕俾遵舊典今百辟卿士顒然在庭瞻望清光巳七日矣固陳誠請猶未允從内外憂惶莫知所出臣聞大孝之本繼志為難酌禮之情得中為貴是以哀迷期數哭泣有常俯而就之聖人所重知難繼也君子不為伏願少抑哀懷仰尊理命以副神祇之望以安億兆之心光祖業於無窮流德化於天下凡在臣子孰不悲戴又第二表臣某等言臣聞聖凡殊塗邦家異禮故王者舎己從物用身許天雖居達䘮猶以事奪伏以大行皇帝道成鑄鼎僊等御龍萬姓長號九有顒望陛下以聰明睿聖嗣守寳圖爰及宅憂迨兹累日而孝思罔極尚輟乃雍之言庻政未釐頗闕如絲之命臣等嘗覽載籍粗知䘮紀若成周顧命厯代猶遵西漢詔音前王所奉我國家以孝理天下文明應期止用此法胥以傳授盖事歸至當則不可不遵禮貴從宜則不得不守理固然也臣等是以上陳愚懇輕凟宸嚴兾遂血誠俯親國政而陛下執䘮逾切聽理未聞億兆嗷嗷不知所訴臣以為天子之孝在於保安社稷司牧烝黎功超百王慶流萬代亦何必守臣下之小節蔑皇王之大猷固阻羣情務成謙德伏願以遺詔為念奪在疚之懷就臨軒之制天下幸甚第三表伏以萬幾至重遺㫖難違再獻表章上塵旒扆精誠徒竭天意未廻内外遑遑人神企望臣聞王者之孝異於匹夫禮不相沿道資適變當承平之代故殷帝宅憂而不言遇有事之時則周王未塟而誓衆况今戎車猶駕邉堠多虞兩河之冦盗難除百姓之瘡痍未合亂者思理危者求安天下嗷嗷正在今日誠宜抑其至性以副羣心成先帝之大功繼中興之盛業豈可寢苫啜泣庻政闕然九廟之靈何報萬方之望何塞臣等職叅樞近誠切邦家若陛下未忍臨軒尚持前志臣等有死而巳不敢奉詔不勝哀廹懇切之至賀踐阼表臣某言太子中舎嚴公弼至奉某月日勅書慰諭伏承陛下以某月日䖍奉典册允昇寳位凡在羣生孰不慶幸臣某誠懽誠忭頓首頓首臣聞天地泰而聖人出雷雨解而品物榮是以五行迭用木火更其位十葉重光宗廟輔其德殷宗恭黙再造成湯之業漢文聰明克承高祖之緒陛下重離出曜體乾繼統主鬯彰孝恭之美撫軍著神武之功欽承遺訓永保鴻業遏宻之中施雨露以被物遐邇之地覩日月之繼明則四維之外八極之表人神胥悅草木皆春煦嫗生成不失覆載况臣謬膺藩守累受國恩爰自出身洎乎領鎮沐浴聖澤優游昌時不獲覩闕庭之禮展臣庻之分戴天賀聖倍萬恒情禮部賀永貞元年表臣某等言伏奉今日誥今月九日册皇帝改貞元二十一年為永貞元年自貞元二十一年八月五日昧爽以前應犯死罪特降徒流流以下遞降一等者寳命方始聖厯周彰載宣臨照之明遂施渙汗之澤臣某等誠懽誠賀頓首頓首伏以重光下濟積慶旁行漢祖推奉教之尊文王遂無憂之志正名紀厯表運行於萬方宥過輕刑流汪濊於四海歡呼雀躍遐邇攸同臣某等親奉聖謩仰承大化踴躍之至倍萬恒情無任蹈舞欣慶之至禮部太上皇誥宜令皇帝即位賀表臣某等言伏奉今日太上皇制命陛下即皇帝位光奉寳圖丕承鴻業普天率土歡慶難勝臣某等誠喜誠忭頓首頓首臣聞皇建其極存諸大訓帝出於震著在易經繼明以照於四方重熈以臨於萬國動植品類永賴昭蘇山川鬼神咸用欣戴臣某等獲備班列親仰聖明踴躍之誠倍萬恒品無任云云禮部賀立皇太子表臣某等言伏奉今月日制廣陵郡王宜册為皇太子改名某仍令所司擇日備禮册命者天序有奉皇圖載寧臣某等誠慶誠賀頓首頓首臣聞商書載以貞之文漢史傳早建之議不惟立愛其在繼明陛下奉率前規敷揚盛典顧兹守噐之重爰正承華之位尊義方之教載錫嘉名崇建樹之禮式光典命以長而立自符於慎擇必子之選遂合於至公邦本不揺王業彌固此皆宗社垂祉啓佑皇心乾坤合謀保安聖運足以播休氣於四海洽太和於萬靈食毛含齒所同歡慶臣等奉承制命蹈舞周行踴躍之情倍萬恒品無任慶忭感恱之至禮部賀皇太子册禮畢德音表臣某等言伏奉今日制皇太子册禮云畢思與萬方同其惠澤者盛典斯舉鴻恩遂行凡在率土不勝抃躍臣某等誠喜誠賀頓首頓首伏惟皇帝陛下克奉神休以正邦統建天下之本宗廟以安致萬國之貞兆人攸賴典册既備慶澤載流既廣愛而推恩亦好生而布德緩刑而囹圄知感進勲而嗣續增榮崇教諭之方忠良是舉嚴贊襄之禮賜與有加旌孝弟以厚於人倫敬鬼神而修其祀事况行禮之日則屏翳收蹟太陽宣精用彰出震之休更表重離之曜神化旁暢皇風逺揚自華及夷異俗同慶臣某等謬叅著定倍百恒情無任懽慶踴躍之至為王京兆皇帝即位禮畢賀表臣某等言臣聞大人繼明百神所以受職天子有道萬國由是承風伏以皇帝陛下纘聖垂休順時御極負扆而㑹朝夷夏踐阼而統和天人幽明感通遐邇昭泰遂使祥光下燭嘉氣旁通周王謝流火之符魯史愧書雲之典食毛含齒懽忭無窮臣某等幸覩昌時獲奉大慶踴躍之至倍萬常情無任蹈舞欣躍之至代韋中丞賀元和大赦表臣某言伏奉正月二日制大赦天下永貞三年宜改元和元年太陽既昇煦育資始霈澤斯降膏潤無遺臣某誠慶誠賀頓首頓首伏惟皇帝陛下仁化旁流孝理𢎞闡紀元示布和之令肆眚見恤人之心曠然滌瑕得以遷善渙發大號申明舊章農有薄征市無强賈勲勤是録爵秩以班寵寧間於幽明澤必周於夷夏近甸輕𣙜酤之入逺人忘水旱之災既行慶於官寮亦推恩於天屬諸生喜黌塾之廣庻老加絮帛之優量入所以備凶興亷期於變俗爰褒有客尊賢之典惟新載奉素王宗予之道斯在綸言一降庻政畢行懷生之倫感恱無量臣某等守在遐逺親奉詔條踴躍之誠倍百恒品無任感恩抃舞屏營之至禮部賀册太上皇后賀表臣某等言伏奉今月日誥良娣王氏冊太上皇后良媛董氏冊太上皇徳妃宜令所司備禮冊命者母儀有光坤道克順隂教方行於萬國内理克和於六宫臣某等誠慶誠賀頓首頓首伏惟皇帝陛下對若天休奉揚睿㫖長秋既登其正位褕翟亦被於恩光奉養見三朝之安周旋有四星之輔豈獨配天稱大助日為明所以表王化之源知孝弟之本冠映千古儀刑四方臣某等捧戴施行踴躍無地無任蹈舞欣喜之至禮部賀太上皇后冊畢賀表臣某等言今月日太上皇后冊禮云畢率土臣妾慶抃無窮臣某等誠慶誠賀頓首頓首伏以太上皇后著虞嬪之至德嗣周母之徽音表率六宫明彰萬國陛下克修理本以暢化源坤道知事地之方人倫識尊親之大豈惟婦順斯備隂禮用修其以播正始於國風致時雍於帝典臣某等謬塵榮位獲覩盛儀踊躍之誠倍百恒品賀皇太子牋某言伏奉月日制書殿下祗膺茂典位副清宫溫文光三善之名繼照協重離之慶萬葉固本羣方宅心含生之徒孰不欣戴况某夙䝉期奬職在藩方懽忭之誠倍萬恒品御史臺賀嘉禾表臣某言今月日宰臣以幽州所進嘉禾圖各一軸示百寮者伏以嘉穀順成靈貺昭格天人合應遐邇同風臣某誠懽誠慶頓首頓首伏惟皇帝陛下睿謀廣運神化旁行植物知仁祥圖應聖靈嶽不愆於贊祐燕谷用遂於生成豐稔既均知朔南之被澤休嘉克叶見天地之同和六穗慙稱於漢臣異畝恥書於周典自中形外均慶同歡臣某謬職憲司獲覩休瑞無任抃躍之至禮部賀嘉禾及芝草表臣某等言伏見今月某日内出劍南所進嘉禾圖及陜州所進紫芝草示百寮者珍圖煥開瑞彩交映遐邇偕至福應攸同臣某等誠慶誠賀頓首頓首伏惟皇帝陛下緝熈至道保合太和天為發祥地不愛寳嘉禾擢質靈草抽英獻於王廷唐叔慙同穎之異存諸郊廟班史謝連葉之竒既呈薿薿之祥更覩煌煌之秀豐年斯著聖夀用彰飲和之人懽忭無極臣某等優游至化披翫殊姿慶忭之誠倍萬恒品京兆府賀嘉𤓰白兎連理棠樹等表臣某言今月日中使王自寧出徐州刺史張愔所進嘉𤓰圖及白兎兒一併出陳許等州觀察使上官説所進許州連理棠樹圖示百寮者惟天眷命是降百祥惟聖欽承用膺多福臣某誠慶誠賀頓首頓首臣伏以太和所烝至德斯應圖物獻瑞周於逺方神𤓰合形式表綿綿之慶異棠連質用彰煜煜之榮况金風發祥白兎來擾告有秋之嘉應著成嵗於神功雜遝紛綸如山斯委人盡登於夀域物咸暢於薰風况臣特感深恩欣逢衆瑞踊躍之至倍萬恒情禮部賀甘露表臣某言中使王自寧至伏宣聖㫖出延和殿前丁香樹甘露一大盒示宰臣未時又出一大盒令明日示百寮甘露見降未止者𤣥化升聞靈貺昭答必呈尤異之應以告天地之和臣某誠懽誠慶頓首頓首伏惟皇帝陛下均煦育之功敷滲漉之澤太和潛達閟瑞克彰發於天霄特降宫樹朝光初燭方湛湛而未晞晨景轉炎更瀼瀼而未巳綴葉而珠璣積耀盈噐而氷玉呈姿芳襲椒蘭味兼飴醴然則零於庭而著異紀於年以標竒徒矜往辰孰竝茲日况樹有丁香之珍殿即延和之號所以著芳風之逺播期聖壽於無疆事絶古今慶傳遐邇臣謬承渥澤獲覩殊祥抃躍之誠倍萬恒品禮部賀白龍并青蓮花合懽蓮子黄𤓰等表臣某言伏見今月日内出滄州所進白龍見圖又出西内定禮池中青蓮花并神龍寺前合歡蓮子示百寮二十三日又出監州所進合懽黄𤓰圖者二氣交泰萬國同和動植思協於殊祥遐邇必陳其嘉應披圖按牒聖理彰明臣誠懽誠慶頓首頓首伏以天地非逺睿感必通疉瑞重祥累集宫禁池蓮表異靈化非常敷彼青光徵佛書而尤絶成其嘉實驗祥經而甚稀積慶旁流自中徂外遂使龍騰白質乘秋果應於金行𤓰合黄中表聖更彰於土德逺通邉徼近出苑園合慶同歡周於億兆况復邦畿之内雨霽必時宿麥大穰嘉穀滋茂和風孕育靈氣陶蒸是皆發自帝心達於天意周流升降成此嵗功惠被羣生自為嘉瑞臣某深惟多幸獲遇斯時觀靈貺之備臻知人和之溥洽無任慶忭躍蹈之至禮部賀白鵲表臣某言伏奉進㫖宣示前件白鵲者霜毛皎潔玉羽鮮明色實殊常性惟馴狎臣聞聖王之德無所不至有感則應無幽不通伏惟陛下恩霑動植仁洽飛翔故得兹禽呈休效質伏以白者正色式表金方鵲以知來式彰冦服用符歸化之兆克耀太平之階臣職叅禁垣獲覩嘉瑞無任慶抃之至禮部賀嘉𤓰表臣某等今日内出浙東觀察使賈全所進越州山隂縣移風鄉百姓王獻朝園内産嘉𤓰二實同蔕圖示百寮者寳祚惟新嘉瑞來應式彰聖德更表天心臣某等誠慶誠賀頓首頓首伏惟皇帝陛下保合太和緝熈庻類德馨上達神化旁行嘉𤓰發祥來自侯服質惟同蔕見車書之永均地則移風知化育之方始雖七月而食豳土歌王業之難五色稱珍東陵詠佳賔之㑹未聞感通若兹昭著者也臣某等遭逢聖運親仰珍圖抃躍之誠倍百恒品無任慶恱之至為王京兆賀嘉蓮表臣某言今日某時中使某奉宣聖㫖出西内神龍寺前水渠内合歡蓮花圖一軸示百寮者祥圖煥開異彩交映贊天地之合徳表神人以同歡臣某誠歡誠慶頓首頓首伏惟皇帝陛下道協重華慶傳種徳陶隂陽之粹美孕造化之精英吉慶每見於天心發祥必自於禁掖是使雙華擢秀連蔕垂芳香激大王之風影耀天泉之水煥開宫沼旁映給園靈貺應期天龍護聖寳厯夐超於小刼神功允洽於大千臣某獲覩昇平濫居榮寵聞瑞應而稱慶仰吉事而增歡無任抃蹈喜躍之至為王京兆賀雨表臣某言臣昨日面奉聖㫖以近日少雨今月内無雨即須祈禱今日便降甘雨者天且不違神必有據宻雲與綸言繼發時雨將天澤並流臣某誠歡誠慶頓首頓首伏惟皇帝陛下憂切蒸黎慮深稼穡思彼未兆防於無形滲漉每出於湛恩變化必隨於廣運宸衷暫惕已矯御天之龍聖謨既宣遂洽漏泉之澤霮䨴周布霏㣲四施黍稷盡成公私皆及野夫鼔舞知帝力之𤣥通官吏歡呼見天心之黙喻臣某牧人京邑動仰皇靈渥澤徒加㳙滴無助無任感恱屏營之至王京兆賀雨表二臣某言臣伏見今月二十四日時雨溥降伏以聖心積念天意遽迴移造化之𤣥功革隂陽之常數臣某誠慶誠忭上言伏惟皇帝陛下仁育蒼生恩同赤子自頃天雨未降時稼或愆貶食齋戒至誠幽達又慮宿麥未備播種失時出於宸衷特令賑貸睿謨潛運甘雨遂周布濩垂隂隨聖澤而俱逺滂沲積潤與恩波而共深臣某才術無聞謬司邦甸生成必資於帝力進退何補於天工沐浴太和慙荷無極無任慶躍屏營之至王京兆賀雨表三臣某言今月十三日面奉聖㫖緣自春來少雨宜即差官精誠祈禱者十四日臣便差官分赴靈跡其日雲隂四合至十五日甘雨遂降伏惟皇帝陛下言為神化動合天心未成旱暵之虞巳積憂勤之慮衆靈受職薈蔚且隮於南山百穀仰榮滂霈遂霑於東作睿謩朝降膏澤夕周知天人之巳交識隂陽之不測然則周王徒勤於方社殷帝虛美於桑林豈若無災而早圖未禱而先應化超前聖道貫重𤣥徧野同歡傾都相慶臣之欣躍倍萬恒情王京兆賀雨表四臣某言臣於三月二十九日奉聖㫖於諸靈跡處祈雨至三十日甘雨遂降者臣聞惟聖有作先天不違發令而祥風巳興致誠而𤣥液旋被臣某誠欣誠賀頓首頓首伏惟皇帝陛下側身防患道邁周王盡力勤人功超夏后聖謨廣運驅百靈以從風神化旁行滋五稼而流澤油雲四合膏雨溥周農壤遂一於肥磽滲漉盡霑於遐邇蒸黎詠德知必自於聖心草木欣榮如有感於皇化有年之慶實在於斯臣以無能謬領京邑上勞宸慮運此嵗功無任喜懼屏營之至賀親自祈雨有應表五臣某言臣得上都院官金部員外郎韓述狀報以時雨未降親自於龍堂祈禱有靈禽羣翔自成行列如隨威鳯以翼龍舟其日降雨者中謝伏以時或愆陽嵗之常候式當聖日無害豐年陛下敦本務農憂人閔雨宸慮所至天心自通故得瑞鳥迎舟掩商羊之舞仙雲覆水協從龍之徵初泛灑於上宫遂滂霈於率土自中徂外皆荷生成雨公及私靡不碩茂殷后徒勤於自翦周公空愧於舞雩臣以庸虛謬司垣翰有年之慶惟聖之功臣某無任云云為裴中丞賀克東平赦表臣某言伏奉月日徳音以淄青蕩平褒功宥罪布告遐邇者臣聞肅殺之後每致陽和雷霆既施必聞膏澤伏惟陛下體乾剛以運行叶坤元之翕闢百靈受職六合從風阻兵怙亂者必就梟擒懷忠抱義者無不甄録激其效順特加旄節之榮寵以元功遂兼鼎鉉之任戎行窮賞賚之重死事極褒恤之憂刼脅之役盡除聚斂之名皆去傷痍受煦老疾加恩豐財巳復其征徭賜種更盈於種稑嚴山川之祀神必有依申義烈之家物無不感周王推忠厚之化漢帝慙愷悌之風太平之徳斯為至盛然則虞廵可復告成將慶於岱宗漢典方興講禮再榮於闕里臣謬膺重寄獲覩太和抃蹈之誠倍萬恒品謹已施行郡邑宣示軍戎莫不動地歡呼若醉千鍾之酒騰天鼔舞如聞九奏之音無任慶賀踊躍之至栁州賀破東平表臣某言即日被觀察使牒李師道以月日克就梟戮者帝徳廣運唐命惟新霾曀廓清天地貞觀率土臣庻慶忭無涯伏惟睿文聖武皇帝陛下威使百神德消六沴天降寳運時歸太平自克夏擒呉翦蜀平蔡殊類稽顙羣疑革心唯此兇妖尚聞悖慢庭議既得廟謀必臧旌旗燭耀於洪河金鼔震驚於靈岳鄆城自潰寧同莒魯之爭齊地悉平無俟耿陳之戰五兵永戢七德無虧含生比堯舜之仁率土陋成康之俗介丘霧息已望翠華之來沂水風生更起舞雩之詠千嵗之統實在於斯臣守在蠻荒獲承大慶抃躍之至倍萬常情代裴中丞賀分淄青為三道節度表臣某言伏見某月日制分淄青諸州為三道節度都團練觀察等使者蛇豕之穴忽為樂郊氛沴之餘盡成和氣伏惟皇帝陛下天付昌期神開寳厯復昇平之土宇㧞妖孽之根源自西自東不違於指顧我疆我理咸得其區分山川備臨制之形道塗適征徭之便俾侯既定賜履以寧異青兖之封爰從古制解曹衛之地實契雅謀車甲永藏馬牛勿用俗被雍熈之化代知仁夀之期農事載盛於耨芟儒風重興於俎豆足使季札觀魯更陳南籥之儀山甫徂齊復正東方之賦臣總戎逺地不獲陪賀闕庭云云為韋侍郎賀布衣竇羣除右拾遺表臣某伏見今月日制除布衣竇羣右拾遺者臣聞直道之行四方嚮德逸人是舉天下歸心臣伏以竇羣肥遯居貞包䝉養正學術精果操行堅明讚詠道真以求其志頃守藩服特所委知及歸朝廷輙有聞薦庻逃竊位之責以塞曠官之尤豈謂天聽曲從瞽言無廢况諫諍之職政化是參擢於布衣久無其比周行慶抃林藪震驚晦跡寧慮於遺賢懷才盡思於展效臣以性本庸踈動無裨益唯思進㧞以報恩榮區區懇誠實貫金石言而不廢㣲臣敢效於薦雄德必有鄰聖代式光於尊隗自羣受命冀復面陳廹以疾病接於休假注心蓄念寤寐兢惶無任喜躍屏營之至為樊左丞讓官表臣某言伏奉今月二十八日制除臣尚書左丞寵命俯臨慙顔自失泛大鯨之海但覺魂揺戴巨鼇之山未如恩重臣聞尚書百揆翊亮萬幾故天上尊北斗中樞陛下有南宫左轄晉昇孔坦諒直當時漢拜楊喬閑練故事庶得百寮有憚於㑹府諸侯取法於京師臣實謏才謬登清貫握蘭起草昔紊朝經剖竹頒條近貽人瘼備歴中外無聞聲彩版圖載輯貢賦未均於九州銅印更操威儀不檢於三署次郎補闕豈易其人聖主求才宜難此受切謂旁求俊乂側訪瓌奇必使德合準繩言成綱紀興化致理時無間言况安上必在於薦賢危身莫踰於曠職倘䝉垂収紫渙俯矜丹誠愚臣保陳力之言聖鑒有責成之地無任靦冐惶悚之極謹指朝堂奉表陳讓以聞臣所讓人别狀封進為王户部薦李諒表臣某言臣聞知賢必進忠臣之大方擇善而居明主之要道况臣特受恩遇超絶古今報國之誠寤寐深切是敢竭愚臣之㣲分助陛下之至明恢張羽儀𢎞輔治化臣某誠煌誠恐頓首頓首切見新授某官李諒清明直方柔惠端信强以有禮幹而甚文求之後來畧無其比臣自任度支等副使以諒為廵官未及薦聞至某月日荆南奏官勅下赴本道諒實國噐合在朝行臣之所知尤惜其去伏望天恩授以諫官使備獻納冀他日公卿之任斯焉取斯則聖朝無乏士之名㣲臣緩蔽賢之罰無任誠懇屏營之至代裴中丞謝討黄少卿賊表臣某云云即日奉事官米蘭回伏奉手詔云云者臣聞膚革既平雖疥癬而必去豺狼巳斃在狐䑕而宜除臣某伏惟元和聖文神武法天應道皇帝陛下受命上𤣥底寧下土兇渠盡殄威武載揚蠢爾腥羶尚聞凌暴靈旗斜指銅獸俯臨三軍知必勝之方萬姓喜永清之路㣲臣忝司戎律親列顔行躡伏波之舊規乘下瀨之故事盡瘁事國期畢命於戈矛不宿於家思奮身於原野即以今日某時出師就道便披榛蹶石摩壘陷堅蕩清海隅永息邉徼竊以才非充國敢自贊於無踰志慕孟公庻追蹤於不伐謬承重委寤寐含惶無任感恩隕越之至為裴中丞舉人自代伐黄賊表伏以某官噐宇端方丰姿詳雅謙虛内敏籌畧共推前佐湖南悉心匡佐後歴郡掾深負政聲惠愛在人姦邪屏息勤勞巳著幹蠱無倫今黄賊尚據荒陬犬巢未覆倘以某代某之任必能掃蕩氛祲廓清海濵竊惟斯人雅堪厥職云云為崔中丞請朝覲表臣歴刺三州連總二府外任逾紀入覲無階就日望雲魂飛心注伏惟睿聖文武皇帝陛下覆載無私遐邇同致復昇平之故事繼前聖之高蹤中外踐更出入迭用臣以虛薄叨受恩榮徒竭夙夜之心未申朝夕之敬天威咫尺誠寤寐而無違雲漢昭回固瞻仰而何及是以前在朗寧封章累上及移臨桂星紀屢周微衷尚隔於戴盆積望徒懸於窺管葵藿之誠彌切犬馬之戀逾深人欲天從於兹未驗下情上達終冀不誣敢凟宸嚴罄陳丹懇伏乞賜臣除替許至闕庭厠蹈舞於羣寮備班行於散地足趨中禁目覩大明俾成九族之榮以盡有生之幸非敢竊國賔五獻之禮希康侯三接之恩一覿龍顔萬死為足無任懇廹激切之至代李愬襄州謝上表捧讀絲綸慙悸無地拜命兢悚莫知所裁臣凡賤𤨏才智畧無取幸賴先臣緒業累忝國恩天澤曲流遂司節制寄深分閫任重專征顧無將領之才謬處衆人之上豈謂宸私軫念仁育為心霈澤無涯德音屢降士衆感恱咸思竭忠遂得潛師暗入賊境不意兇渠就戮此皆聖謀豈敢叨忝以為巳力仰荷殊造重於丘山臣以日月上訖謹當敷宣皇化普諭聖慈綏撫三軍乂安百姓翼以塵露上答鴻私臣云云代韋永州謝上表臣某言伏奉月日制書除臣永州刺史以月日到州上訖受命若驚臨職彌懼臣以無能累更事任神州赤縣實所備嘗過量逾涯毎深兢惕不謂聖恩推澤濫駕朱輪禄秩徒増詎施乳哺之惠服命虛受寧興襦袴之謡况此州地極三湘俗參百越左衽居椎髻之半可墾乃石田之餘曠牧守於再秋彌驕獷俗代征賦於三郡重困疲人分災本出於一時積弊遂餘於十稔撫安未易知法出而奸生子育誠難懼力勞而功寡夙夜憂切不敢遑寧庶當宣布天慈奉揚神化以日繫月倘或有成少裨愷悌之風用答生成之造無任感恩隕越之至栁州謝上表臣某言伏奉詔書授臣栁州刺史以今月二日至郡上訖臣前歳以乆停官秩去年䝉聖恩除替便欲裂裳裹足趨赴京師以舊疾所嬰彌年未愈逮及今夏始就歸途襄陽節度使于頔與臣早歳同官見臣當暑在道懇留在館尋假職名意欲厚臣非臣所願伏惟陛下光被之道德已洽於區中憂濟之勤心每徧於天下嘗以萬邦共理必藉於循良一物不遺尚隆於體貌假臣寵渥重領方州駑駘復效於奔馳枯朽更同於華秀臣聞潢汙易竭抑有朝宗之願犬馬無識猶知戀主之誠揣分則然惟天知鑒况臣昔因左官一紀於外子牟馳心於魏闕汲黯積思於漢庭豈非夫人獨無斯戀去就者榮辱之主朝廷者仕進之源臣子之宜忠貞所志臣雖心同犬馬而分比潢汙華躡康衢意非徃蹇臣之此誠口不能喻意欲悉逹文非盡言此臣所以自咎自恨復乖志願猶冀苦心勵節上奉詔條惠寡恤貧下除人瘼㳟宣皇化少答鴻私不勝欣幸之至代廣南節度使舉裴中丞自代表前件官噐宇深沉天才間出爰從撫字逮於察亷所職恪勤庶務皆勸日者安南夷獠反叛害其連帥毒痡黎人某皇帝以某威惠茂著自某州刺史俾之撫臨夙夜經行盡除戎噐賊徒識恩黨衆歸義炎荒之俗靡不底寧後改鎮容州勲效彌顯澄清庶類邁德前修深負能名合遷重鎮臣自惟凡懦不逮前人伏乞天恩廻授某非惟旌德亦是飾能庶微臣免尸位之憂某獲無私之舉奉薦從事表某績茂戎軒才優管記操刀必割豈謝剸犀落筆不休寧慙倚馬况早登科選夙洽時譚匪惟詞藝雙美抑亦噐能多適比於流輩頗為滯淹輙敢薦陳伏希奨錄代節度使謝出鎮表鴻霈曲臨惶駭交集捧對綸綍不知所圗臣聞蕭曹佐漢六合為家奭望匡周萬方同軌臣幸以芻賤累忝殊榮天德薦臨遂加台政不能翊宣聖明増日月之光俾兇渠𠞰絶人用康寧實由臣不稱職使此艱患伐檀興議負乗招譏常懐覆餗之虞敢望專征之寄獻俘未逺展效有期希此微功上答殊造無任云云為楊湖南謝設表臣某言中使某乙至奉宣聖㫖賜臣長樂驛設者恩榮特殊宴飲斯及顧兹厚禮猥集微躬臣某誠懽誠慶頓首頓首臣以多幸屬此昌期任重方隅職忝文武甘受素飱之刺知無肉食之謀以憂以惶寤寐無措豈謂鴻恩繼至豐膳爰來陸海兼陳飴醴皆設庶當奉揚聖澤覃布逺人流愷樂於皇風均乳哺於赤子少陳微效上答殊私無任感恩欣躍之至為武中丞謝賜櫻桃表臣某言中使某乙至奉宣聖㫖賜臣櫻桃若干者天眷特深時珍洊降寵驚里巷恩溢方圎臣某誠喜誠懼頓首頓首伏以含桃之羞時令攸貴况今採因御苑分自天厨使發九霄集繁星而積耀味調六氣承湛露而不晞盈眥而外被恩光適口而中含渥澤顧慙素食彌切自公豈圗君子所先遂厭小人之腹無任云云謝賜時服表祗荷寵私啓處無地臣乆忝朝行歴職無效荏苒星紀偷榮歳時不能少益聖猷以副深寄致使賊遺君父艱難未息合處嚴憲以正國章伏以陛下恢天覆之恩廣地載之厚不循彛典俾同冕紱重劇丘山捧戴以入閨門空知夕惕裁縫而為衣服固可晝行内省疲駑將何答效謝賜端午綾帛衣服表綸言曲臨寵服荐至跪捧殊錫慶躍交并臣中謝臣謬典方州效微㳙滴叨承大貺榮重丘山非才沗恩俯伏慙荷朱明啓節御府賜衣沐聖澤而溟海方深披仙衣而鶴龜齊壽馳心向闕跼影望天慙分五嶺之憂莫副九重之詔臣無任云云為文武百寮請復尊號第二表臣等言臣等前詣朝堂上表伏請復加尊號奉被還㫖未遂懇誠拳拳顒顒不勝大願臣等伏以崇明號昭聖德爰自中古實為上儀以至於我祖宗莫不膺兹典禮伏惟皇帝陛下有廣運之德𢎞照微之仁燭幽以明威逺以武惠澤之被誠浹洽於八方英聲之揚宜越軼於千古而乃乆為抑損以守謙㳟事有曠而不遵禮有闕而未備臣等又以為不私於己是謂至公有美之而莫敢辭有非之而莫敢隱必推於物而順於人既以徇於羣心又思叶於中典此皆聖人之事也且夫虛而失實則誇耀而誣質而不華則朴畧而固所以王度資於潤飾帝者務於恢崇將以法日月之昭明配天地之廣大聳逺方之觀聼兼前代之軌模然後表其全功謂之盡善不可以方當陛下臨位羣臣在廷而使鴻名不彰盛典猶闕既無以光昭衆美又無以丕承舊儀則臣等䝉恥於今獲罪於後實為大懼敢忘盡規尊號之崇願從羣議伏惟陛下俯迴宸睠察納愚誠不惟臣等受恩天下幸甚無任區區懇迫之至謹昧死重詣朝堂奉表固請以聞臣等誠懇誠勤頓首頓首謹言第三表臣等言前再上表請加尊號實以功德俱茂典禮宜崇然而不能鋪陳無以動悟愚誠雖竭天鑒未迴臣等誠恐誠懼頓首頓首臣等謹按白虎通曰號者功之表也神農有教田事之勤燧人有興火食之利伏羲正五始祝融續三皇人為之名以美其事其後帝王之盛洎我祖宗之明咸因人心而順古道雖損益或異而表明功德一也臣等是以遵有國之令典採上古之遺文察人心於謳謡觀天意於符瑞敢以為請累表陳誠曩者運丁艱難時或順動陛下思成湯之罪巳念周宣之側身去徽號而不稱垂炯戒而自儆應天以德示人以㳟聞於蠻貊戎夷告於天地宗廟是故咸知陛下之志慕義而歸仁潜感陛下之誠通靈而助順今者君臣同德上下叶心百職畢修庶官以序禮法明具教化流行方内歡康天下寧一四方遵業萬彚樂生嘉應休徴神物靈貺形於草木著於星辰而辭之以仁壽未臻至化猶鬱遂使德誠可紀名號未崇不告於神明不示於殊俗將何以知陛下之戡難將何以表陛下之致平下無以威於四方上無以報於九廟其不可一也淳古之至化邈而不足烈祖之盛儀廢而不續其不可二也庶正羣官宗室支屬西土耆長太學諸生黄冠之倫緇衣之侣萬衆伏闕彌旬織路而乃不從人心以違公議其不可三也守謙㳟卑譲之志忽光大宏逺之圗臣等誠雖至愚以為大謬伏以常乆之德貞夫一也元始之義善之長也并包覆露天之大也清静𤣥黙道之妙也睿知之周物不可以不稱夫聖也妙算之無方不可以不稱夫神也行仁義修典法歌詩頌考文章不可以不稱夫文也却戎夷剪暴逆邊兵之整禁衛之嚴不可以不稱夫武也而合於唐堯乃聖乃神乃武乃文之德臣等謹稽之乾符叶於古典侔德澤之廣配功業之崇昧冒萬死伏請上尊號曰貞元大道聖神文武皇帝臣等竭其精誠發於交感無以迴日其能動天無任屏營悃懇之至謹復詣朝堂奉表固請以聞及大㑹議國子祭酒韓洄請歴數近日徴應祥瑞故又改其文如後表又伏見陛下以今年四月以來方當雩祭之修而有旱備之請纔愆期而未害於物深軫念而將䘏其人氣潜通而交感以和澤旋流而霶霈斯逺由是風雨時而霜雹不降稼穡茂而蝗螟不生農功以成年穀大熟休祥數見福應屢臻仁木連理而垂隂嘉禾同穎而挺秀壽星舒景炎之盛芝草布葩英之重白麞凝彩而雪輝蒼鳥取象於天色將徧於郡國相繼於歳時右具如表為裴令公舉裴冕表大厯四年十二月戊戌裴冕卒八年公始生當無此表或云其先人為郭令公作臣某言聞忠邪不可以並立善惡不可以同道吳任宰嚭而伍胥誅夷楚任靳尚而屈平放逐逺惟前事孰不痛心伏見澧州刺史裴冕忠肅温恭道髙德厚匪躬無怠有蹇諤之風道佐先帝驅馳靈武賛雲雷之業成社稷之勲程元振忌其直方遂加誣構投荒謫裔天下稱寃空懐醖正之悲莫雪増嫌之耻今奸邪屏退聖政大明百度惟貞四門以穆寰海之内元元之人莫不延首德音思聞至化願特令追冕列在天朝俾之端揆庶寮平章百姓處詢謀之任當燮理之權必能協和萬邦致君堯舜臣位兼將相職忝股肱思進賢傑共熈帝載臣無任懇願之至為裴中丞賀破東平表臣某言日月得進奏官狀報逆賊李師道以某月日克就裊戮率土臣子慶抃無涯臣聞負恩干紀者鬼得而誅犯順窮凶者天奪其魄不息妖孽曷彰聖功伏惟陛下先天不違與神合契掩周宣中興之業陋漢光再造之勲靈旗四臨氛沴皆散凡在臣庶盡覩昇平伏以師道席父祖以作威苞海岳而專禄恃東秦十二之險誘臨淄三七之兵竊據一方歳踰五紀朝宗之地曠若外區封祀之山隔成異域累聖垂德曽未悛心餘孽滔天果聞折首遂使云亭有主知玉牒之將封遼海無虞見石砮之巳至此皆陛下神籌獨得廟畧無遺授任推盡力之誠縱舍有感心之化金石可貫龜筮必從克成不戰之功遂洽無為之理臣謬司戎旅逺守方隅愧無横草之功坐見覆盆之泰抃蹈歡慶倍萬恒情賀赦表臣某伏奉某月日恩制大赦天下一人有慶百度惟新戴天履土罔不欣抃某聞天地成功施雨露而育物帝王繼統昇日月以垂曜羣品資始萬方文明伏惟陛下嗣守鴻業光膺駿命淳化均於四序大德合於二儀保寧社稷光宅區宇𢎞孝慈以御下崇㳟儉以垂休恩覃溪洞事貫千古况乃順時布政乗春導和敷作解之澤宣再宥之典九族既睦四門廣闢而又洗滌幽縶雷雨之施也歸還流竄羅網之釋也移叙貶黜覆載之仁也蠲除逋債政理之源也褒寵勲賢激勸之方也廢金寳之貢有以彰儉德搜遺逸之士有以表至公元勲宿將賞延子孫庶尹卿士榮周存殁廣直言之路啓進善之門德超虞夏道掩軒頊必將平一殊俗發揮大猷億萬斯年永荷天緒臣謬當任用守職藩維不獲奔趨闕庭親覩盛禮感悦歡抃倍萬恒情宋進刑統表竇可象臣聞虞舜聦明始恤刑而御物漢髙豁逹先約法以臨人蓋此丹書輔於皇極禮之失則刑之得作於良而敝於貪百王之損益相因四海之凖繩斯在如銜勒之持逸駕猶郛郭之域羣居有國有家其來尚矣伏惟皇帝陛下寳圗攸屬駿命是膺象日之明流祥光於有截繼天而王垂洪覆於無疆乃聖乃神克明克類河圗八卦惟上德以潜符洛書九章諒至仁而黙感哀矜在念欽恤為懐網欲自宻而疎文務從微而顯乃詔軌事明啓刑書俾自我朝彌隆大典貴體時之寛簡使率土以遵行國有常科吏無敢侮伏以刑統前朝創始羣彦規為貫彼舊章采綴巳從於撮要屬兹新造發揮愈合於執中臣與某官臣某等俱效檢尋庶無遺漏夙宵不怠綴補俄成云云臣等幸遇文明謬參憲法金科奥妙比虧洞逹之能丹筆重輕徒竊討論之寄將塵睿覽惟俟嚴誅謝賜衣表楊大年解衣之賜猥及於下臣挾纊之仁更均於列校光生郡邸喜動轅門伏以皇帝陛下誕膺元符恭臨大寳惠務先於逮下志惟在於愛人鳥獸氄毛甫及嚴凝之候衣裳在笥爰推賜予之恩在渙汗之所沾雖容光而必照如臣者任叨符竹地僻甌吳奉漢詔之六條方深祗畏分齊官之五服忽荷頒宣纂組極於纎華純綿加於麗宻璽書下降切窺雲漢之文驛騎來臨更重皇華之命但曳婁而増惕實被服以難勝矧於戎行亦膺天寵干城雖乆皆無汗馬之勞守土何功獨懼濡鵜之刺仰瞻宸極惟誓糜捐謝直集賢院表夏子喬北門禁省給青簡以試言東觀直廬降紫泥而命職莫逭假人之刺彌彰遇主之榮竊以承明設待詔之官實漢朝之芳潤麗正啓修書之院乃唐氏之英華濬圗書之淵敞龍鳯之宇自非弓裘繼世章句名家通授羲畀姒之靈篇閒書笏珥彤之故事則何以繼成康之美頌考宣武之懿文陪法從於甘泉奉宸游於屬土况當聖日允屬簡求如臣者學不傳經文非近史青青子珮雖見刺於勞心翹翹錯薪亦濫期於刈楚筮仕勝衣之歳薦名象日之畿方博帯以觀光遽墨衰而㳂牒尋遇國家誕敷尺詔増廣六科方棲枳以徒勞遂上封而自薦始較文於鰲苑旋試可於鼎司亟趨文石之墀遂忝延英之問擊轅度曲敢望於九成縈帯分墉俄登於百雉陞象河之屬吏佐分虎之方州爰受代於瓜時遂歸朝於幄坐典陳陳之粟閲山委之丘區從九九之車總絲棼之案牘暨還衡睢壤舍爵太宫既諧引籍於金閨將佐于蕃之熊軾又慮沉迷簿領廢墜簡編負公朝振舉之科辜聖王詳延之意遂殺青而奏技果出綍以推恩禁林俾試於雕蟲書殿遽令於抱槧閲上帝之冊府目眩星辰登道家之蓬山足踐雲氣奉長者之餘論與先生而並行分直石渠地接嚴更之守縱觀金匱門連著作之廷載惟螻蟻之軀莫報乾坤之賜㳟惟皇帝陛下事寢廟以至孝奉靈祇而克誠流鴻藻於絶垠鑠景炎於徃號以文明而行健體柔克以居髙縱觀唐漢之大猷備舉黄虞之故實睿藻和而六同韻天章麗而五色飛恢崇務廣於斯文奬擢不遺於小道遂使至孤之士獲塵非次之恩東陵遽擬於西山羔裘遂登於狐腋歌衛風而合雅鬻齊紫而雜良誠當潔節於素絲敢不盟心於白水益三緘而出話彌九復以窮經永冰淵惕厲之心奉日月照臨之鑒庶逭素飱之謗仰酬明主之知媿懼所深兢惶不巳賀南郊大赦表宋子京帝儀訖饗朝渙推慈飛驛疾傳庶邦叢慶切以天郊之重國制有常凡萬乗躬行必三歳間徃不煩不怠由列聖而持循以妥以䖍合諸神而裒對睿圗累盛縟典勤修㳟惟皇帝陛下纂大合華執中布度抵金璧之珍玩率儉示人収霜電之嚴威措刑於下克勵明德格於皇穹交薫大和冒我羣品顧懐時億瑞應日來亟蕆上儀若祇舊典戒期百執頒詔九州曳雲威之徜徉服翠蚪之泮渙殊庭一獻諸祜徧躋遂自陽靈之宫徃㑹天元之旦羽旄四合垓陛參登上壁左琮之華合袪而信祝祖蕝宗題之次更侑而廸嘗拜嘉胙於席垂列欽祡於雲表靈心合答熈典備成然後還坐中天之闈普肆隨風之澤改頒大號崇冠初元昭神之祥祈命惟永賞功赦罪巳責逮瘝咸與惟新牖民衷而遷善聿懐多福道帝祉於緜區盛際有光彛倫咸賴臣饗官舊吏殫見徃朝或不愛牲玉為㳟殊非明薦或所過租賦為復蓋出重勞語昔罕全訂今絶擬所恨清塵在望自苦周南之留紫槖仍持不與甘泉之從第班恩諭均浹歡悰代人乞出表臣聞物勝於權則衡為之殆馬竭其力則御速於顛蓋以噐循量而易施材過求而難勉是以功名之際惟髦士可居彊力之容匪暮年勝任將傾危懇敢援斯言竊念臣本以丘樊託于經術幸逢先烈超備從官服上教之彌文因至愚而取信出入丹禁無所建明履歴藩宣蔑聞條教尊號皇太后陛下尊號皇帝陛下奉承謨訓過聼空疎簡服在庭兼容如地雖百度之治咸使與聞毎萬幾之餘常參勸講七周成歳訖乏寸長惟君知臣足以驗其無用惟國有典不可逭於黜幽且自知甚明内省尤熟以一介之鄙賤丁千載之㑹昌邑戸飱錢非禄之不厚髙冠大佩非位之不崇同僚皆賢非志之不合處奏多可非言之不從固常勉服攸箴謹修爾職答乃聖之眷遇為斯文之寵光其如犬馬齒衰桑榆景薄中年則病奪其壯晚節則務傷於神辨色立朝足居多於跛倚書思記命目不辨於馬烏而臣頃自去秋願辭近職上恩不聼寵渥就加逮黽勉以及兹且憃昏而益甚事皆忘誤疾愈尫癃顧四體之已疲宜一辭而後止重念臣之鄉籍世占鄆州既託枌榆薄營産利不勝首丘之志願諧剖竹之行庶及餘年聊蘇疲瘵况前朝邢昺本貫曹州亦自禁廬得臨鄉郡臣今所請似有前規伏望陛下念舊物之不可遺憫孤生之老且至特垂寛詔俾守先廬諒亦大君進退之間微臣止足之分萬無纎介可貽累於至仁一切便宜尚力思於卧治仰干睿鑒伏俟嚴誅謝衣襖表冬籥乗辰裘官著令疾馳使驛臨撫塞屯並頒齊笥之良均挾吳緜之煖被躬且吉束帯有華伏惟皇帝陛下至德誕敷深仁普愛念官師所以卒歳恐天下有受其寒据泰軫窮當舒慮慘况凄其戒序必惻然動心特以濵寒沍嚴持兵皸露句傳温詔緘貯紋袍爛然晝鮮煦若春至矧部校什長賜各有差僻壘窮鄣恱而忘苦振裾交抃聮袂相趨和氣暢肢顧折膠而何畏大恩壓巳憂稱服以為難有可仰酬不知輕隕代陳州章相公乞致仕第一表臣聞噐有所極強之者必顛志有所安違之者將敗是故智士不窮量以邀受仁君無咈願以責功内顧危悰敢援兹喻伏念臣姿力駑下術畧迂疎䝉幸中人之材待罪宰相之府寵與時進負隨日深謀謨弗良彫紊相踵羌夏有未纓之醜闗陜多無聊之人雈盗跳梁篁酋煽呐杼軸罄於編戸杅皮蠧於逺方上貽焦勞外讙謗誚咎不臣執罪將孰歸比者荐瀝肝膺願乞骸骨冀䝉不職之竄以贖安用之辜尊號皇帝陛下包納荒遐親喻戒敇須訖郊丘之享乃許印綬之還褒亮所加諄慈兼至臣此時外廹大誼中忘至愚敢優游以自安輙皇恐而視事然而智慮淺局年鬢頺侵短臂屈長袖之前疲足困新羈之左靦然尸位倐又彌年所賴陛下以百姓為心天下為度捨末爭而納戎帳之欵捐滯積以撫遼衽之和克展上儀遂布鴻慶永惟横目之庶方就覆盂之安臣之及兹可謂天幸過此不止其如罪何雖大度之見容在輿議之難遏抑又聞當退而進者侮必及宜黜而用者傷必多髙位乃身殃之媒厚禄為衆怨之舍借令臣冒厥明戒茍留上司玷廊廟之儀刑被史家之貶戮死有餘咎仁弗忍為伏望察如丹之誠憐指景之慕遂容納政早獲省私亦不必窮喋喋之言乃䝉矜恤第可惜以齪齪之謹妨用俊良䖍冀曰俞誓無但巳賀生皇子表具官臣祁上言寳祏叢休天支毓秀慶騰秘禁歡溢神州㳟惟皇帝陛下受命溥將凝圗丕赫乾綱獨運根乎克念之䖍簡素所安表於不勉之懿且復輕刑薄賦重穀厚民一方少饑則速馳使節白金稍乏則輙續禁錢民用靖嘉神罔恫怨是以上帝歆佑三后顧存貽美孫謀昭衍無疆之烈歸功元首茂啓多男之祥誕協仲商挺生哲嗣星弧具禮天第交華惟翕闢之儲英固覃訏而絶異逖聆詔諭並仰獻儀薦笏相趨忭吾君之有子珪璋流愛宜天下之繫心臣始去近聮遽承吉語賡歌綿瓞早知周德之遐參祝祠禖罔逮漢臣之幸臣無任瞻天仰聖不勝懽忭屏營之至謹奉表稱賀以聞臣祁頓首頓首謹言駕幸河北起居表楊大年玈矢未櫜鑾輿順動羽衛方離於象魏天威巳震於龍荒慰邊甿徯后之心増壯士平戎之氣臣聞涿鹿之野軒皇所以親征單于之臺漢帝因之耀武用殱夷於强敵遂底定於邊陲五材並陳蓋去兵之未可六龍時邁因犯順以必誅矧朔漠王庭中原鄰壤敢因膠折之候輙為烏舉之謀固巳命將出師克敵告廟雖呈入郢之機未遂下齊之願是用親御戎車躬行天討勞軍細栁之壁廵狩常山之陽師人多寒感恩而皆同挾纊王師未捷受命而孰不忘家行當肅静塞垣削平藩落破魚麗之陣収督亢之圗使遼陽八州之民咸歸丕冒榆闗千里之地盡入提封烽烟之警常消干戈之事求戢然後登臨瀚海刻石以銘功陟降云亭泥金而典禮逺追八九之迹永垂億萬之年臣忝守方州莫參法從空厲請纓之志慙無扈蹕之勞惟聆三㨗之音逺同百獸之舞汝州謝上表沉痾初釋寵寄荐臻祗命惟寅飭裝靡暇初臨郡閣獲見吏民揣已若驚戴恩罔措伏念臣本由單弱特禀庸愚以童刻之微能際帝圗之亨㑹驟參綸掖獲草芝函屬以堯德彌文漢辭爾雅雲章有爛諒黼黻以何施天律惟精亦哇咬之罔棄居常摩厲徒益空疎俄踐内庭預司宻命値皇闈之有慶扈清蹕以多歡窺雲瑞於封中聼棹歌於汾曲四廵第頌誠辨麗之絶聞二豎興妖致㝠煩之坐遘偶嬰沉痼遂劇支離因請急以歸寧遽迷魂而不復率由蹇否自抵困窮矧以蕞爾之軀㷀然去職羇孤至甚毁嫉居多嘖有煩言實盈庭之可畏豁然大度終如地以見容比及痊平果䝉齒叙此蓋皇帝陛下仁深慘怛德茂欽明軫舊故以興懐俾肖翹之遂性特加采録令獲便安况臨汝舊邦陪京近輔姬文之化所及首載聲詩地官之籍攸分實繁兵賦土多巖險民或惰㳺置使勸農抑惟令典分條察俗蓋有新書臣亦夙侍凝嚴潜窺律度敢忘瘁盡以奉化成然念臣早以㫁㫁之薄材獲齒振振之近列典司訓誥就望威顔讀銘字於湯盤時瞻景式載史言於董筆獲次舊聞舛命遘屯榮階絶迹酒泉素願敢望於生歸麗正殘編幾成於死恨今者星畿接畛竹使長人預方國之頒書禀天臺之布憲水深土厚足養於槁骸晝訪夕修冀無於秕政親末光而彌阻感再造以難勝謝除使相判相州表韓魏公宰職隳功莫副宵衣之治鄉邦得請重叨晝錦之行被恩典之特優顧人言而甚愧伏念臣早由科第遂玷寵榮不圗翰墨之進身自竭㳙塵而報國備員諫諍幾不免於竄投奮命圉疆實荐罹於艱阻獨恃聖神之眷惟開援助之言仁宗皇帝知其守以孤忠謂可屬之大事慶厯之始巳擢貳於樞機嘉祐之中乃進登於宰輔俄膺顯任益荷殊知當英廟之承祧逮聖人之嗣服稠重遭㑹罄竭愚庸惟知社稷之安豈顧家宗之末然而萬方多務一紀妨賢為國持平敢自私於輕重裁人所慾固難免於愛憎加疾疹之嬰纒苦形神之耗敝勉訖因山之禮懇陳上印之宜伏䝉陛下念犬馬之力易衰廓日月之明為照不罪再三之請亟垂開可之音進秩地官剖符枌社建髙牙之重既疏淮海之封増故里之光仍襲貂蟬之舊叨塵之甚今古疇偕敢不思盡瘁於寢興泯寘懐於内外在邊在庭之責惟驅策以當前益堅益壯之心至糜捐而後已臣無任瞻天仰聖感荷屏營之至謹上表稱謝以聞謝賜生日禮物表王禹玉臣某言月日臣生日伏䝉聖慈賜以禮物者聖言如綍傳温厚於芝函邦錫自天發光華於蔀屋榮踰素望媿溢常涯伏念臣以固陋之資被睿聖之眷廼預塵於政路復冠列於台司歳月崢嶸而屢更精力勤勞而莫補速譏讒於衆口媿叨列於前人逮兹茍完安有横冀載及桑蓬之序方深岵屺之思念莫報於劬勞敢饕承於恩禮良金燭乗嚴寳靮於天駒藻帛絢文離華章於笥服豈繄蕃庶併及衰遲此蓋伏遇皇帝陛下敦舜孝以儀民軫堯仁而冒物特厚柄臣之遇過頒御府之珍交孚曲記於賤生博愛乃容於濫賜拜漢庭之寵雖慙稽古之功報周雅之章願上如岡之壽臣無任仰天感聖懽忭屏營之至上表稱謝以聞辭起復表富彦國喪次啣哀甫終卒哭使華傳命繼至敝廬心積驚憂情深屠烈雖屢傾於丹懇尚未錫於俞音天逺莫量物微難動不避䙝煩之咎更陳隕絶之詞必冀神聰俯從哀請伏念臣早罹家難偏奉母慈猥以憃愚最鍾愛育享禄未幾遽纒風樹之悲報德永違徒懐霜露之感寢苫枕塊而適抱至痛食稻衣錦則若為自安實非人情尤紊邦制况今中外無事左右得賢共輔聖明之期安有隳曠之務曲䝉下詔更起孤臣在陛下馭國之方蓋欲不遺於舊物於朝廷敦化之道必恐有誤於蒼生何須稽故事以遂前世之非正可存禮經以圗今日之善行之即是義不為難豈惟於陛下有復古之風抑亦俾愚臣得事親之道一為匪戾兩得其宜兼臣悲傷之餘衰病交至精力已耗神觀未還假使充員豈堪應務茍令終畢於祥禫庶幾稍復於幹魂得此從容可備驅策伏望尊號皇帝陛下日月臨照天地包容盡母氏平生之恩憐人子罔極之苦曲矜末志得滿鉅憂生意凋零或尚未捐於溝壑清光咫尺終期伏望於雲天悲感増深懇願兼劇賀平河外三州表伏以平戎韜畧靡用干戈陷敵編氓自還里閈豈特鄰封之效順行知鋒鏑之可消患弭一隅治形四海伏以善戰之至初無勇功神武之行亦云不殺矧西羌之叛服如禽獸之去來始非得已而用兵終則附懐之有道巢穴可窮而不問邉陲安堵而自如情狀益殫欵誠屢至遂同革面相與向風既内懾於威靈遂盡歸其俘獲殆非力致純以德來矧是生還率當死節度湟伐木不煩充國之謀謁廟賜田如見子卿之返伏遇皇帝陛下上仁兼覆盛德維新小二漢之邉功盡三王之能事眷惟士伍偶被聲明鞮譯在途既奉君臣之義衣裳改衽復從父母之邦邉堠告寧人情底豫豈冀七旬之恪是為千載之逢臣頃預政機親聞睿算比分憂寄獲覩成功再拜奉觴雖阻漢庭之列大書作策永為宋史之光感頌之私倍萬常品臣不勝欣躍屏營之至謹奉表稱賀以聞賀皇長子封公表王君貺具官臣某言伏覩某月日聖㫖封皇長子為某公者伏以建親授社屏翰於王家封子維城安疆於國幹誕揚休命敷告羣倫均海宇之歡心洽朝廷之大慶竊以宗藩錫瑞賢戚分疆周列侯邦半諸姬而啓土漢有天下非劉氏則不王皆所以滋大本支維持宗室綿鼎數於穹壤固廟祏於山河屬我熈朝益隆茂典㳟惟尊號皇帝陛下纂承皇序恢闡洪圗善廸孫謀遹遵祖構乃眷元良之重巳昭岐㠜之英肇啓南圻崇加上壤離明震豫知帝緒之無疆海潤星暉戴吾君之有子臣居留近甸迹逺彤墀側聴恩章愈増忭懌臣瞻望闕庭無任雀躍屏營之至謹奉表稱賀以聞廣德軍謝表錢君倚曠官罪大奪位秩者彌年享帝恩隆回雷霆於數日籍還省部身忝軍牙祗荷寵靈伏深感懼伏念臣江湖賤士巖穴孤生出逢聖辰外備法從學非深造粗能明致治之方心不茍容故欲罄事君之節義當有在雖富貴誘之而不回職所宜言雖斧鉞威之而益厲果由官守遂正典刑放之窮山所以苦其心志授之散秩將以餓其體膚期沒齒於蒿萊敢希榮於軒冕豈圗寛宥尚被采収死灰於是乎復然白骨於焉而再肉近鄉守壘上冢還家百計安閒一身妥逸使其自請未必能然此蓋伏遇皇帝陛下化極文明恩漸動植如天之覆逺則彌周如日之中幽無不燭遂容駑質猥玷鴻私况是桐川獨居江左俗雖僻陋而稱風物之良地雖褊廹而有山林之勝養兹不肖孰曰匪宜惟修省所以飭躬惟忠勤所以報國有民有社固恪奉於訓詞為子為臣方益堅於素節誓殫犬馬仰答龍光臣無任瞻天仰聖感荷屏營之至謹奉表稱謝以聞唐宋元名表巻上之一欽定四庫全書唐宋元名表巻上之二明胡松撰宋謝賜玉帶表王介甫臣安石言某月日伏䝉聖恩以收復熈河洮岷疉宕等州特加褒諭親解玉帶賜臣者尸臣列侍方臨極辨之朝􅉏御瞻傳獨拜非常之賜寵綏狎至懇避弗俞焜燿有加凌兢無措中謝竊以河洮之業兆自聖謨方虎之材進非師錫片言投匭遂察見其有孚衆訿盈庭預照知其無𤯝以至授兵算食蒐卒第功能畢協於始謀實仰歸於獨斷如臣蕞爾何力有焉伏惟皇帝陛下善貸其成勞謙不伐弛曠鰥之大責録將明之小忠揚於廣除委以珍御瑟彼英瑶之質煥乎華衮之言臨授用光顧榮踰於古昔退藏惟謹知燕及於雲來施更厚於解衣報敢忘於結草臣無任除左僕射謝表臣某言伏䝉制命授臣尚書左僕射者貳令中䑓兼官左省惟時遴選盖嘗久曠而弗除忽此叨居顧豈㣲勞之可稱陪敦厥邑敷告於廷是皆至榮難以虛辱中謝竊以經術造士實始盛王之時偽說誣民是為衰世之俗盖上無躬教立道之明辟則下有私學亂治之姦氓然孔氏以羇臣而興未喪之文孟子以㳺士而承既没之聖異端雖作精義尚存逮更煨燼之災遂失源流之正章句之文勝質傳注之學溺心此滛辭詖行之所由昌而妙道至言之所為隠篤生上主純佑下民成能協乎人謀將聖出乎天縱作於心而害事放斥幾殫通於道以治官延登既衆尚懼膠庠之黎獻未昭典籍之羣疑乃集師儒具論科指繕書來上襃典俯加臣趣操弗高知識尤淺少嘗勤苦但為裘氏之吟晚更耄衰豈免輪人之議初備使令之乏即知稱愜之難敢意誤恩獨當殊奬此盖伏遇陛下以化民成俗為事故急在誨人以尊德樂道為懷故易於縻爵因忘固陋特假龍光祗服訓辭深惟報禮雖無博學對揚稽古之鴻名庻以雅言助廣右文之美化臣無任進修南郊式表某月日臣某等伏䝉聖上命修南郊式進呈者郊丘事重筆削才難猥以㣲能叨承遴選中謝盖聞孝以配天為大聖以享帝為能越我百年之休明因時五代之流弊前期戒具人輙為之騷然臨祭觀成事或幾乎率爾盖已行之品式曽莫紀於官司故國家講燎禋之上儀而臣等承撰次之明詔迨兹彌嵗僅乃終篇猶因用於故常特刪除其紛冗恭惟皇帝陛下體聖神之質志文武之功嘉與俊髦靈承穹昊物方鬯茂以薦信而無慙人且昭明知因陋之為耻固將制禮作樂以復周唐之舊豈終循誦習傳而守秦漢之餘則斯書也譬大輅之權輪與明堂之營室推本知變實有考於將來随時施宜亦不為乎無補臣無任生皇子賀皇帝表宫闈嗣慶寰海交忻凡逮戴天惟均擊壤中賀臣聞螽斯之言衆子實為王者之詩華封之祝多男亦曰聖人之事㳟惟陛下紹祖休顯憲天聰明致文武之憂勤成堯舜之仁孝宅師無競莞簟之寢既安傳類有祥弓䪅之祀屢應貽謀方永錫類用光臣託備藩維叨承睿奬不顯亦世家實預於榮懷於萬斯年心敢忘於慶幸賀生皇子表嘉慶疊傳歡欣總集臣歴觀古昔誕受福祥厥配天所以久長乃有子至於千億伏惟皇帝陛下鳬鷖之雅媚於神祗芣苢之風燕及黎庻弓韣嗣燕禖之報旐旟仍羆夣之祥無疆惟休永保桑苞之固有室大競方觀椒實之蕃臣嘗汙近司久尸榮禄特荷殊憐之至豈勝竊喜之深又表皇運至隆天枝彌茂照臨所暨鼔舞攸均臣聞史紀文慶之延豈惟十子詩歌姒徽之繼爰至百男肇敏於修乃繁厥祉恭惟皇帝陛下道冒區宇徳冠往初品庻䝉休既饗和平之樂神靈錫羡果膺蕃衍之祥臣嘗汙近司備叨殊奬以宿痾而自困欲旅進以無階謝知制誥表髙華之選欲報嘗難固陋之身以榮為懼切以自古招智能之士因使為侍從之臣豈特頼其虛名謂能華國盖將取其實用相與致君矧號令文章之為難而討論潤色之所寄茍失職不稱則為時起羞伏惟皇帝陛下躬上聖之資撫久安之運趨時有救弊之急守噐有持盈之難當得賢俊使備遺忘且典司明命出入禁門一有瘝官尤為累上臣羇單賤士鄙朴常人仕初有志於養親學遂不專於為已比更煩使稍竊謬恩内懷尸禄之慙仰負食功之意又䝉採擢以至超踰盖君之視臣不使同犬馬之賤則下之報上亦欲致岡陵之崇况臣少習藝文粗知名教遭逢一旦度越衆人唯當盡節於明時豈敢尚懷於私計謝賜對衣鞍馬表出大庭之顯服束以精鏐引内廐之名駒傅之錯采隆㤙所逮朽質知榮竊念臣弱力淺聞久憂積疢中預從官之選外分守將之權僅免譴訶更䝉收召論思潤色曽莫效於㣲勞衣被服乘乃前叨於異數此盖伏遇皇帝陛下醲於慶賞詳在招延因示眷懷使知奮勵誓竭愚忠之報兾無虛授之嫌乞罷政事表私懷懇至巳具布聞聖訓丁寜未䝉開納敢冒崇髙之聽再輸悃愊之情臣聞任賢之方要其有用陳力之義止於不能茍弗集於事功且重罹於疢疾豈容叨據以累明揚伏念臣猥以孤生親逢盛世昧於量已志欲補乎休明失在信書事浸成於迂闊毎煩衆論上溷聖聰久知素願之難諧繼以積疴而自困辭而去位庻逃竊食之誅勉以就功重荷包荒之德雖暫順命終懼妨功伏惟皇帝陛下閎度并容大明俯燭特垂矜允俾遂退藏如此則孤進之身獲全生於末路具瞻之地得改命於時材謝朱炎傳聖㫖令視事表使指遄臻訓詞俯逮敢圖衰疾尚悞眷存伏念臣曲荷搜揚久辜付屬有能必獻未嘗擇事而辭難無力可陳乃始籲天而求佚然方焦思有為之日以此懷恩未報之身茍營燕安豈免慙悸伏䝉陛下仁惟求舊義不忘遐乃因乘軺將命之臣更喻推轂授方之意踦履無用誠弗忍於弃捐朽株匪材尚奚勝於噐使永惟奬勵徒誓糜捐賀册皇妃表明備之禮發於宫闈驩康之聲播於寰海伏惟陛下考古之憲刑家以身乃資婦徳之良俾貳坤儀之政盖闗雎之求淑女以無險詖私謁之心鷄鳴之得賢妃則有儆戒相成之道於以求助不專為㤙臣生逢明時切觀盛事祝聖人之多子輙慕堯封思令德以式歌豈慙周雅漳州進珠表王冕宋大中祥符六年春冕自廬陵移典是郡越明年三月龍溪屬邑民丘􅀈於九龍溪網魚得珠一顆一圍闊三寸七分中有小珠七顆如七曜次如七曜者不可勝數縣弗敢留函珠上之於郡冕熟而視之殊大歡忭即日召厥屬官以驗之復相稱慶曰夫珠至寳也王者德至淵泉則出今天子仁且聖方以寛慈被天下宜乎珠之出奬聖世又珠之為物也其色瑩净明清乃化民之象也於是列表以進尋奉勅書以旌至寳冕既叨為政能獲斯寳又懼是事泯絶於後刋之貞石於公㕔之左用傳於永永耳臣冕言臣聞皇猷允塞天乃效祥聖德升聞地不藏寳前珠得非蛇口産異蚌胎有感必通生自煙潭之内無脛而至忽居寳肆之中熒煌外散於月華皎潔内含於星彩此盖皇帝陛下齊莊奉道清净化民體乾極以握符致坤靈而薦瑞遐稽信史逈殊照乘之光洞究祥經弗類媚川之色臣握蘭郎署剖竹侯封幸逢江海之珠難藏外郡願繼梯航之貢干黷内庭代高麗王謝賜燕樂表十行賜札誕彌遼海之邦萬里同文普聽鈞天之樂俯慚虛受中積愧懷伏念臣錫壤三韓襲封四郡環居島服習聞夷韎之聲仰睇雲門實眩咸池之奏方重華之上治躋累洽之閎休監二代之敷文命一䕫而制樂登歌下管天地同流鼔瑟吹笙君臣相説加賁鹿苹之饗輔成魚藻之歡有懷䟽逖之臣亦與分頒之數玉帛萬國干舞已格於七旬簫韶九成肉味遽忘於三月仰止柷敔之賜鬰然食侑之光驟此叨居殆無前比兹盖伏遇皇帝陛下躬持慈寳丕冒仁恩通道八蠻坐致逺人之恱同符五帝肇聞古樂之興出大成之珍藏作朝鮮之榮觀兠離一變慈惠均敷蕩蕩乎無能名雖莫見宫墻之美欣欣然有喜色咸與聞管籥之音稽首拜嘉周邦來賀臣敢不服膺睿奬謹度遐方仰九門之句傳徒起戴盆之望與百獸而率舞但深傾藿之心皇子謝賜御書孝經十六句表孫仲益臣某言伏䝉聖慈賜臣御書孝經十六句者睿謀垂裕夙承父訓之嚴神畫䟽恩備舉聖經之要因心立教拭目知榮臣某惶懼惶懼頓首頓首惟夫子之發㣲言為曽參而陳孝道首述君親之事謹始及終復虞冨貴之移戒危與溢身行口言之無失天經地義之兼該事可法徳可尊表裏俱正居致敬養致樂造次弗違神明四海以交孚進退一忱而匪懈有倬飛鸞之翰於昭貽燕之謀二八句之特書撮其樞要千萬人之咸恱始於家邦仰倣邇英之屏俯殊制㫖之注矧熈朝資善之學肇祥符丙辰之春詔儒臣而讀是經錫宸章而刋諸石洊觀洪藻宏賁前猷臣德匪溫文性慚岐㠜出有師入有保蚤齒虞庠親則父尊則君恪趨周寢曩者分封之渙號誨之全孝以移忠㫖趣㑹於五經未窺聖藴德教加於百姓徒仰皇仁載覩河洛圖書之光如親洙泗問答之語兹盖伏遇皇帝陛下學稽古典筆寓天常作嗣萬年受祉而及於子冠冕百行得手而應於心祖武可稱人文増煥臣敢不聿嚴琰冩式廣家藏朝夕歌六章之詩逺邁唐宫之賜札夙夜事一人之訓恭修建邸之陳圖潭州通判謝上表歐陽永叔始竄嶺南人皆謂之必死及遷湖外恩實出於再生仍復前官俾闗郡政仰叨成命増激㣲衷切念臣寒禮仍親道德未稱㳙以茂辰膺兹鴻典斑輪飾駕奮五采以相宣碧鏤題宫配二儀而胥永臣以濫叨詞職竊守藩封昭數在庭莫覩鑾旌之美含和發詠率同鳬藻之誠謝復龍圖閣直學士表恩還舊職事雪前誣感極心驚涕隨言出臣伏見前世材賢之士身結主知勲徳之臣功施王室然尚或一遭謗毁欲辨無由少忤要權其禍不測顧如臣者何足道哉臣材不迨於中人功無補於當世用之未見有效去之無足可思矧罔極之讒交興而並進易危之迹何恃而不顛而聖心不忘㤙意特至辨罔欺於曖昧沮仇嫉於衆多雖暫居譴謫之中而屢被陞遷之渥今又特䝉甄録牽復寵名以臣之愚豈比前人而獨異推其所幸盖由聖主之親逢謂宜如何可以論報再念臣禀生孤拙本乏藝能徒因學古之勤粗識事君之節茍臨危效命尚當不顧以奮身况為善無傷何憚竭忠而報國誓期盡瘁少答髙明南京留守謝上表守宫鑰之謹嚴敢忘夙夜布政條之纎悉上副憂勤寄任非堪兢營並集伏念臣賦才庸薄禀數竒屯毁譽交興兩嘗過實寵榮踰分動輙招尤念報效之未伸敢不竭忠而盡瘁因風波之可畏則思逺去以深藏迨此六年外更三守學偷安而杜口負素志以媿心朽質易衰已凋零於齒髮良時難得尚希慕於功名豈謂皇慈未捐舊物擢從支郡委以名都惟此别京舊當孔道簿領少克勤於職事厨傳多取恱於路人僅從俗吏之所為雖能免過非有古人之大節未足報君亳州謝上表貳政非才雖獲奉身而退分符善地猶懷竊禄之慚祗荷寵靈惟知戰懼伏念臣章句腐儒之學也豈足經邦斗筲小噐之量也寜堪大用而叨塵二府首尾八年荷三朝之誤知罄一心而盡瘁若乃樞機宜慎而見事輙言䧟穽當前而横身不顧竊尋前載未有能全昨怨出仇家搆為死禍造謗於下者初若含沙之射影但期隂以中人宣言於庭者遂肆鳴梟之惡音孰不聞而掩耳頼聖神之在上廓日月之至明悉究罔誣遂投讒賊再念臣性實甚愚而疎於接物事多輕信者盖以至誠自矢如彼匪人失於泛愛平居握手惟期道義之交延譽當朝常丐齒牙之論而未乾薦彌之墨已彎射羿之弓知士其難世必以臣為戒常情共惡人將不食其餘而臣與遊既昧於擇賢在滿不思於將覆自貽禍釁幾至顛隮上煩睿聖之保全得完名節於終始及懇辭於重任尤深惻於皇慈雖避寵辭隆僅能去位而清資顯秩愈更叨榮莫逃僥倖之譏實負心顔之靦斯盖伏遇皇帝陛下乾坤大度堯舜至仁察臣自取於怨仇本由孤直憫臣力難於勉強盖廹衰殘既獲免於非辜仍曲從於私欲遂同萬物俾無失所之嗟未盡餘生敢忘必報之效謝止散青苗錢放罪表有罪必誅是為彛典原情以恕特出深仁聞命驚慚省躬涕泗伏念臣以一介之㣲賤荷三聖之奬知寵䘵既豐初無報效筋骸已憊尚此遲徊曲䝉大度之并容誤委一方之寄任職當撫俗責在分憂方兹旰昃之勞心豈敢因循而避事昨遇國家新建官司而主計大商財利以均通分命出使之車交馳於郡縣悉發舊藏之鏹取息於農氓而臣方久苦於昏衰初莫詳其利害既已大喧於物議始知不便於人情亦嘗畧陳衆弊之三兾補萬分之一屬再當於班給顧巳逼於㑹期雖具奏陳乃先擅止據兹專輙合被譴呵豈謂伏䝉皇帝陛下深軫睿慈俯矜朴拙免從吏議特貸刑章夫何草木之㣲曲被乾坤之施臣敢不益思祇畏更勵操修戒小人之遂非希君子之改過兾圖薄效少答鴻私乞致仕第二表睿訓丁寜曲加諭慰愚忠懇廹尚敢黷煩將再干於冕旒宜先伏於砧鑕伏念臣世惟寒陋少苦奇屯識不逹於古今學僅知於章句名浮於實用之始見於無能噐小易盈過則不勝於幾覆徒以早際千齡之亨㑹誤䝉三聖之奬知寵榮既溢其涯憂患亦隨而至禀生素弱顧身未老而先衰大道甚夷嗟力不前而難強毎念㤙私之莫報兼之疾病以交攻爰於守亳之初遂决竄漳之計逮此三遷於嵗律又更兩易於州符而犬馬已疲理無復壯田廬甚邇今也其時是故更殫螻蟻之誠仰冀乾坤之造况今時不乏士物咸遂生鳬鴈去來固不為於多少鳶魚上下皆自適於飛潛茍遂出於殘骸庻少償其夙志伏望皇帝陛下哀憐舊物隠惻至仁察其有素非偽之誠成其識分知止之節曲從其欲賜報曰俞俾其解組官廷還車故里披裘散髪逍遥垂盡之年鑿井耕田歌詠太平之樂其為榮幸曷可勝陳乞致仕第三表㤙深煦嫗感激涕洟雖情有廹於危心不知自止而辭已窮於累牘幾至無言惟以至誠期於必達自乞憐於君父不復訊於蓍龜伏念臣家世單平性姿中下少從官學本免饑寒不自意於遭逢遂進階於華顯然而羣材方茂蒲桞未秋而早衰衆駿並馳駑駘中道而先乏而况荷難勝之任用竊逾分之寵榮風波憂畏而慮以深疾病侵凌而老亦至故自辭於幾政即願謝於軒裳䝉上聖之至仁念三朝之舊物毎曲煩於訓諭久未忍於棄捐竊惟臣之事君必本忠信言不顧行是為罔欺而臣口日誦於田閭身坐貪於禄利可畏至公之議何施有靦之顔毎自省循莫遑啓處是敢罔避再三之煩黷猶希萬一之矜從伏望皇帝陛下特軫天慈俯回睿聽察前言之可復盖屢請者有年哀下愚之不移俾卒成於素志狥其所欲乞以殘骸臣若得上印綬於有司自駕柴車而即路晚節知無於大過没身永荷於鴻私謝宣召入翰林表具官臣某言某月日䝉聖㫖召臣入翰林者使車入里君命在門閭巷驚傳豈識朝廷之故事縉紳竦歎以為儒者之至榮在臣之愚何以堪此竊以文章之任自古匪輕待遇寵榮至有私人之目詢謀獻納因加内相之名㤙既異於常倫人愈難於稱職伏念臣噐非宏逺識匪該明學不通今古之宜才不適方圓之用久叨塵於侍從曽莫著於勞能而自出守外藩近遭家禍茍存餘喘復齒周行風波流落者十年天日再瞻於䨇闕進退之際已蕭颯於霜毛慰勞有加賜憫憐於玉色形神若此志意可知身已分於早衰心敢萌於希進加以羈危之迹仇嫉交攻進退動係於羣言議論多煩於睿聽雖覆載有造毎賜保全而孤蹇偷安常思引去伏䝉皇帝陛下俯憐舊物曲軫宸慈偶因闕員遂俾承乏臣敢不勉尋舊學益勵前修感遺簪未棄之仁竭駑馬已疲之力庻俾薄效少答洪恩謝除樞宻副使表臣某荷䝉聖慈除為樞宻院副使者右樞虛府充位宜求於雋賢多士盈庭誤選乃先於庸妄既牢辭之靡獲徒以寵而為憂中謝伏念臣少本賤愚初無志慮為小人之事力不勝於負薪程有司之文學止期於干䘵過被仁㤙之樂育早從英俊之並遊遂叨侍從之流久玷論思之地方時求治殆無補於分毫顧質早衰况漸凋於齒髮但思藏縮敢望甄陞矧惟贊萬事之幾必也極一時之選豈容濫得猥以備員當命令之始行方惶惑以自失而睿㤙至渥召㫖甚嚴莫諧懇避之誠徒負貪榮之媿此盖伏遇皇帝陛下廓天地之量垂日月之光憐樸直之無他謂駑疲之可免俾承闕乏以效拙勤臣敢不奮勵無能之姿感激難遇之㑹職思以位庻免於曠官謀不以身少期於報國謝除刑部尚書表臣某荷國厚恩除為刑部尚書者職清書殿實為儒者之榮望峻天臺仍忝刑官之重内循謭薄仰玷光華中謝伏念臣某禀質迂愚粗知業履因時幸㑹遂竊寵靈無拾遺補闕之勤常陪法從非大册髙文之手久厠翰林濫綴宰寮俾聞國論荷三朝之眷遇毎察懦忠幸四海之清平得容尸禄居滿盈而不戒積灾釁以自貽屬聖統之嗣興赫皇明而繼照誣言詰服巳大釋於羣疑危跡保全俾不虧於素守犬馬合思於報效桑榆奈廹於衰遲屢貢懇私上干聰睿遂䝉開允俾解䌓機然而晩節餘生本期避寵清資顯秩益更貪榮被優渥之非常但凌兢而失措此盖伏遇皇帝陛下聖神御極亭育推㤙閔孤拙之勢危無容自立謂疲駑之力竭難責遠途曲軫至慈俯從誠請仍憐舊物特示殊㤙顧非木石之頑宜識乾坤之造颯然素領雖難強於筋骸皎若丹心猶自期於塵露青州謝上表掌國五兵叨進中臺之秩宣風一靣俾綏東土之人祇荷寵榮徒知隕越中謝伏念臣學非通敏材實空踈幸逢千載之休明誤被三朝之奬擢久陪法從常與政機國恩未報而身已先衰世途可畏而命亦多蹇頃緣災疾遂决退休敢期上惻於皇慈未忍遽捐於舊物而復過承優渥以慰癃殘惟孤拙之無堪蹈艱危而已甚世之所榮者臣之所懼人以為寵者臣以為憂是敢輙殫悃愊之誠累黷高明之聽廹於危慮罔避煩辭而聖度并容寛其罪戾㤙言屢降譬以丁寜知成命之難回勉靦顔而祇受而况全齊舊壤負海奥區民俗冨完而耕田鑿井各安其業詔條寛大而奉法守職足以修官内省庸虛奚勝忝幸此盖伏遇皇帝陛下日新求治天覆推仁謂簪履雖為於賤㣲尚堪收録而犬馬茍豐於豢養猶可使令臣敢不䇿勵疲羸勤思夙夜務期盡瘁少答鴻私永興謝上表司馬君實荷恩至重任責尤深循撫吏民敷宣詔令臣識慮闇淺規為疎闊唯知愚忠屢貢狂直奉事三世操守一心間以齒髪寖衰疾疹交集曽靡論思之效久汙侍從之班既無補於本朝祈自安於散地不圖睿澤更委名都雖要重之權自知不稱而煩劇之地難以固辭受命以還措躬無所朅來就道甫爾到官維此咸秦昔為畿甸山川秀美土地膏腴論其平時誠為樂土在於今日適值凶年經夏亢陽苖青乾而不秀渉秋滛雨穗黑腐而無收廪食一空家乏盖藏之粟襁負相屬道有流離之人老弱懷溝壑之憂姦猾蓄雈苻之志正宜安静不可動揺譬諸烹魚勿煩擾則免於糜爛如彼種木任生植則自然蕃滋謹當䇿勵疲駑彫磨朽鈍智力所及勤瘁無辭雖復失位危身終不病民負國庻幾小補用答大㤙定州謝表吕晦叔尸榮右府無裨廟算之奇假守中山復當閫制之重戴㤙為懼䖍命以行遄届郡封恪宣條詔伏念臣降才謭薄植性懦愚學術不足以稽五謀之疑識慮不足以籌千里之勝特以百年舊族荷累聖不貲之㤙一介㣲軀辱主上非常之遇夤緣寵渥更踐清華晩收疎外之孤蹤擢賛㣲幾之要務奉天光而咫尺被聖誨之丁寜謂臣世服近寮有均休共戚之義察臣傍無厚援絶背公死黨之嫌曲示優容俾思報效顧駑鈆之難強嗟蒲栁之易衰久預柄司積有妨賢之畏洊祈麾寄更圖陳力之方伏遇陛下體虛靜以儲神極髙明而盡下俯矜素悃特霈俞音惟定武之奥區據朔陲之重地尚叨付委靡即棄捐仍進叙於文階且兼華於秘殿併將厚意増賁舊臣夙侍軒墀實司樞要綂治軍經武之要洎守塞禦戎之宜日炙睿謀備觀宸斷逮兹臨遣得以遵承謹當細大必躬夙宵彌勵進不敢希功而生事退不敢弛備以曠官期不玷於誤知庻少酬於鴻施臣無任云云宻州謝表蘇子瞻臣軾言昨奉勅差知宻州軍州事巳於今月三日到任上訖草芥賤㣲敢干洪造乾坤廣大曲遂私情受命撫躬己自知於不稱入境問俗又復過於所期中謝伏念臣家世至寒性資甚下學雖篤志本先朝進士篆刻之文論不適時皆老生常談陳腐之說分於聖世處以散材一自離去闕庭屢更嵗籥塵埃筆硯漸忘舊學之淵源奔走簿書粗識小人之情偽欲自試於民社庻有補於㳙埃以為公朝不廢私願携孥上國預憂桂玉之不充請郡東方實欲弟昆之相近自惟何幸動獲所求雖父兄所以處臣其僥倖不過如此雖云疎外有此遭逢此盖伏遇皇帝陛下躬上聖之資建太平之業以為人無賢愚皆有可用故雖如臣等軰猶未盡捐臣敢不仰諗至㤙益堅素守推廣中和之政撫綏疲瘵之民要使民之安臣則為臣之報國徐州謝表臣軾言分符高宻巳竊名邦改命東徐復塵督府荷㤙深厚撫己兢慙中謝伏念臣奮身農畆託迹書林信道直前曽無坎井之避立朝寡助誰為先後之容向者屢獻瞽言仰塵聖鑒豈有意於為異盖篤信其所聞顧慙迂闊之言雖多而無益惟有朴忠之素既久而猶堅逺不忘君未忍改其常度言之無罪實深恃於至仁知臣者謂臣愛君不知臣者謂臣多事空懷此意誰復見明伏惟皇帝陛下日月照臨乾坤覆幬察孤危之易毁諒拙直之無他安全陋軀畀付善地民淳訟簡殊無施設之方食足身閒仰愧生成之賜顧力報之無所懷孤忠而自憐徐州謝奬諭表臣軾言伏奉今月四日勅以臣去嵗修城捍水粗免疎虞特賜奬諭者奔走服勤人臣之常事褒稱勞勉學者之至榮自惟何人乃辱斯語中謝伏念臣學無師法才與世踈經術既以不深吏事又其所短累忝優寄卒無異稱寛如定逺之言平平無取拙比道州之政下下宜然乃者河决澶淵毒流淮泗百堵皆作盖僚吏之劬勞三板不沉本朝廷之威徳而臣下掠衆美上貪天功獨竊璽書之榮以為私室之寳此盖伏遇皇帝陛下天覆四海子養萬民哀無辜之遭罹特遣使以存問既蠲免其賦調又飲食其饑寒所以録臣之㣲勞盖將責臣之來效臣敢不躬親畚築益修今嵗之防安集流亡盡復平時之業庻殫朽鈍少補絲毫徐州賀河平表臣軾言竊聞黄河决口巳遂閉塞者聖謨獨運天眷莫違庻邦子來民罔告病萬杵雷動役不逾時遂消東南莫大之憂然後麥禾可得而食人無後患喜若再生伏以大河為災歴世所病禹治兖州之野十有三載乃同漢築宣防之宫二十餘秊而定未有收狂瀾於既潰復故道於將湮俛仰而成神速若此恭惟皇帝陛下至仁溥施神智無方達四聰以來衆言廣大孝以安宗廟水當潤下河不溢流屬嵗久之無虞故患生於所忽方其决也本吏失其防而非天意及其復也盖天助有徳而非人功振古所無溥天同慶惟豐沛之大澤實汴泗之所鍾伊昔横流凛孤城之若塊殆兹平定蔚秋稼以如雲害既廣則利多憂獨深而喜倍雖官守有限不獲趨外庭以稱觴而民意所同亦能舒下情而作頌湖州謝表臣軾言䝉㤙就移前件差遣已於今月二十日到任上訖者風俗阜安在東南號為無事山水清逺本朝廷所以優賢顧惟何人亦與兹選中謝伏念臣性資頑鄙名迹湮㣲議論濶踈文學淺陋凡人必有一得而臣獨無寸長荷先帝之誤恩擢寘三舘䝉陛下之過聽付以兩州非不欲痛自激昻少酬恩造而才分所局有過無功法令具存雖勤何補罪固多矣臣猶知之夫何越次之名邦更許借資而顯授顧惟無狀豈不知恩此盖伏遇皇帝陛下天覆羣生海涵萬族用人不求其備嘉善而矜不能知其愚不適時難以追陪新進察其老不生事或能牧養小民而臣頃在錢塘樂其風土魚鳥之性既自得於江湖呉越之人亦安臣之教令敢不奉法勤職息訟平刑上以廣朝廷之仁下以慰父老之望黄州謝表臣軾言去嵗十二月二十九日准勅責降臣檢校尚書水部員外郎充黄州團練副使本州安置不得簽書公事臣已於今月一日到本州訖者狂愚冒犯固有常刑仁聖矜憐特從輕典赦其必死許以自新祇服訓辭惟知感涕中謝伏念臣早緣科第誤忝縉紳親逢睿哲之興遂有功名之意亦嘗召對便殿考其所學之言試守三州觀其所行之實而臣用意過當日趨於迷賦命衰窮天奪其魄叛違義理辜負恩私茫如醉夣之中不知言語之出雖至仁屢赦而衆議不容案罪責情固宜伏斧鑕於兩觀推恩屈法猶當禦魑魅於三危豈謂尚玷散員更叨善地投畀麏鼯之野保全樗櫟之生臣雖至愚豈不知幸此盖伏遇皇帝陛下徳刑並用善惡兼容欲使法行而知恩是用小懲而大誡天地能覆載之而不能容之於度外父母能生育之而不能出之於死中伏惟此恩何以為報惟當蔬食没齒杜門思愆深悟積年之非永為多士之戒貪戀聖世不敢殺身庻幾餘生未為棄物若獲盡力鞭箠之下必將捐軀矢石之間指天誓心有死無易謝失察妖賊表臣軾言去年十二月十五日准淮南轉運司牒奉聖㫖差官取勘臣前任知徐州日不覺察百姓李鐸郭進等謀反事臣尋具析在任日曽選差沂州百姓程棐令緝捕凶逆賊人致棐告獲前件妖賊因依乞勘㑹施行至今年七月二日復准轉運司牒坐准尚書刑部牒奉聖㫖蘓軾送尚書刑部更不取勘盗發所臨守臣固當重責罪疑則赦聖主所以廣㤙自驚廢逐之餘猶在憫憐之數中謝伏念臣早䝉殊遇擢領大邦上不能以道化民達忠孝於所部下不能以刑齊物消奸宄於未萌致使妄庸敢圖僣逆原其不職夫豈勝誅况兹溝瀆之中重遇雷霆之譴無官可削撫巳知危至於捕斬羣盗之功乃是隣近一夫之力靖言其始偶出於臣雖為國督姦常懷此志而因人成事豈足言勞勉自列於㳙埃庻少寛於斧鉞豈謂蕩然之澤許以勿推收驚魄於散亡假餘生之晷刻退思所自為幸何多此盖伏遇皇帝陛下舞虞舜之干示人不殺祝成湯之網與物俱生其間用刑本不得巳稍有可赦無不從寛務在考實而原情何嘗記過而忘善益悟向時之所坐皆是㣲臣之自貽感愧終身論報無地布衣蔬食或未死於饑寒石心木腸誓不忘於忠義謝量移汝州表臣軾言伏奉正月二十五日誥命特授臣汝州團練副使本州安置不得簽書公事者稍從内遷示不終棄罪巳甘於萬死恩實出於再生祇服訓辭惟知感涕中謝伏念臣向者名過其實食浮於人兄弟並竊於賢科衣冠或以為盛事旋從册府出領郡符既無片善可紀於絲毫而以重罪當膏於斧鉞雖䝉恩貸有愧平生隻影自憐命寄江湖之上驚魂未定夣遊縲紲之中憔悴非人猖狂失志妻孥之所竊笑親友至於絶交疾病連年人皆相傳為已死饑寒併日臣亦自厭其餘生豈謂草芥之賤㣲尚煩朝廷之紀録開其恫悔許以甄收此盖伏遇皇帝陛下湯德日新堯仁天覆建七廟以安祖考正六官而修典刑百廢俱興多士爰集彈冠結綬共欣千載之逢掩靣向隅不忍一夫之泣故推㳙滴以及焦枯顧惟效死之無門殺身何益更欲呼天而自列尚口乃窮徒有此心期於異日乞常州居住表臣軾言臣聞聖人之行法也如雷霆之震草木威怒雖甚而歸於欲其生人主之罪人也如父母之譴子孫鞭撻雖嚴而不忍致之死臣漂流棄物枯槁餘生泣血書詞呼天請命願回日月之照一明葵藿之心此言朝聞夕死無憾中謝臣昔者嘗對便殿親聞德音似䝉聖知不在人後而狂狷妄發上負恩私既有司皆以為可誅雖明主不得而獨赦一從吏議坐廢五年積憂熏心驚齒髪之先變抱恨刻骨傷皮肉之僅存近者䝉恩量移汝州伏讀訓辭有人材實難弗忍終棄之語豈獨知免於縲紲亦將有望於桑榆但未死亡終見天日豈敢復以遲暮為歎更生僥覬之心但以禄廪久空衣食不繼累重道逺不免舟行自離黄州風濤驚怒舉家重病一子哀亡今雖巳至泗州而貲用罄竭去汝尚逺難於陸行無屋可居無田可食二十餘口不知所歸饑寒之憂近在朝夕與其疆顔忍恥干求於衆人不若歸命投誠控告於君父臣有薄田在常州宜興縣粗給饘粥欲望聖慈許於常州居住又恐罪戾至重不可聽從便安輙叙㣲勞庻䝉恩貸臣先任徐州日以河水浸城幾至淪䧟臣日夜守捍偶獲安全曽䝉朝廷降勅奬諭又嘗選用沂州百姓程棐令追捕凶黨致獲謀反妖賊李鐸郭進等一十七人亦䝉聖㤙保明放罪皆臣子之常分無㳙埃之可言冒昧自陳出於窮廹庻幾因緣僥倖功過相除稍出羈囚得從所便重念臣受性剛褊賦命竒窮既獲罪於天又無助於下怨讎交積罪惡横生羣言或起於愛憎孤忠遂䧟於疑似中雖無愧不敢自明向非人主獨賜保全則臣之㣲生豈有今日伏惟皇帝陛下聖神天縱文武生知得天下之英才巳全三樂躋斯民於仁夀不棄一夫勃然中興可謂盡善而臣抱百秊之永歎悼一飽之無時貧病交政死生莫保雖鳬鴈飛集何足計於朝廷而犬馬盖帷猶有求於陛下敢祈仁聖少賜矜憐臣見一靣前去至南京以來聽候朝㫖到常州謝表臣軾言先䝉恩授汝州團練副使本州安置尋上表乞於常州居住奉聖㫖依所乞臣已於今月二十二日到常州訖者積釁難磨未經洗滌至仁易感許即便安祇荷寵靈惟知感涕中謝伏念臣所犯罪戾本合誅夷向非先帝之至明豈有餘生於今日銜恩未報有志不從已分沒身寄殘骸於魑魅敢期擇地收暮景於桑榆此盖伏遇皇帝陛下仁孝生知聰明天縱寅奉上帝之眷命述修累聖之成謀念此菅蒯之㣲庻幾簪履之舊俾安田畆稍出縲囚飽食無思但日陶於新化杜門自省當益念於往愆登州謝表臣軾言伏奉誥命授臣朝奉郎知登州軍州事臣巳於今月十五日到任上訖者登雖小郡地號極邉自驚縲紲之餘忽有民社之寄拜恩不次隕涕何言中謝臣聞臣不宻則失身而臣無周身之智人不可以無學而臣有不學之愚積此兩愆本當萬死坐受六年之謫甘如五鼎之珍擊鼔登聞止求自便買田陽羡誓畢此生豈期枯朽之中有此遭逢之異收招魂魄復為平人洗濯瑕疵盡還舊物此盖伏遇皇帝陛下内行曽閔之孝外發禹湯之仁日將旦而四海明天方春而萬物作於其黨而觀過謂臣或出於愛君就所短而求長知臣稍習於治郡致兹異寵驟及非才恭惟先帝全臣於衆怒必死之中陛下起臣於散官永棄之地沒身難報碎首為期登州謝宣詔赴闕表仕路﨑嶇羣言摧阻雖死生不變乎巳况用舎豈累其懷中謝臣草野㣲生雕䖝末學昔從仁廟誤䝉㧞擢之恩旋至神宗亦荷優嘉之禮祇合俯身從衆卑論趨時柰何明不自知諌於未信屢遭譴罰實自巳為力當勉於茍安悔欲追於何及以此遷延嵗月荏苒塵埃望巳絶於朝端志必期於老死此盖伏遇皇帝陛下躬成王之幼賴文母之賢輔成天縱之才訓導日躋之聖斯民多幸神斷至公凡所有為稍復用舊况秉節推忠之士將欲甄收而作新立法之人旋行降黜如臣者擢從逺郡俯届大邦豈意寒灰之復然試其駑馬之再駕每思至此其念尤深謝中書舎人表臣言伏奉制命授臣試中書舎人仍改賜章服者右史記言已塵高選西垣視草復玷近班皆儒者之至榮豈平生之敢望中謝竊以詞命之職古今所難非獨取之於文蓋將試之以事至於機務亦或與聞雖四户擅權非當時之公議而五花判事亦前代之美談及夫三字之除乃是一切之政但謂内朝之法從安知宰相之屬官既任止於訓辭故權移於胥史恬不知怪習為故常先皇帝道冠百王法垂萬世建六官而修故事闢三省以待異人典章一新名實皆正遂申明於四禁俾分領於六曹逺則追直閣之司近則通檢正之任雖未聞政而聞事蓋湏有德而有言如臣之愚無一而可草創潤色既非鄭國之材除書德音又乏唐人之譽忽當此選莫測其由此盖伏遇皇帝陛下將聖與仁能哲而惠雖在三年不言之際巳有十日並照之光而臣日侍邇英親聞訪道仰天威之甚近知聖鑒之難逃謂臣嘗受先朝之知實無左右之助棄瑕往昔責效將來臣敢不益勵素心無忘舊學上體周公煩悉之誥助成漢家深厚之文茍無曠官其敢言報又表臣試言伏奉制命授臣試中書舎人仍改賜章服者聖神獨斷出成命於省中衰病増光溢虛名於朝右訓詞之重士論所榮中謝臣聞有言逆心此古人所以顛沛積毁消骨非聖主莫能保全臣本受知於裕陵亦嘗見待以國士嘉其好直許以能文雖竄謫流離之餘决無可用而哀憐收拾之意終不少衰抱弓劔以長號分簪履之永棄豈期晩遇又過初心矧外制之深嚴極西垣之清要在唐之盛以馬周岑文本為得人近世所傳有楊億歐陽修之故事不試而用於今幾人遂超同列之先逺繼前修之末夫何頑鈍有此遭逢此蓋伏遇太皇太后陛下憂國忘身愛民如子憂深故任其事者重愛極故為之慮也長敷求哲人以遺聖嗣所以兼收而並用庻幾有得於其間臣敢不盡其所能期於無愧始終自誓故常以道而事君夷險不同則必見危而授命謝翰林學士表臣軾言䝉㤙除臣翰林學士知制誥者名㣲不稱寵至若驚伏念臣經術空踈吏能短淺少年自守無用於作新去國生還適逢於求舊初何云補遽辱甄收此盖伏遇皇帝陛下文武生知聰明天縱法乾坤之廣運體日月之照㣲過採虛名使陳薄技敢不激昂晩節砥礪初心雖洪造之難酬盡㣲生而後巳謝宣召入院表右臣今月日西頭供奉官充待詔董士隆至臣所居奉宣聖㫖召臣入院充學士者詔語春溫再命而傴使華天降一節以趨在故事以嘗聞豈平生之敢望省循非稱愧汗交深竊以視草之官自唐為盛雖職親事祕號為北門學士之榮而禄薄地寒至有京兆掾曹之請豈如聖代一振儒風非徒好爵之縻兼享大烹之養玉堂賜篆仰淳化之彌文寳帶重金佩元豐之新渥既厚其禮愈難其人而臣以空疎冗散之材衰病流離之後生還萬里坐閲三遷不緣左右之容躐處賢豪之上此蓋伏遇皇帝陛下生資文武天祚聖神雖亮隂不言尚隠高宗之德而訪落求助巳啓成王之心首擇輔臣次求法從知人材之難得采虛名而用臣敢不益勵初心力圖後效才不逮古雖慙内相之名志常在民庻免私人之誚謝賜對衣金帯馬表臣軾言伏䝉聖慈以臣入院特賜衣一對金腰帯一條金鍍銀鞍轡馬一匹被三品之服章君子所以昭令德分六閑之駔駿朝廷所以旌有功顧惟何人亦與兹寵拜恩俯僂流汗交并中謝伏念臣人㣲地寒性迂才短襲布韋而自薦偶忝縉紳駕欵叚以言歸終安畎畆豈謂便蕃之錫萃於衰病之軀此蓋伏遇皇帝陛下摠覽衆工財成大化至誠樂與有緇衣之好賢俊民用章無白駒於虛谷不違寒陋亦被光華攬佩以思遂識斷金之義舉鞭自誓敢忘希驥之心又表臣軾言伏䝉聖慈以臣入院特賜衣一對金腰帯一條金鍍銀鞍轡馬一匹命服出笥榮動縉紳左驂在庭光生徒馭德不稱物愧無所容中謝伏念臣衰朽無功惷愚不學巳分鵜梁之刺敢逃負乘之譏再惟此恩何自而至此蓋伏遇太皇太后陛下至仁廣運盛德兼容躬周公之勤勞而逸於委任寳老氏之慈儉而侈於禮賢致此光榮下及㣲陋慨然攬轡敢有意於澄清束以立朝尚可言於賔客又表臣軾言伏䝉聖慈特賜衣一對金腰帯一條金鍍銀鞍轡一副馬一匹者出笥之珍巳華朽質解驂之賜益耀衆觀顧惟何人亦被兹寵中謝伏念臣少而拙訥老益踈愚山野之資非文繡之所及疲駑之質雖鞭䇿以何加方祈冗散之安更忝便蕃之錫此盖伏遇皇帝陛下緝熈儒術羅網人才不愛車服寵數之章使為吏民瞻望之美據鞍有愧束袵知榮敢不奉以牧民永思去害之指施之治邑庻無學製之傷又表臣軾言伏䝉聖恩云云者命服斯皇詩詠周宣之德康侯用錫易稱王母之仁惠澤所加臣工知勸中謝伏念臣資材朽鈍學術空踈矧兹衰病之餘豈復光華之羡荷寵章之蕃庻人以為榮顧形影之支離臣惟自愧此盖伏遇太皇太后陛下知人堯哲徧物舜仁時遣拾遺補過之臣出為承流宣化之任子衣安吉不待請而有之我馬虺隤蓋知勞而賜者敢不勉思忠藎務報恩勤永為廐庫之珍莫非民力無忘獄市之寄以副上心又表右臣伏䝉聖慈特賜臣對衣一襲金腰帯一條銀鞍轡馬一匹者錫之上駟敢忘致逺之勞佩以良金無復折腰之恥執鞭請事顧影知慙恭惟皇帝陛下禹儉中修堯文外煥長轡以御率皆四牡之良所寳惟賢豈徒三品之貴出捐車服收輯事功而臣衰不待年寵常過分枯羸之質匪伊垂之而帯有餘歛退之心非敢後也而馬不進徒堅晩節難報深恩又表右臣伏䝉聖慈云云者出笥之珍以旌有德在坰之駟豈及無功而臣首尾四年叨塵三錫省躬内灼服寵汗流恭惟太皇太后陛下慈儉自居龍光四達德被海宇豈惟一襲之衣恩結華夷何止十圍之帯羣賢在御六轡自調而臣頃以衰羸伏求安便奉宣德意庻幾五袴之謡收歛壮心無復千里之志更期力報有愧空言謝除侍讀表臣軾言今月一日䝉恩除臣兼侍讀者學術本踈老復加於蹇訥官聮愈近職專在於討論退省其愚莫知所措中謝伏以天威咫尺顧末技以何施聖敬日躋豈羣臣之敢望非張禹倪寛之篤學無禇量懷素之懿文則何以奉天子五學之游求王人多聞之益如臣愚昧何與選掄此盖伏遇皇帝陛下卓然生知輔以好學方高宗恭黙之後正宣帝勵精之初衆論並陳悉洞照其情偽陳編一覽已周知於廢興察臣衰病而無求庻可親近而寡過故兹㧞用驟及疲駑臣敢不溫故知新謹守有司之職見危授命更輸異日之忠又表臣軾言今月云云者北門視草巳叨儒者之極榮西學上賢復玷侍臣之高選省循非稱愧汗交懷中謝竊惟講讀之臣止以言語為職考功課吏無殿最之可書陳善閉邪有膏澤之潛潤豈臣愚陋亦所克堪此蓋伏遇太皇太后陛下憂思深長德業久大受先帝投艱之托為神孫經逺之謀故選左右前後之人罔非吉士使知興亡治亂之效莫若多聞謂臣雖無大過人之才知臣粗有不欺君之實故使朝夕與於討論奉永日之清閒未知所報畢㣲生於盡瘁終致此心賀明堂赦書表臣軾言宗祀禮成修累朝之盛典端門肆𤯝答萬宇之懽心凡有識知舉増忭躍中賀竊謂祖宗恩信之所被譬如天地寒暑之不差將推作解之仁必在當郊之嵗恭惟皇帝陛下憲章六聖左右三靈上帝眷而風雨時壬人去而蠻夷服講明大禮對越昊天懷柔百神嚮用五福大河修復奏軌道於東流藩邸顧懷錫鴻名於西府臣備員法從待罪守臣想聞路寢之鼓鐘曽叨奉引嘉與海宇之草木同被恩私又表臣軾言嚴配禮成民心知孝好生德洽天下歸仁凡䝉一洗之恩舉有惟新之喜中謝伏以功存廟社而辭其禮德及草木而諱其名此聖人之所難幸㣲生之親見恭惟太皇太后陛下勲高任姒道配唐虞顧惟致治於和平孰不歸心於保佑合宫均福畢修累聖之文㑹慶告成不居先后之位臣職叨禁從身逺闕庭既欣渙汗之私溥霑動植更喜謙光之美獨冠古今謝賜御書詩表臣軾言今月十五日賜宴東宫伏䝉聖㤙差中使就賜臣御書詩一首者玉斚上尊霈若雲天之澤寳章宸翰煥乎奎璧之文喜溢心顔光生懷袖伏念臣猥緣末技獲玷清流早嵗數竒巳老江湖之上餘生何幸得依日月之光入侍燕閒與聞講學卒桓榮之業因人而成登劉洎之床則臣豈敢夫何珍賜亦及㣲軀此盖伏遇皇帝陛下道本生知才惟天縱文不數於游夏書巳逼於鍾王心慕手追陋文皇之曲學筆縱字大笑宋武之未工知臣遭遇之難欲以顯榮其老鏤之金石庻傳玩於人人付與子孫俾輸忠於世世謝除龍圖閣學士表臣軾言伏䝉聖恩以臣累章請郡特除臣龍圖閣學士知杭州者中禁寳儲上應奎壁之象先朝謨訓逺同河洛之符𨽻職其間省躬非據中謝伏念臣學非有得愚至不移雖叨過實之名卒無適用之噐少時妄意蓋嘗有志於事功晚歳積憂但欲歸安於田畝屬聖神之履運荷識㧞之非常猶冀桑榆之收遽廹犬馬之疾力求閒散庶免顛隮豈謂皇帝陛下聖度包荒天慈委照察其才有所短不欲彊置之禁嚴知其進不由人故特保全其終始遂加此職以賁其行臣敢不仰緣末光益勵素守往何之而不可中無愧之為安但未死亡必期報塞又表臣軾言云云者北扉清宻乆愧素飱内閣深嚴復膺殊寵以榮為懼有靦在顔中謝伏念臣賦命數竒與人多忤遭遇仁祖沗竊賢科繼䝉英廟之深知尤荷裕陵之見噐而流離若此窮薄可知晩親日月之光常恐缻罍之溢故求閒散以避災屯豈謂太皇太后陛下天高聼卑坤厚載物愛惜臣下固無異於子孫委任官師夲不分於中外致茲衰病不失清華然臣辭寵而益榮求閒而得劇雖云稍逺於爭地尚恐終非其乆安敢不磨鈍自修履氷知戒庶全孤節少答殊私杭州謝表臣軾言伏奉制書除臣龍圖閣學士知杭州巳於今月三日到任上訖者始衰而病豈非溢滿之災乞越得杭又過平生之望中謝伏念臣起自廢黜驟登禁嚴畢命驅馳未償萬一懐安退縮豈所當然蓋散材不任於斧斤而病馬空縻於芻粟故求外補以盡餘生豈期避寵而益榮求閒而得劇此蓋伏遇皇帝陛下剛毅中正緝熈光明無為蓋虞舜之仁篤學有仲尼之智而臣猥以末技日奉講帷凛然威光返在咫尺惟古人責難之意每不自量方陛下好問之初遽以疾去推之理數可謂其窮荷眷遇之不移竊恩榮之愈重雖雨露之施初不擇物而犬馬之報期於殺身又表臣軾言云云入奉禁嚴出膺方靣皆人臣之殊遇在儒者以尤榮中謝伏念臣受寵逾涯積憂成疾既思退就於安養又欲少逃於滿盈仰荷至仁曲從微願江山故國所至如歸父老遺民與臣相問知朝廷輟近侍為太守蓋聖主視天下如一家鞭扑未施爭訟㡬絶臣之厚幸豈易名言此蓋伏遇太皇太后陛下天地之仁賢愚兼取日月之照邪正自分每包含其惷迂欲保全其終始兄弟孤立嘗親奉於德音死生不移更誓堅於晩節杭州放罪謝表臣軾言臣近以法外刺配本州百姓顔章顔益三人上章待罪奉聖㫖特放罪者軄在承宣當遵三尺之約束事關利害輙從一切之便宜曲荷天慈不從吏議中謝伏念臣早縁剛拙屢致憂虞用之朝廷則逆耳之奏形於言施之郡縣則疾惡之心見於政雖知難每以為戒而臨事不能自囘茍非日月之明肝膽必照則臣豈惟獲罪於今日乆已見傾於衆言恭惟皇帝陛下睿哲生知清明旁逹委任羣下退託於不能愛養成材惟恐其有過知臣欲去一方之積弊須除二猾以示民特屈憲章以全噐使臣敢不省修過咎祗服簡書眷此善良自不犯於漢法時有貸舍用益廣於堯仁又表亂羣之誅不請而决蓋恩威之無素致姦猾之敢行方俟譴呵豈期寛宥伏以法吏網宻蓋出於近年守臣權輕無甚於今日觀祖宗信任之意以州郡責成於人豈有不擇師帥之良但知䋲墨之馭若平居僅能守法則緩急何以使民顧臣不才難以議此恭惟太皇太后陛下寛仁從衆信順得天推一身之至公納萬方於無罪而臣始終被遇中外䝉恩謂事有專而合宜情無他而可恕故加貸舍以示寵綏朝廷之明粗以臣為可信吏民自服當不令而率從頴州謝表臣軾言伏奉聖恩除臣龍圖閣學士知頴州臣於今月二十二日到任訖者避嫌引疾慙無國士之風識分知難粗守人臣之節曲䝉温詔遂假名邦巳見吏民惟知感怍中謝伏念臣早緣多難無意軒裳晩以虛名偶塵法從雖云時可每與願違既未决於歸田故力求於治郡慈母愛子但憐其無能明君知臣終䕶其所短自欣投老漸獲安身此蓋伏遇太皇太后陛下慈儉臨民剛柔布政參天地而有信喜怒不偏體氷鑑之無心忠邪自辨致茲愚直亦克保全雖任職居官無過人者而見危授命蓋有志焉又表支郡責輕未即滿盈於小噐豐年事簡非徒飽煖於一家覽几席之溪湖雜簿書於魚鳥平生所樂臨老獲從中謝伏以汝頴為州邦畿稱首土風備於南北人物推於古今賔主俱賢蓋宗資范孟博之舊治文獻相續有晏殊歐陽修之遺風顧臣何人亦與兹選此蓋伏遇皇帝陛下丕承六聖總覽羣英生知仁孝之全學識文武之大謂臣簮履之舊物嘗忝帷幄之近臣奉事七年﨑嶇一節意其忠義許國故暫召還察其老病畏人復許補外置之安地養此散材更少勉於桑榆誓不忘於畎畝揚州謝表臣軾言伏奉聖恩除臣知揚州臣已於今月二十六日到任訖者一麾出守方愧媮安十國為連復膺寵寄恩榮既溢慙汗靡寜中謝伏念臣本以鯫生冒居禁從頃縁多病力求頴洧之行曾未半年復有廣陵之請蓋以魚鳥之質老於江湖之間習與性成樂居其舊天從民欲許擇所安恭惟皇帝陛下欽明文思剛健純粹天工黙運灼知萬化之情人材並收各取一長之用如臣衰朽尚未遐遺命至蹇而禄已盈每懐憂懼志雖大而才不副莫報恩私定州謝表兵民重寄本禦侮以折衝疆場乆安但坐嘯而畫諾才微禄厚恩重命輕中謝伏念臣一去闕庭三換符竹坐席未煖召節巳行筋力疲於徃來日月逝於道路未經周嵗復典两曹朝廷非不用臣愚惷自不安位所宜竄逐更冒寵榮此蓋伏遇皇帝陛下離明正中乾健獨運追述東朝之遺意收此散才眷言西學之舊臣付之善地致此衰朽尚未棄捐臣敢不勤恤民勞宻修邉備茍無大過以及朞年漸還魚鳥之鄕以畢桑榆之樂英州謝表罪凶義絶誅九族以猶輕威震怒行寘一州之太幸驚魂方散感涕徒零中謝伏念臣草芥賤儒岷峨冷族襲先人之素業借一第以竊名雖㓜嵗勤勞實學聖人之大道而終身窮薄常為天下之罪人先帝全臣於衆怒必死之中陛下起臣於散官永棄之地恩深報蔑每憂天地之難欺福少禍多亦是古今之罕有自悲棄物猶欲籲天惟上聖纂宗廟之圖方太母聼簾帷之政招延俊乂登進老成何期章句之菲材使掌絲綸之要職凡一時黜陟進退之衆皆两宫威福賞罰之公既在代言敢思逭責茍不能敷揚上意尊朝廷於日月之明則何以聳動四方鼓號令於雷霆之震固當昭陳功伐直喻正邪豈臣愚敢有於私心蓋王言不可以匿指當時之天奪其魄但謂守官今日之臣肆其言期於必戮頼父母之深憫免子弟之皆誅罪雖駭於衆聞恩終歸於内恕不獨再生於東市猶令尸禄於南州累嵗寵榮固巳太過此時竄責誠所宜然瘴海炎陬去若清凉之域蒼顔素髪誰憐衰暮之年恩重丘山感藏骨髓此蓋皇帝陛下智惟天錫行自生知巍巍繼六聖之神休孜孜盡三宫之孝養深原心迹曲示哀矜臣實何人恩常異衆在先朝偶脱於誅戮故此日復煩於典刑頑戾若斯生存何補臣敢不噬臍悔過吞舌知非革再三而不改之非庶萬一有善終之望殺身莫喻敢懐窮困之憂守土非輕尚牧遐荒之俗儻先朝露之化徒懐結草之忠惠州謝表臣軾言先奉誥命落两職退一官以承議郎知英州軍州事續奉誥命復責授臣寧逺軍節度副使惠州安置已於今月二日到惠州公參訖者仁聖曲全本欲畀之民社羣言交擊必将致之死亡尚荷寛仁止投荒服中謝伏念臣性資褊淺學術荒唐但守不移之愚遂成難赦之咎迹其狂妄乆合誅夷方尚口乃窮之時蓋擢髪莫數其罪豈謂天幸得全此生此蓋伏遇皇帝陛下以大有為之資行不忍人之政湯網觧其三靣舜干舞於両階念臣奉事有年少加憐愍知臣老死無日不足誅鋤明降德音許全餘息故使虺隤之馬猶獲盖帷觳觫之牛得違刀几臣敢不服膺嚴訓托命至仁洗心自新沒齒無怨但以瘴癘之地魑魅為隣衰病交攻無復首丘之望精誠未冺空餘結草之忠昌化軍謝表臣軾言今年四月十七日奉被告命責授臣瓊州别駕昌化軍安置臣尋於當月十九日起離惠州至七月二日已至昌化軍訖者並鬼門而東騖浮瘴海以南遷生無還期死有餘責中謝伏念臣頃縁際㑹偶竊寵榮曽無毫髪之能而有丘山之罪宜三黜而未巳跨萬里以獨來恩重命輕咎深責淺此蓋伏遇皇帝陛下堯文炳煥湯德寛仁赫日月之照臨廓天地之覆育譬之蠕動稍賜矜憐俾就窮途以安餘命而臣孤老無托瘴癘交攻子孫慟哭於江邉以為死别魑魅逄迎於海外寧許生還念報德之何時悼此心之未巳俯伏流涕不知所云量移亷州表使命逺臨初聞䘮膽詔辭温眷乃返驚魂拜望闕庭喜溢顔靣否極泰至雖物理之常然昔棄今收豈罪餘之敢望伏膺知幸揮涕無從中謝伏念臣頃以狂愚偶膺譴責荷先朝之厚德寛蕭律之重誅投畀遐荒幸逃鼎鑊風波萬里顧衰病以何堪烟瘴五年頼喘息之猶在憐之者嗟其巳甚嫉之者謂其太輕考圖經正繫海隅以風土疑非人世食有併日衣無禦寒凄冷一身顛躓萬狀恍若醉夣巳無意於生還豈謂優容許承恩而近徙雖有僥倖實無夤縁兹蓋伏遇皇帝陛下道夲生知聖由天縱舊勞於外爰知小人之依堪家多難監於先王成憲奉聖母之慈訓擇正人而與居凢有嘉謀出於睿㫁憐臣以孤危寡援察臣以妬忌獲愆許以更新庶其改過雖天地有化育之德不能使臣之再生雖父母有鞠養之恩不能全臣於必死報期碎首言豈渝心濯去泥塗巳有遭逄之便擴開雲日復覩於變之時此生豈敢求榮處巳但知緘口謝量移永州表島上囚拘分安死所天邉渙汗詔許生還駐世之魂自招合浦感涕之淚欲漲溟波中謝伏念臣生而愚朴少也艱勤倀倀而行不知所届衝衝而活何以為生言則招憂動常速禍顧巳於時齟齬使人費力保全仁宗之朝早得名神考之朝終見貸謂宜飭躬自省去惡莫為而乃肆言元祐之間放意太平之際凢獲不虞之譽宜任非常之辜過既暴聞衆知不赦先皇帝明罰勅法使萬里以思愆今天子發政施仁無一夫之失所凡在名籍舉賜洗湔俾離一海之中復至五嶺之外拜天恩之優厚知聖化之宻庸挈是破家航以一葦蛟鰐潜底風濤不驚遂齊編戸之民不為異域之鬼視偕飛走謝施乾坤天日彌高徒極馳心於魏闕鄉關入望尚期歸骨於眉山殘生無與於殺身餘識終同於結草提舉玉局觀謝表臣軾言臣先自昌化軍貶所奉勅移亷州安置又自亷州奉勅授臣舒州團練副使永州居住今行至英州又奉勅授臣朝奉郎提舉成州府玉局觀在外州軍任便居住者七年逺謫不自意全萬里生還適有天幸驟從縲紲復齒縉紳中謝伏念臣才不逮人性多忤物剛褊自用可謂小忠猖狂妄行乃蹈大難皆臣自取不敢怨尤㑹真人之勃興與萬物而更始而臣獨在幽逺最為冥頑迨兹起廢之初倍費生成之力乃䝉記録不自棄捐此蓋伏遇皇帝陛下正位龍飛對時虎變神武不殺豈非受命之符清浄無為坐獲消兵之福聰明不作邪正自分使臣得同草木之微共霑雷雨之觧臣敢不益堅素守深念徃愆沒齒何求不厭飯蔬之陋蓋棺未巳猶懐結草之忠謝除翰林承㫖表臣某言臣某出守某州某月日䝉聖㫖召還擢為翰林承㫖者使星下燭生蓬蓽之光華天澤旁流失桑榆之枯槁國有用儒之盛士知稽古之榮伏以翰墨之林號稱内相文章之外不取他才至於用人可以觀政文武並用或成頗牧之功邪正雜居至有伓文之患惟貴且近故難其人而况金鑾玉堂親被絲綸之宻北扉東閣獨稱年德之高必有異人以齊衆口而臣本縁衰病出守江湖以一方凋弊之餘當二年水潦之厄戴星而治僅免流亡及𤓰而還恍如夢寤交親迎勞井邑聚觀驚華髮之半空笑丹心之未折宜投閒散以養衰殘豈期過採於虛名復使榮加於舊物此蓋伏遇皇帝陛下德同乾健明配日中既祖述於堯仁復躬行於舜教才難之嘆人誦斯言縁先帝之德音收孤臣於散地言雖直而無罪身愈逺而益親委曲保全始終録用臣敢不更磨朽鈍少補㳙埃難得者時未有捐軀之㑹勿欺而犯誓無患失之心唐宋元名表巻上之二
