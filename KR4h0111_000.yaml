body:
  text: 唐宋元名表總集類提要臣等謹案唐宋元名表二卷明胡松編松有滁州志已著録明史松本傳稱松幼嗜學嘗輯古名臣章奏今未見其本是編乃松督學山西時選為士子程式之書雖所録皆各集所有無竒祕未睹之篇而去取極為不茍前有自序曰是學也昉於漢魏六朝盛於隋唐而極於宋其體不能盡同然其意同于宣上德而達下情明已志而述物則其後相沿猥下競趨新巧爭尚衍博往往貪用事而晦其意務屬詞而滅其質蓋四六之本意失之逺矣其言頗為明切自明代二場用表而表遂夷為時文久而僞體雜出或參以長聨如王世貞所作一聨多至十餘句如四書文之二小比或參以五七詩句以為源出徐庾及王駱不知徐庾王駱用之于賦賦為古詩之流其體相近若以詩入文豈復成格至於全用成句每生硬而杈丫間雜俗語多鄙俚而率易冠冕堂皇之調剽襲者陳膚餖飣割裂之詞小才者纎巧其弊尤不勝言松選此編挽頺波而歸之雅亦可謂有功於駢體者矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陵錫熊臣孫士毅總校官臣陸費墀唐宋元名表原序說者曰表之言明也標也譬物之標表言標表事序要於章顯而巳奚駢儷之上也余竊以其言徒取一隅要未為通論今夫人之於文猶其之於言語之於衣服飲食與其宫室器用者也且夫言語之於達意衣服之於蔽體飲食之於滿腹宫室之於安身器物之於利用以今方古其可得而齊諸譬則四時之行萬物之生江河之流轉各因其時以為變故易曰損益盈虛與時偕行自天地且不能違時而况於人乎故善學者從今之文以明古之道不善學者執古之跡以失今之宜斯其行之所以弗逺而施之則泥者也是學也昉於漢魏六朝盛於隋唐而極於宋彼其工拙繁簡駢儷直致要之其體不能盡同然其意同於宣上德而達下情明己志而述物則其後相沿猥下競趨新巧爭上衍博往往貪用事而晦其意務屬辭而滅其質蓋四六之本意失之逺矣今世士業文益又轉甚曾不深惟體裁之所從始勉思搆撰而乃掇拾補綴勦竊沿襲是曾弗若直致之為章明較著也余是用悲乃輯斯以式晉士要使學者敦尚本實優遊道藝期可愛而傳爾或者弗察以為斯特文詞之華而巳是非士所先過矣夫召賔客者必善其辭命告氓黎者必悉其志慮矧乎以詔君上以交鬼神以諭邦國以動天地而可弗修其辭乎傳曰修辭立其誠所以居業也故夫以唐宋之體裁陳虞夏之謨典用休文之聲律寫孔明之忠義神而明之存乎其人此則不穀之所深望抑亦吾黨所當自朂者哉時嘉靖壬寅夏五月望日前山西按察司提學副使滁陽胡松識
